[Unit]
After=epikur-preview-db.service
Wants=epikur-preview-db.service

[Service]
Environment=NODE_OPTIONS=--max-old-space-size=1024
ExecStartPre=/bin/bash -c 'if test -L /home/ole/epikur-preview/node_modules; then target=$(/usr/bin/readlink -f /home/ole/epikur-preview/node_modules); /usr/bin/rm /home/ole/epikur-preview/node_modules; /usr/bin/cp -a "$target" /home/ole/epikur-preview/node_modules; fi'
ExecStart=
ExecStart=/usr/bin/npm run dev -- --turbopack --hostname 127.0.0.1 --port 3010
ExecStartPost=/bin/bash -c 'ready=0; for attempt in $(seq 1 90); do if /usr/bin/curl -fsS --max-time 5 http://127.0.0.1:3010/ >/dev/null; then ready=1; break; fi; /usr/bin/sleep 1; done; test "$ready" = 1 || exit 1; for route in /dashboard /patienten /kalender /rechnungen /nachrichten; do /usr/bin/curl -sS -o /dev/null --max-time 30 "http://127.0.0.1:3010$route" || exit 1; done'
MemoryHigh=1100M
MemoryMax=1300M
