[Unit]
After=epikur-preview-db.service
Wants=epikur-preview-db.service

[Service]
Environment=NODE_OPTIONS=--max-old-space-size=1024
ExecStart=
ExecStart=/usr/bin/npm run dev -- --turbopack --hostname 127.0.0.1 --port 3011
ExecStartPost=/bin/bash -c 'ready=0; for attempt in $(seq 1 90); do if /usr/bin/curl -fsS --max-time 5 http://127.0.0.1:3011/ >/dev/null; then ready=1; break; fi; /usr/bin/sleep 1; done; test "$ready" = 1 || exit 1; for route in /termine /nachrichten /frageboegen /profil; do /usr/bin/curl -sS -o /dev/null --max-time 30 "http://127.0.0.1:3011$route" || exit 1; done'
MemoryHigh=1100M
MemoryMax=1300M
