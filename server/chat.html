<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Code Workspace</title>
<style>
  :root { color-scheme: dark; --bg:#0d1117; --panel:#161b22; --line:#30363d; --muted:#7d8590; --text:#e6edf3; --blue:#58a6ff; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body { background: var(--bg); color: var(--text); font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: hidden; }
  button, select, textarea { font: inherit; }
  .workspace { height: 100%; display: grid; grid-template-columns: minmax(330px, 20%) minmax(0, 80%); }
  .chat-pane { min-width: 0; display: grid; grid-template-columns: 155px minmax(0, 1fr); border-right: 1px solid var(--line); }
  .history { min-width: 0; display: flex; flex-direction: column; height: 100%; overflow: hidden; background: #10151d; border-right: 1px solid var(--line); }
  .chat-pane.history-collapsed { grid-template-columns: 38px minmax(0, 1fr); }
  .chat-pane.history-collapsed .history-head > :not(.history-toggle), .chat-pane.history-collapsed .chat-list { display: none; }
  .chat-pane.history-collapsed .history { align-items: center; }
  .history-head { padding: 8px; border-bottom: 1px solid var(--line); }
  .history-toggle { width: 100%; margin-bottom: 7px; padding: 6px; border: 1px solid var(--line); border-radius: 7px; background: transparent; color: var(--muted); cursor: pointer; }
  .new-chat { width: 100%; padding: 9px; border: 1px solid var(--line); border-radius: 8px; background: #21262d; color: var(--text); cursor: pointer; }
  .chat-list { flex: 1; overflow-y: auto; padding: 8px; }
  .chat-item { position: relative; width: 100%; margin-bottom: 5px; padding: 9px 22px 9px 9px; border: 1px solid transparent; border-radius: 8px; background: transparent; color: #c9d1d9; text-align: left; cursor: pointer; }
  .chat-item:hover, .chat-item.active { background: #21262d; border-color: var(--line); }
  .chat-title { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-size: 11px; }
  .chat-date { margin-top: 4px; color: var(--muted); font-size: 9px; }
  .delete-chat { position: absolute; right: 5px; top: 7px; border: 0; background: transparent; color: var(--muted); cursor: pointer; }
  .chat-main { min-width: 0; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
  .chat-header { min-height: 60px; display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 8px 10px; border-bottom: 1px solid var(--line); background: var(--panel); }
  .controls { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 5px; }
  .brand { display: flex; align-items: center; gap: 9px; font-size: 13px; font-weight: 650; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #d29922; box-shadow: 0 0 7px #d29922; }
  .dot.online { background: #3fb950; box-shadow: 0 0 7px #3fb950; }
  .meta { margin-top: 3px; color: var(--muted); font-size: 9px; }
  select { max-width: 115px; padding: 6px; border: 1px solid var(--line); border-radius: 8px; background: #0d1117; color: var(--text); outline: none; font-size: 10px; }
  .messages { flex: 1; min-height: 0; overflow-y: auto; padding: 18px; }
  .empty { min-height: 100%; display: grid; place-items: center; text-align: center; color: var(--muted); }
  .empty h1 { margin: 0 0 8px; color: var(--text); font-size: 19px; }
  .message { display: flex; margin-bottom: 16px; }
  .message.user { justify-content: flex-end; }
  .bubble { max-width: 92%; padding: 11px 13px; border-radius: 12px; white-space: pre-wrap; overflow-wrap: anywhere; line-height: 1.5; font-size: 12px; }
  .user .bubble { background: #1f6feb; color: white; border-bottom-right-radius: 4px; }
  .assistant .bubble { background: var(--panel); border: 1px solid var(--line); border-bottom-left-radius: 4px; }
  .typing { color: var(--muted); }
  .stream-status { color: var(--muted); }
  .stream-text + .stream-text { margin-top: 10px; }
  .tool-call { margin: 10px 0; overflow: hidden; border: 1px solid #30363d; border-radius: 9px; background: #0d1117; }
  .tool-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 7px 10px; border-bottom: 1px solid #30363d; color: #79c0ff; font: 600 11px ui-monospace, SFMono-Regular, Consolas, monospace; }
  .tool-state { color: var(--muted); font-size: 9px; font-weight: 400; }
  .tool-input, .tool-output { margin: 0; padding: 10px; overflow: auto; white-space: pre-wrap; overflow-wrap: anywhere; color: #c9d1d9; font: 10px/1.5 ui-monospace, SFMono-Regular, Consolas, monospace; }
  .tool-output { max-height: 260px; border-top: 1px solid #30363d; color: #8b949e; }
  .tool-output.error { color: #ff7b72; }
  .stream-error { color: #ff7b72; }
  .stream-login { display: inline-block; margin-top: 10px; color: #79c0ff; }
  #statusText a { color: #79c0ff; }
  .composer-wrap { padding: 9px 12px 12px; }
  .composer { display: flex; align-items: flex-end; gap: 8px; padding: 7px; border: 1px solid var(--line); border-radius: 12px; background: var(--panel); }
  textarea { flex: 1; resize: none; min-height: 40px; max-height: 145px; padding: 10px; border: 0; outline: 0; background: transparent; color: var(--text); line-height: 1.4; }
  textarea::placeholder { color: var(--muted); }
  .send { width: 38px; height: 38px; border: 0; border-radius: 9px; background: #238636; color: white; font-size: 18px; cursor: pointer; }
  .send:disabled { opacity: .45; cursor: default; }
  .hint { padding-top: 5px; color: #6e7681; font-size: 9px; text-align: center; }
  .user-badge { display: flex; align-items: center; gap: 6px; padding: 5px 10px; border: 1px solid var(--line); border-radius: 8px; background: #21262d; font-size: 10px; color: var(--muted); }
  .user-badge .uname { color: var(--text); font-weight: 600; }
  .user-badge button { border: 0; background: transparent; color: var(--muted); cursor: pointer; font-size: 10px; padding: 0 0 0 4px; }
  .user-badge button:hover { color: var(--text); }
  /* Login Modal */
  .modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center; }
  .modal-overlay.hidden { display: none; }
  .modal { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 28px 28px 24px; width: 100%; max-width: 360px; }
  .modal h2 { color: var(--text); font-size: 17px; margin-bottom: 6px; }
  .modal p { color: var(--muted); font-size: 12px; margin-bottom: 20px; }
  .modal label { display: block; color: var(--muted); font-size: 11px; margin-bottom: 5px; }
  .modal input { display: block; width: 100%; padding: 9px 11px; background: #0d1117; border: 1px solid var(--line); border-radius: 8px; color: var(--text); font-size: 13px; outline: none; margin-bottom: 12px; }
  .modal input:focus { border-color: var(--blue); }
  .modal .btn-primary { width: 100%; padding: 10px; background: #238636; border: 0; border-radius: 8px; color: white; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
  .modal .btn-secondary { width: 100%; padding: 8px; background: transparent; border: 1px solid var(--line); border-radius: 8px; color: var(--muted); font-size: 12px; cursor: pointer; }
  .modal .btn-secondary:hover { color: var(--text); }
  .modal .modal-error { color: #f85149; font-size: 11px; margin-top: -8px; margin-bottom: 8px; display: none; }
  .preview-pane { min-width: 0; display: flex; flex-direction: column; background: #080b10; }
  .preview-bar { min-height: 60px; display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--line); background: var(--panel); }
  .preview-title { font-size: 13px; font-weight: 650; }
  .preview-url { margin-top: 3px; color: var(--muted); font: 9px monospace; }
  .preview-actions { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 7px; }
  .preview-actions button, .preview-actions a { padding: 7px 10px; border: 1px solid var(--line); border-radius: 8px; background: #21262d; color: #c9d1d9; text-decoration: none; cursor: pointer; }
  .preview-frame { flex: 1; width: 100%; border: 0; background: white; }
  @media (max-width: 900px) {
    body { overflow: auto; }
    .workspace { height: auto; min-height: 100%; grid-template-columns: 1fr; grid-template-rows: minmax(650px, 68vh) minmax(620px, 72vh); }
    .chat-pane { border-right: 0; border-bottom: 1px solid var(--line); }
  }
  @media (max-width: 560px) {
    .chat-pane { grid-template-columns: 105px minmax(0, 1fr); }
    .history-head, .chat-list { padding: 6px; }
    .chat-header, .preview-bar { padding: 8px; }
    .messages { padding: 12px 8px; }
  }
</style>
</head>
<body>
<!-- Login Modal -->
<div class="modal-overlay hidden" id="loginModal">
  <div class="modal">
    <h2 id="modalTitle">Anmelden</h2>
    <p id="modalSubtitle">Melde dich an um deine Chats und den Verlauf zu sehen.</p>
    <label>Benutzername</label>
    <input type="text" id="modalUsername" autocomplete="username" autocorrect="off" autocapitalize="none" spellcheck="false" placeholder="z.B. ole">
    <label>Passwort</label>
    <input type="password" id="modalPassword" autocomplete="current-password" placeholder="Passwort">
    <div class="modal-error" id="modalError"></div>
    <button class="btn-primary" id="modalSubmit">Anmelden</button>
    <button class="btn-secondary" id="modalToggle">Noch kein Konto? Registrieren</button>
  </div>
</div>

<div class="workspace">
  <section class="chat-pane" id="chatPane">
    <aside class="history">
      <div class="history-head">
        <button class="history-toggle" id="historyToggle" title="Alte Chats ein-/ausklappen">☰</button>
        <button class="new-chat" id="newChat">+ Neuer Chat</button>
      </div>
      <div class="chat-list" id="chatList"></div>
    </aside>
    <div class="chat-main">
      <header class="chat-header">
        <div>
          <div class="brand"><span class="dot" id="statusDot"></span>Claude Code</div>
        <div class="meta" id="statusText">Prüfe Subscription...</div>
        </div>
        <div class="controls">
          <div class="user-badge" id="userBadge" style="display:none">
            <span>👤</span><span class="uname" id="userBadgeName"></span>
            <button id="userLogout" title="Abmelden">×</button>
          </div>
          <select id="project" aria-label="Projekt"></select>
          <select id="model" aria-label="Claude-Modell">
            <option value="sonnet">Sonnet 4.6</option>
            <option value="opus">Opus 4.6</option>
            <option value="haiku">Haiku 4.5</option>
            <option value="fable" disabled>Fable 5 (nicht verfügbar)</option>
          </select>
          <select id="effort" aria-label="Aufwand">
            <option value="low">Aufwand: niedrig</option>
            <option value="medium" selected>Aufwand: mittel</option>
            <option value="high">Aufwand: hoch</option>
            <option value="xhigh">Aufwand: maximal</option>
          </select>
        </div>
      </header>
      <main class="messages" id="messages">
        <div class="empty" id="empty"><div><h1>Woran sollen wir arbeiten?</h1><p>Claude hat Zugriff auf Projekt und Server.</p></div></div>
      </main>
      <div class="composer-wrap">
        <form class="composer" id="form">
          <textarea id="input" rows="1" placeholder="Nachricht an Claude Code..." autofocus></textarea>
          <button class="send" id="send" type="submit" aria-label="Senden">↑</button>
        </form>
        <div class="hint" id="usage">Automatische Kontextkomprimierung aktiv · Chats werden gespeichert</div>
      </div>
    </div>
  </section>
  <section class="preview-pane">
    <header class="preview-bar">
      <div><div class="preview-title">Isolierte Preview</div><div class="preview-url" id="previewLabel">Preview wird geladen...</div></div>
      <div class="preview-actions">
        <button id="reloadPreview" type="button">↻ Neu laden</button>
        <button id="pushMain" type="button">Zu main pushen</button>
        <a id="openPreview" href="https://dashboard.praxis-sorgenfrey.de:8443" target="_blank" rel="noopener">Neuer Tab ↗</a>
      </div>
    </header>
    <iframe class="preview-frame" id="preview" src="https://dashboard.praxis-sorgenfrey.de:8443" title="Epikur Isolated Preview" allow="clipboard-read; clipboard-write"></iframe>
  </section>
</div>
<script>
  const chatList = document.getElementById('chatList');
  const messages = document.getElementById('messages');
  const emptyTemplate = document.getElementById('empty').cloneNode(true);
  const input = document.getElementById('input');
  const send = document.getElementById('send');
  const form = document.getElementById('form');
  const model = document.getElementById('model');
  const effort = document.getElementById('effort');
  const project = document.getElementById('project');
  const preview = document.getElementById('preview');
  const openPreview = document.getElementById('openPreview');
  const previewLabel = document.getElementById('previewLabel');
  const usage = document.getElementById('usage');
  let activeChat = null;
  let chats = [];
  let projects = [];
  let activatedProject = null;
  let busy = false;
  let previewRetryTimer = null;

  function startPreviewRetry(url, label) {
    clearInterval(previewRetryTimer);
    let attempts = 0;
    previewRetryTimer = setInterval(async () => {
      attempts++;
      try {
        const r = await fetch(url, { mode: 'no-cors' });
        clearInterval(previewRetryTimer);
        previewRetryTimer = null;
        preview.src = `${url}${url.includes('?') ? '&' : '?'}dashboardPreview=${Date.now()}`;
        previewLabel.textContent = `${label} · isolierte Dev-Datenbank`;
      } catch (e) {
        previewLabel.textContent = `${label} kompiliert... (${attempts * 20}s)`;
      }
      if (attempts >= 20) {
        clearInterval(previewRetryTimer);
        previewRetryTimer = null;
        previewLabel.textContent = `${label} · zum Laden auf ↻ klicken`;
      }
    }, 20_000);
  }

  async function api(url, options) {
    const response = await fetch(url, options);
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || 'Anfrage fehlgeschlagen');
    return data;
  }

  const STORAGE_KEY = 'practio-dashboard-v1';

  const GITHUB_REPOS = {
    'epikur': 'olesorgenfrey/epikur',
    'epikur-patient': 'olesorgenfrey/epikur-patient',
    'epikur-dashboard': 'olesorgenfrey/Epikur-dashboard',
    'epikur-produkt': 'olesorgenfrey/epikur-produkt',
    'epikur-werbung': 'olesorgenfrey/epikur-werbung',
  };

  function buildTaskCtx() {
    const activeRepo = GITHUB_REPOS[project?.value] || '';
    let s = '[Practio Kontext]\n';
    s += 'GitHub: olesorgenfrey · Repos: ' + Object.values(GITHUB_REPOS).join(', ') + '\n';
    if (activeRepo) s += 'Aktuelles Repo: ' + activeRepo + '\n';
    try {
      const d = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      const tasks = d.tasks || [], persons = d.persons || [];
      if (persons.length) s += 'Personen: ' + persons.map(p => `${p.name} (id:"${p.id}")`).join(', ') + '\n';
      const open = tasks.filter(t => !t.done);
      if (open.length) s += 'Offene Tasks:\n' + open.map(t => { const p = persons.find(x => x.id === t.assignee_id); return `• ${p ? p.name : '?'}: "${t.text}" (id:"${t.id}")`; }).join('\n') + '\n';
      const done = tasks.filter(t => t.done);
      if (done.length) s += `Erledigte Tasks: ${done.length}\n`;
    } catch {}
    return s + '[/Practio Kontext]\n\n';
  }

  function execTaskActions(responseText) {
    const RE = /<practio_action>([\s\S]*?)<\/practio_action>/g;
    const acts = []; let m;
    while ((m = RE.exec(responseText)) !== null) { try { acts.push(JSON.parse(m[1])); } catch {} }
    const clean = responseText.replace(/<practio_action>[\s\S]*?<\/practio_action>/g, '').replace(/\n{3,}/g, '\n\n').trim();
    if (!acts.length) return { clean, summary: '' };
    let d; try { d = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return { clean, summary: '' }; }
    let tasks = d.tasks || []; const persons = d.persons || [];
    const results = [];
    for (const a of acts) {
      if (a.action === 'create_task') {
        const p = persons.find(x => x.id === a.assignee_id);
        tasks = [...tasks, { id: Date.now().toString() + (Math.random() * 1000 | 0), text: a.text, meta: '', assignee_id: a.assignee_id, done: false, priority: 'medium' }];
        results.push(`Task erstellt: "${a.text}"${p ? ` → ${p.name}` : ''}`);
      } else if (a.action === 'toggle_task') {
        const t = tasks.find(x => x.id === a.id);
        tasks = tasks.map(x => x.id === a.id ? { ...x, done: a.done } : x);
        results.push(`"${t?.text || a.id}" ${a.done ? 'abgehakt' : 'geöffnet'}`);
      } else if (a.action === 'delete_task') {
        const t = tasks.find(x => x.id === a.id);
        tasks = tasks.filter(x => x.id !== a.id);
        results.push(`"${t?.text || a.id}" gelöscht`);
      }
    }
    d.tasks = tasks;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
    return { clean, summary: results.length ? '✓ ' + results.join(' · ') : '' };
  }

  function addMessage(role, text, extraClass = '') {
    const empty = messages.querySelector('.empty');
    if (empty) empty.remove();
    const row = document.createElement('div');
    row.className = `message ${role}`;
    const bubble = document.createElement('div');
    bubble.className = `bubble ${extraClass}`;
    bubble.textContent = text;
    row.appendChild(bubble);
    messages.appendChild(row);
    messages.scrollTop = messages.scrollHeight;
    return row;
  }

  function toolInputText(name, value) {
    const data = value || {};
    if (name === 'Bash') return data.command || JSON.stringify(data, null, 2);
    if (name === 'Write') return `${data.file_path || data.path || ''}\n\n${data.content || ''}`.trim();
    if (name === 'Edit') {
      const path = data.file_path || data.path || '';
      const before = data.old_string || '';
      const after = data.new_string || '';
      return `${path}\n\n--- vorher\n${before}\n+++ nachher\n${after}`.trim();
    }
    if (name === 'Read') return data.file_path || data.path || JSON.stringify(data, null, 2);
    return JSON.stringify(data, null, 2);
  }

  function createStreamRenderer(row) {
    const bubble = row.querySelector('.bubble');
    bubble.textContent = '';
    const status = document.createElement('div');
    status.className = 'stream-status';
    status.textContent = 'Claude arbeitet...';
    bubble.appendChild(status);
    const tools = new Map();
    let currentText = null;
    let hasText = false;

    const scroll = () => { messages.scrollTop = messages.scrollHeight; };
    const removeStatus = () => {
      if (status.isConnected) status.remove();
    };

    return {
      text(value) {
        if (!value) return;
        removeStatus();
        hasText = true;
        if (!currentText) {
          currentText = document.createElement('div');
          currentText.className = 'stream-text';
          bubble.appendChild(currentText);
        }
        currentText.textContent += value;
        scroll();
      },
      status(value) {
        if (!hasText && status.isConnected) status.textContent = value || 'Claude arbeitet...';
        scroll();
      },
      tool(event) {
        removeStatus();
        currentText = null;
        const card = document.createElement('div');
        card.className = 'tool-call';
        const head = document.createElement('div');
        head.className = 'tool-head';
        const title = document.createElement('span');
        title.textContent = event.name === 'Bash' ? '$ Befehl' : event.name;
        const state = document.createElement('span');
        state.className = 'tool-state';
        state.textContent = 'läuft...';
        head.append(title, state);
        const inputBlock = document.createElement('pre');
        inputBlock.className = 'tool-input';
        inputBlock.textContent = toolInputText(event.name, event.input);
        card.append(head, inputBlock);
        bubble.appendChild(card);
        tools.set(event.id, { card, state });
        scroll();
      },
      toolResult(event) {
        currentText = null;
        let tool = tools.get(event.id);
        if (!tool) {
          this.tool({ id: event.id, name: 'Tool', input: {} });
          tool = tools.get(event.id);
        }
        tool.state.textContent = event.isError ? 'Fehler' : 'fertig';
        const output = document.createElement('pre');
        output.className = `tool-output${event.isError ? ' error' : ''}`;
        output.textContent = event.content || '(keine Ausgabe)';
        tool.card.appendChild(output);
        scroll();
      },
      done(responseText) {
        removeStatus();
        if (!hasText && responseText) this.text(responseText);
        const { clean, summary } = execTaskActions(responseText || '');
        if ((responseText || '').includes('<practio_action>')) {
          bubble.querySelectorAll('.stream-text').forEach(node => node.remove());
          if (clean) {
            const finalText = document.createElement('div');
            finalText.className = 'stream-text';
            finalText.textContent = clean;
            bubble.appendChild(finalText);
          }
        }
        if (summary) {
          const actionSummary = document.createElement('div');
          actionSummary.className = 'stream-text';
          actionSummary.textContent = summary;
          bubble.appendChild(actionSummary);
        }
        scroll();
      },
      error(event) {
        removeStatus();
        currentText = null;
        const error = document.createElement('div');
        error.className = 'stream-error';
        error.textContent = `Fehler: ${event.message || 'Claude konnte die Anfrage nicht ausführen.'}`;
        bubble.appendChild(error);
        if (event.loginUrl) {
          const login = document.createElement('a');
          login.className = 'stream-login';
          login.href = event.loginUrl;
          login.target = '_blank';
          login.rel = 'noopener';
          login.textContent = 'Claude neu anmelden';
          bubble.appendChild(login);
        }
        scroll();
      },
    };
  }

  async function streamClaude(payload, onEvent) {
    const response = await fetch('/api/claude/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!response.ok) {
      let message = 'Anfrage fehlgeschlagen';
      try {
        const data = await response.json();
        message = data.error || message;
      } catch {}
      throw new Error(message);
    }
    if (!response.body) throw new Error('Der Browser unterstützt keine Streaming-Antworten.');

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const { value, done } = await reader.read();
      buffer += decoder.decode(value || new Uint8Array(), { stream: !done });
      const events = buffer.split(/\r?\n\r?\n/);
      buffer = events.pop() || '';
      for (const block of events) {
        const data = block.split(/\r?\n/)
          .filter(line => line.startsWith('data:'))
          .map(line => line.slice(5).trimStart())
          .join('\n');
        if (!data) continue;
        onEvent(JSON.parse(data));
      }
      if (done) break;
    }
  }

  function renderMessages(chat) {
    messages.innerHTML = '';
    if (!chat.messages.length) messages.appendChild(emptyTemplate.cloneNode(true));
    chat.messages.forEach(entry => addMessage(entry.role, entry.content));
    messages.scrollTop = messages.scrollHeight;
  }

  function renderChatList() {
    chatList.innerHTML = '';
    chats.forEach(chat => {
      const item = document.createElement('div');
      item.setAttribute('role', 'button');
      item.tabIndex = 0;
      item.className = `chat-item ${activeChat?.id === chat.id ? 'active' : ''}`;
      item.innerHTML = `<div class="chat-title"></div><div class="chat-date"></div><button class="delete-chat" title="Löschen">×</button>`;
      item.querySelector('.chat-title').textContent = chat.title;
      item.querySelector('.chat-date').textContent = new Date(chat.updatedAt).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' });
      item.addEventListener('click', event => {
        if (!event.target.classList.contains('delete-chat')) openChat(chat.id);
      });
      item.addEventListener('keydown', event => {
        if ((event.key === 'Enter' || event.key === ' ') && !event.target.classList.contains('delete-chat')) openChat(chat.id);
      });
      item.querySelector('.delete-chat').addEventListener('click', async event => {
        event.stopPropagation();
        await api(`/api/claude/chats/${chat.id}`, { method: 'DELETE' });
        await loadChats(activeChat?.id === chat.id ? null : activeChat?.id);
      });
      chatList.appendChild(item);
    });
  }

  async function loadChats(preferredId) {
    chats = await api('/api/claude/chats');
    renderChatList();
    const nextId = preferredId || chats[0]?.id;
    if (nextId) await openChat(nextId);
    else await createChat();
  }

  async function createChat() {
    const chat = await api('/api/claude/chats', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: model.value, effort: effort.value, project: project.value }),
    });
    chats.unshift(chat);
    await openChat(chat.id);
  }

  async function openChat(id) {
    activeChat = await api(`/api/claude/chats/${id}`);
    model.value = activeChat.model || 'sonnet';
    effort.value = activeChat.effort || 'medium';
    if (activatedProject !== (activeChat.project || 'epikur')) {
      project.value = activeChat.project || 'epikur';
      await activateProject(project.value);
    }
    renderUsage(activeChat.usage);
    renderMessages(activeChat);
    renderChatList();
    input.focus();
  }

  async function submitMessage() {
    const message = input.value.trim();
    if (!message || busy || !activeChat) return;
    busy = true;
    input.value = '';
    input.style.height = 'auto';
    send.disabled = true;
    addMessage('user', message);
    const pending = addMessage('assistant', 'Claude arbeitet...', 'typing');
    const renderer = createStreamRenderer(pending);
    const ctx = buildTaskCtx();
    let terminalEvent = null;
    try {
      await streamClaude({
        message,
        context: ctx,
        conversationId: activeChat.id,
        model: model.value,
        effort: effort.value,
      }, event => {
        if (event.type === 'text') renderer.text(event.text);
        else if (event.type === 'status') renderer.status(event.message);
        else if (event.type === 'tool_use') renderer.tool(event);
        else if (event.type === 'tool_result') renderer.toolResult(event);
        else if (event.type === 'error') terminalEvent = event;
        else if (event.type === 'done') {
          terminalEvent = event;
          renderer.done(event.response);
          activeChat = event.chat;
          renderUsage(event.usage);
        }
      });
      pending.querySelector('.bubble').classList.remove('typing');
      if (!terminalEvent) throw new Error('Die Claude-Verbindung wurde unerwartet beendet.');
      if (terminalEvent.type === 'error') renderer.error(terminalEvent);
      chats = await api('/api/claude/chats');
      renderChatList();
    } catch (error) {
      pending.querySelector('.bubble').classList.remove('typing');
      renderer.error({ message: error.message });
    } finally {
      busy = false;
      send.disabled = false;
      input.focus();
      messages.scrollTop = messages.scrollHeight;
    }
  }

  async function checkStatus() {
    try {
      const data = await api('/api/claude/status');
      const statusText = document.getElementById('statusText');
      statusText.textContent = '';
      if (data.loggedIn) {
        document.getElementById('statusDot').classList.add('online');
        statusText.textContent = `${data.subscriptionType || 'Claude.ai'} · Restkontingent wird von Claude nicht bereitgestellt`;
      } else {
        document.getElementById('statusDot').classList.remove('online');
        statusText.append(document.createTextNode(data.error || 'Claude ist nicht angemeldet.'));
        if (data.loginUrl) {
          statusText.append(document.createTextNode(' · '));
          const link = document.createElement('a');
          link.href = data.loginUrl;
          link.target = '_blank';
          link.rel = 'noopener';
          link.textContent = 'Jetzt anmelden';
          statusText.appendChild(link);
        }
      }
    } catch (error) {
      document.getElementById('statusText').textContent = error.message;
    }
  }

  function renderUsage(data) {
    if (!data) {
      usage.textContent = 'Automatische Kontextkomprimierung aktiv · Noch keine Token-Daten';
      return;
    }
    const context = data.contextPercent == null ? 'unbekannt' : `${data.contextPercent}%`;
    usage.textContent = `Kontext ${context} · ${data.inputTokens.toLocaleString('de-DE')} rein · ${data.outputTokens.toLocaleString('de-DE')} raus · Auto-Kompakt aktiv`;
  }

  async function loadProjects() {
    projects = await api('/api/claude/projects');
    project.innerHTML = '';
    projects.forEach(entry => {
      const option = document.createElement('option');
      option.value = entry.id;
      option.textContent = entry.label;
      project.appendChild(option);
    });
  }

  async function activateProject(id) {
    const selected = projects.find(entry => entry.id === id);
    if (!selected) return;
    clearInterval(previewRetryTimer);
    previewRetryTimer = null;
    project.disabled = true;
    previewLabel.textContent = selected.hasPreview ? `${selected.label} startet...` : `${selected.label} wird geöffnet...`;
    try {
      await api(`/api/claude/projects/${id}/activate`, { method: 'POST' });
      activatedProject = id;
      if (selected.hasPreview) {
        preview.removeAttribute('srcdoc');
        const separator = selected.previewUrl.includes('?') ? '&' : '?';
        preview.src = `${selected.previewUrl}${separator}dashboardPreview=${Date.now()}`;
        openPreview.href = selected.previewUrl;
        openPreview.hidden = false;
        document.getElementById('reloadPreview').hidden = false;
        previewLabel.textContent = `${selected.label} kompiliert...`;
        startPreviewRetry(selected.previewUrl, selected.label);
      } else {
        preview.removeAttribute('src');
        preview.srcdoc = `<!doctype html><html lang="de"><style>html,body{height:100%;margin:0}body{display:grid;place-items:center;background:#080b10;color:#7d8590;font:16px system-ui;text-align:center}.box{max-width:520px;padding:30px}h2{color:#e6edf3}</style><body><div class="box"><h2>${selected.label}</h2><p>Dieses Repository hat keine eigene Web-Preview. Du kannst es vollständig im Claude-Chat bearbeiten und anschließend nach main pushen.</p></div></body></html>`;
        openPreview.hidden = true;
        document.getElementById('reloadPreview').hidden = true;
        previewLabel.textContent = `${selected.label} · Code-Repository ohne Web-Preview`;
      }
    } catch (error) {
      previewLabel.textContent = error.message;
    } finally {
      project.disabled = false;
    }
  }

  form.addEventListener('submit', event => { event.preventDefault(); submitMessage(); });
  input.addEventListener('keydown', event => {
    if (event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); submitMessage(); }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = `${Math.min(input.scrollHeight, 145)}px`;
  });
  document.getElementById('newChat').addEventListener('click', createChat);
  document.getElementById('historyToggle').addEventListener('click', () => {
    document.getElementById('chatPane').classList.toggle('history-collapsed');
  });
  project.addEventListener('change', async () => {
    await activateProject(project.value);
    await createChat();
  });
  document.getElementById('reloadPreview').addEventListener('click', () => {
    preview.src = preview.src;
  });
  document.getElementById('pushMain').addEventListener('click', async event => {
    const button = event.currentTarget;
    if (!confirm('Alle Änderungen der Preview committen und nach main pushen?')) return;
    button.disabled = true;
    button.textContent = 'Pushe...';
    try {
      const result = await api('/api/claude/push-main', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: activeChat?.title || 'Update aus Dashboard Preview', project: activeChat?.project || project.value }),
      });
      button.textContent = result.noChanges ? 'Keine Änderungen' : `Gepusht${result.commit ? ` · ${result.commit}` : ''}`;
    } catch (error) {
      button.textContent = 'Push fehlgeschlagen';
      alert(error.message);
    } finally {
      setTimeout(() => { button.disabled = false; button.textContent = 'Zu main pushen'; }, 3500);
    }
  });

  // ─── User-System ────────────────────────────────────────────────────────────
  const loginModal = document.getElementById('loginModal');
  const modalTitle = document.getElementById('modalTitle');
  const modalSubtitle = document.getElementById('modalSubtitle');
  const modalUsername = document.getElementById('modalUsername');
  const modalPassword = document.getElementById('modalPassword');
  const modalSubmit = document.getElementById('modalSubmit');
  const modalToggle = document.getElementById('modalToggle');
  const modalError = document.getElementById('modalError');
  const userBadge = document.getElementById('userBadge');
  const userBadgeName = document.getElementById('userBadgeName');
  let modalMode = 'login';

  function showModal() { loginModal.classList.remove('hidden'); modalUsername.focus(); }
  function hideModal() { loginModal.classList.add('hidden'); }
  function setModalMode(mode) {
    modalMode = mode;
    if (mode === 'login') {
      modalTitle.textContent = 'Anmelden';
      modalSubtitle.textContent = 'Melde dich an um deine Chats und den Verlauf zu sehen.';
      modalSubmit.textContent = 'Anmelden';
      modalToggle.textContent = 'Noch kein Konto? Registrieren';
    } else {
      modalTitle.textContent = 'Registrieren';
      modalSubtitle.textContent = 'Erstelle ein Konto um deine Chats zu speichern.';
      modalSubmit.textContent = 'Konto erstellen';
      modalToggle.textContent = 'Bereits registriert? Anmelden';
    }
    modalError.style.display = 'none';
  }

  function setUser(username) {
    userBadgeName.textContent = username;
    userBadge.style.display = 'flex';
  }

  modalToggle.addEventListener('click', () => setModalMode(modalMode === 'login' ? 'register' : 'login'));

  modalSubmit.addEventListener('click', async () => {
    const username = modalUsername.value.trim();
    const password = modalPassword.value;
    if (!username || !password) { modalError.textContent = 'Bitte beide Felder ausfüllen.'; modalError.style.display = 'block'; return; }
    modalSubmit.disabled = true;
    modalError.style.display = 'none';
    try {
      const endpoint = modalMode === 'login' ? '/api/users/login' : '/api/users/register';
      const data = await api(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      setUser(data.username);
      hideModal();
      await loadChats();
      if (!activatedProject) await activateProject(project.value || 'epikur');
    } catch (error) {
      modalError.textContent = error.message;
      modalError.style.display = 'block';
    } finally {
      modalSubmit.disabled = false;
    }
  });

  [modalUsername, modalPassword].forEach(el => el.addEventListener('keydown', e => {
    if (e.key === 'Enter') modalSubmit.click();
  }));

  document.getElementById('userLogout').addEventListener('click', async () => {
    await api('/api/users/logout', { method: 'POST' });
    userBadge.style.display = 'none';
    showModal();
  });

  (async () => {
    await Promise.all([checkStatus(), loadProjects()]);
    const me = await api('/api/users/me');
    if (me.loggedIn) {
      setUser(me.username);
      await loadChats();
      if (!activatedProject) await activateProject(project.value || 'epikur');
    } else if (window.self === window.top) {
      // Nur bei Direktzugriff (nicht im iframe) das Modal zeigen
      showModal();
    } else {
      // Im iframe: Session wird vom Haupt-Dashboard geteilt — direkt laden
      await loadChats();
      if (!activatedProject) await activateProject(project.value || 'epikur');
    }
  })().catch(error => {
    messages.innerHTML = '';
    addMessage('assistant', `Fehler: ${error.message}`);
  });
</script>
</body>
</html>
