<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Practio — Internes Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root{
  --gb:rgba(255,255,255,.02);
  --gborder:rgba(255,255,255,.28);
  --t:#F4F6FB;--t2:rgba(244,246,251,.62);--t3:rgba(244,246,251,.35);
  --a:#6EA8FF;--gold:#D4B483;--ok:#4ADE80;--warn:#FBBf24;--err:#F87171;--pu:#C084FC;
  --ease:cubic-bezier(0.23,1,0.32,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;color:var(--t);background:#06070A;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.bg{position:fixed;inset:0;z-index:0;background-color:#06070A;background-size:contain;background-position:center;background-repeat:no-repeat;transition:opacity 800ms var(--ease),transform 1200ms var(--ease);transform:scale(1.04)}
.bg.code{background-image:none!important;background:#06070A}
.bg.on{opacity:1;transform:scale(1)}.bg.off{opacity:0}
.bgov{position:fixed;inset:0;z-index:1;background:linear-gradient(120deg,rgba(6,7,10,.85) 0%,rgba(6,7,10,.55) 50%,rgba(6,7,10,.75) 100%);pointer-events:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px}
.gl{background:var(--gb);border:1px solid var(--gborder);border-radius:14px;position:relative;overflow:hidden}
.gl::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:rgba(255,255,255,.45);pointer-events:none;z-index:1}
.gl::after{content:'';position:absolute;inset:0;border-radius:14px;background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,transparent 40%);pointer-events:none}
.app{position:relative;z-index:2;display:flex;min-height:100vh;padding:20px;gap:20px}
.sb{width:220px;flex-shrink:0;display:flex;flex-direction:column;padding:20px 0;position:sticky;top:20px;height:calc(100vh - 40px);animation:slin 700ms var(--ease) both;background:transparent}
.logo{display:flex;align-items:center;gap:11px;padding:0 16px 20px}
.lmark{width:34px;height:34px;border-radius:9px;background:linear-gradient(145deg,#6EA8FF,#A8C8FF);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#0A0E18;flex-shrink:0;box-shadow:0 4px 16px rgba(110,168,255,.35)}
.lname{font-size:15px;font-weight:700;letter-spacing:-.3px}.lmeta{font-size:10px;color:var(--t3);font-family:'IBM Plex Mono',monospace}
.nlbl{font-size:9px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:var(--t3);padding:18px 16px 8px}
.ni{display:flex;align-items:center;gap:11px;margin:2px 8px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--t2);transition:all 180ms var(--ease);min-height:44px;border:1px solid transparent;background:transparent;appearance:none;-webkit-appearance:none;width:calc(100% - 16px);text-align:left;font-family:inherit;position:relative;overflow:hidden}
.ni:hover{color:var(--t);background:rgba(255,255,255,.05)}
.ni.on{color:var(--t);background:rgba(110,168,255,.12);border-color:rgba(110,168,255,.25)}
.ni.on::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:var(--a);border-radius:0 3px 3px 0}
.nico{width:16px;height:16px;flex-shrink:0;display:flex}
.nbadge{margin-left:auto;font-size:10px;font-weight:600;font-family:'IBM Plex Mono',monospace;background:rgba(110,168,255,.2);color:#A8C8FF;padding:2px 6px;border-radius:20px}
.sbfoot{margin-top:auto;padding:16px 16px 0;font-family:'Instrument Serif',serif;font-style:italic;font-size:14px;color:var(--t2);line-height:1.4}
.main{flex:1;min-width:0;padding-bottom:40px}
.ph{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;padding-top:8px;animation:fup 500ms var(--ease) both}
.ptitle{font-family:'Instrument Serif',serif;font-size:42px;line-height:1;letter-spacing:-.5px}
.ptitle em{font-style:italic;color:var(--gold)}
.psub{font-size:12px;color:var(--t2);font-family:'IBM Plex Mono',monospace;margin-top:5px}
.pill{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:30px;background:rgba(255,255,255,.05);border:1px solid var(--gborder);font-size:11px;color:var(--t2);font-family:'IBM Plex Mono',monospace}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--ok);box-shadow:0 0 7px var(--ok);animation:pulse 2s ease-in-out infinite}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.sc{padding:20px;animation:fup 600ms var(--ease) both;transition:transform 250ms var(--ease)}
.sc:hover{transform:translateY(-2px)}
.stop{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sname{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--t3)}
.sbig{font-size:36px;font-weight:700;letter-spacing:-1.5px;line-height:1;font-variant-numeric:tabular-nums}
.scap{font-size:11px;color:var(--t2);font-family:'IBM Plex Mono',monospace;margin-top:7px}
.card{animation:fup 600ms var(--ease) both}
.ch{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:1px solid var(--gborder)}
.ct{font-size:13px;font-weight:600}
.cb{padding:16px 20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.fr{display:flex;align-items:center;gap:12px;padding:8px 0}
.fl{font-size:11px;color:var(--t2);font-family:'IBM Plex Mono',monospace;width:76px;flex-shrink:0}
.ft{flex:1;height:20px;border-radius:6px;background:rgba(255,255,255,.05);overflow:hidden}
.ff{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:600;color:#06070A;transition:width 700ms var(--ease)}
.fn{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--t2);width:18px;text-align:right}
.pt{height:4px;border-radius:3px;background:rgba(255,255,255,.07);overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width 700ms var(--ease)}
.msr{padding:12px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.msr:last-child{border-bottom:none}
.msh{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.msd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.msn{font-size:13px;font-weight:600;flex:1}
.msdt{font-size:10px;color:var(--t3);font-family:'IBM Plex Mono',monospace}
.msactions{display:flex;align-items:center;gap:5px;margin-left:4px}
.msprogress{width:62px;min-height:28px;padding:4px 7px;font-size:10px;font-family:'IBM Plex Mono',monospace;text-align:right}
.msform{display:grid;grid-template-columns:minmax(180px,2fr) minmax(140px,1fr) 110px 110px auto;gap:8px;padding-top:16px;border-top:1px solid var(--gborder);margin-top:14px;align-items:center}
.mscolor{height:38px;padding:4px;cursor:pointer}
@media(max-width:900px){.msform{grid-template-columns:1fr 1fr}.msform .mslabel{grid-column:1/-1}}
/* TASKS BOARD */
.board{display:flex;gap:14px;margin-bottom:18px;overflow-x:auto;padding-bottom:4px}
.board::-webkit-scrollbar{height:3px}
.tcol{flex:0 0 280px;display:flex;flex-direction:column}
.tch{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--gborder)}
.tcn{display:flex;align-items:center;gap:10px}
.av{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid var(--gborder);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.tct{font-size:13px;font-weight:600}
.tcb{flex:1;padding:8px 14px;min-height:80px}
.tce{text-align:center;padding:22px 0;color:var(--t3);font-size:11px;font-family:'IBM Plex Mono',monospace}
.tr{display:flex;align-items:flex-start;gap:11px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.tr:last-child{border-bottom:none}
.tck{width:18px;height:18px;flex-shrink:0;margin-top:2px;border:1.5px solid rgba(255,255,255,.2);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 160ms var(--ease);background:transparent;padding:0}
.tck:hover{border-color:var(--a);background:rgba(110,168,255,.12)}
.tck.done{background:var(--ok);border-color:var(--ok)}
.tck svg{width:10px;height:10px;opacity:0;transition:opacity 150ms}
.tck.done svg{opacity:1}
.tb{flex:1;min-width:0}.ttxt{font-size:13px;font-weight:500;line-height:1.4}
.ttxt.done{text-decoration:line-through;color:var(--t3)}
.tmet{font-size:10px;color:var(--t3);font-family:'IBM Plex Mono',monospace;margin-top:2px}
.tdel{background:none;border:none;color:var(--t3);cursor:pointer;padding:2px 5px;font-size:13px;line-height:1;transition:color 140ms;align-self:center}
.tdel:hover{color:var(--err)}
.tci{padding:10px 14px;border-top:1px solid var(--gborder)}
.tci input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:var(--t);padding:8px 11px;border-radius:8px;font-size:12px;font-family:'Inter',sans-serif;outline:none;transition:border-color 150ms;min-height:auto}
.tci input:focus{border-color:var(--a)}.tci input::placeholder{color:var(--t3)}
.addcol{flex:0 0 200px;display:flex;align-items:center;justify-content:center;gap:8px;border:1px dashed rgba(255,255,255,.15);border-radius:14px;color:var(--t3);font-size:13px;cursor:pointer;transition:all 200ms var(--ease);background:transparent;font-family:'Inter',sans-serif;min-height:160px}
.addcol:hover{border-color:rgba(255,255,255,.3);color:var(--t2);background:rgba(255,255,255,.02)}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;font-family:'IBM Plex Mono',monospace}
.badge::before{content:'';width:4px;height:4px;border-radius:50%;background:currentColor}
.bd-bl{background:rgba(110,168,255,.15);color:#A8C8FF}.bd-gn{background:rgba(74,222,128,.13);color:var(--ok)}
.bd-yw{background:rgba(251,191,36,.13);color:var(--warn)}.bd-rd{background:rgba(248,113,113,.13);color:var(--err)}
.bd-gy{background:rgba(255,255,255,.08);color:var(--t2)}.bd-pu{background:rgba(192,132,252,.13);color:var(--pu)}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--t3);padding:0 13px 11px;border-bottom:1px solid var(--gborder)}
.tbl td{padding:11px 13px;font-size:12px;color:var(--t2);border-bottom:1px solid rgba(255,255,255,.05)}
.tbl tbody tr{transition:background 130ms;cursor:pointer}
.tbl tbody tr:hover td{background:rgba(255,255,255,.03)}
.tbl tbody tr:last-child td{border-bottom:none}
.td-n{font-weight:600;color:var(--t)!important}.td-m{font-family:'IBM Plex Mono',monospace;font-size:10px!important}
.finr{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:13px}
.finr:last-child{border-bottom:none}
.finl{color:var(--t2);display:flex;align-items:center;gap:9px}
.find{width:6px;height:6px;border-radius:50%}
.finv{font-family:'IBM Plex Mono',monospace;font-weight:600;font-variant-numeric:tabular-nums}
.tabs{display:flex;gap:5px;margin-bottom:18px;flex-wrap:wrap}
.tab{padding:7px 13px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;color:var(--t2);border:1px solid transparent;background:rgba(255,255,255,.03);transition:all 160ms var(--ease);min-height:34px;display:inline-flex;align-items:center;gap:5px;font-family:'Inter',sans-serif}
.tab:hover{color:var(--t);background:rgba(255,255,255,.07)}
.tab.on{color:var(--t);background:rgba(110,168,255,.15);border-color:rgba(110,168,255,.25)}
.tct2{font-family:'IBM Plex Mono',monospace;opacity:.55}
input,select{background:rgba(255,255,255,.05);border:1px solid var(--gborder);color:var(--t);padding:9px 12px;border-radius:9px;font-size:12px;font-family:'Inter',sans-serif;outline:none;transition:border-color 160ms;min-height:38px}
input:focus,select:focus{border-color:var(--a)}
input::placeholder{color:var(--t3)}select option{background:#14161E}
.ssel{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--t2);padding:4px 7px;border-radius:7px;font-size:10px;font-family:'IBM Plex Mono',monospace;cursor:pointer;outline:none}
.btn{padding:9px 16px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all 160ms var(--ease);min-height:38px;display:inline-flex;align-items:center;gap:5px;text-decoration:none}
.btn:active{transform:scale(.97)}
.btn-p{background:linear-gradient(135deg,#6EA8FF,#5A93FF);color:#06070A;box-shadow:0 3px 12px rgba(110,168,255,.3)}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(110,168,255,.4)}
.btn-g{background:rgba(255,255,255,.05);color:var(--t2);border:1px solid var(--gborder)}
.btn-g:hover{background:rgba(255,255,255,.09);color:var(--t)}
.inrow{display:flex;gap:8px;padding-top:16px;border-top:1px solid var(--gborder);margin-top:14px}
.dbb{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:9px;margin-bottom:18px;font-size:12px;font-family:'IBM Plex Mono',monospace}
.dbl{background:rgba(110,168,255,.1);border:1px solid rgba(110,168,255,.2);color:#A8C8FF}
.dbe{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);color:var(--err)}
.dbo{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.18);color:var(--ok)}
.spin{width:12px;height:12px;border:2px solid rgba(110,168,255,.3);border-top-color:#A8C8FF;border-radius:50%;animation:spin 600ms linear infinite;display:inline-block}
.savepill{position:fixed;right:20px;bottom:20px;z-index:10;display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:30px;background:rgba(6,7,10,.72);border:1px solid var(--gborder);backdrop-filter:blur(12px);font-size:10px;color:var(--t2);font-family:'IBM Plex Mono',monospace}
.savedot{width:6px;height:6px;border-radius:50%;background:var(--ok);box-shadow:0 0 7px var(--ok)}
/* TERMINAL */
.tw{display:flex;flex-direction:column;height:calc(100vh - 180px);min-height:400px;padding:0;overflow:hidden}
.tbar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--gborder)}
.tdots{display:flex;gap:6px}.tdot{width:11px;height:11px;border-radius:50%}
.ttitle{font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--t2);margin-left:6px}
.tstat{display:flex;align-items:center;gap:7px;font-size:11px;font-family:'IBM Plex Mono',monospace}
.tstatd{width:7px;height:7px;border-radius:50%}
.toff{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px;text-align:center}
@keyframes fup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slin{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
.page{animation:fup 450ms var(--ease) both}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
/* AI CHAT */
.aichat-btn{position:fixed;bottom:70px;right:20px;width:48px;height:48px;border-radius:50%;background:linear-gradient(145deg,#6EA8FF,#5A93FF);border:none;color:#06070A;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(110,168,255,.4);transition:all 250ms var(--ease);z-index:8002}
.aichat-btn:hover{transform:scale(1.08);box-shadow:0 6px 26px rgba(110,168,255,.55)}
.aichat-btn.open{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);color:var(--t2);box-shadow:none;transform:none}
.aichat-panel{position:fixed;top:0;right:-420px;bottom:0;width:400px;z-index:8001;background:rgba(8,10,16,.97);backdrop-filter:blur(24px);border-left:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;transition:right 350ms var(--ease)}
.aichat-panel.open{right:0;box-shadow:-20px 0 60px rgba(0,0,0,.6)}
.aichat-msgs{flex:1;min-height:0;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:12px}
.aichat-msgs::-webkit-scrollbar{width:3px}.aichat-msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.aichat-bubble{max-width:85%;padding:9px 13px;font-size:13px;line-height:1.65;color:var(--t);word-break:break-word}
.aichat-bubble.user{align-self:flex-end;background:rgba(110,168,255,.18);border:1px solid rgba(110,168,255,.28);border-radius:13px 13px 4px 13px}
.aichat-bubble.ai{align-self:flex-start;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);border-radius:13px 13px 13px 4px}
.aichat-controls{display:flex;gap:6px;width:100%;margin-top:10px}
.aichat-select{min-width:0;flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--t2);border-radius:7px;padding:6px 7px;font-size:10px;font-family:'IBM Plex Mono',monospace;outline:none}
.aichat-select option{background:#11141c;color:var(--t)}
.aichat-login{margin-top:9px;padding:9px 10px;border-radius:8px;background:rgba(110,168,255,.08);border:1px solid rgba(110,168,255,.2);font-size:11px;color:var(--t2);line-height:1.5}
.aichat-code{display:inline-block;margin:5px 0 0;padding:4px 7px;border-radius:5px;background:rgba(255,255,255,.08);color:#fff;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.08em}
.aichat-in{padding:12px 18px 16px;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0}
.aichat-ta{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:var(--t);padding:9px 12px;border-radius:10px;font-size:13px;font-family:'Inter',sans-serif;outline:none;resize:none;line-height:1.5;max-height:100px;overflow-y:auto;transition:border-color 150ms}
.aichat-ta:focus{border-color:var(--a)}.aichat-ta::placeholder{color:var(--t3)}
</style>
</head>
<body>

<!-- Auth Overlay (vanilla JS, lädt vor React) -->
<div id="authOverlay" style="position:fixed;inset:0;z-index:9999;background:#06070A;display:flex;align-items:center;justify-content:center;padding:20px;font-family:'Inter',-apple-system,sans-serif;">
  <div style="width:100%;max-width:360px">
    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:13px;letter-spacing:.15em;text-transform:uppercase;color:rgba(244,246,251,.35);margin-bottom:8px">Practio</div>
      <h1 style="font-size:24px;font-weight:600;color:#F4F6FB;margin:0" id="authHeading">Willkommen zurück</h1>
      <p style="margin-top:8px;font-size:13px;color:rgba(244,246,251,.5)" id="authSub">Melde dich an um fortzufahren.</p>
    </div>
    <div style="background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:24px">
      <label style="display:block;font-size:11px;color:rgba(244,246,251,.5);margin-bottom:6px">Benutzername</label>
      <input id="authUser" type="text" autocomplete="username" autocorrect="off" autocapitalize="none" spellcheck="false" placeholder="z.B. ole"
        style="display:block;width:100%;padding:10px 12px;background:#0d1117;border:1px solid rgba(255,255,255,.1);border-radius:9px;color:#F4F6FB;font-size:14px;outline:none;margin-bottom:14px;font-family:inherit">
      <label style="display:block;font-size:11px;color:rgba(244,246,251,.5);margin-bottom:6px">Passwort</label>
      <input id="authPass" type="password" autocomplete="current-password" placeholder="••••••"
        style="display:block;width:100%;padding:10px 12px;background:#0d1117;border:1px solid rgba(255,255,255,.1);border-radius:9px;color:#F4F6FB;font-size:14px;outline:none;margin-bottom:6px;font-family:inherit">
      <div id="authErr" style="font-size:11px;color:#F87171;min-height:18px;margin-bottom:10px"></div>

<script>
(function(){
  var COLORS=['blue','purple','green','yellow','red'];

  function colorForName(name){
    var h=0;for(var i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))>>>0;
    return COLORS[h%COLORS.length];
  }

  function ensurePerson(username){
    try{
      var key='practio-dashboard-v1';
      var data=JSON.parse(localStorage.getItem(key)||'{}');
      var persons=data.persons||[];
      var lname=username.toLowerCase();
      var exists=persons.some(function(p){return p.name.toLowerCase()===lname;});
      if(!exists){
        var np={id:Date.now().toString(),name:username,color:colorForName(username),created_at:new Date().toISOString()};
        persons.push(np);
        localStorage.setItem(key,JSON.stringify(Object.assign({},data,{persons:persons})));
        window.dispatchEvent(new CustomEvent('practio:person-added',{detail:np}));
      }
    }catch(e){}
  }

  var mode='login';
  var overlay=document.getElementById('authOverlay');

  ['authUser','authPass'].forEach(function(id){
    var el=document.getElementById(id);
    el.addEventListener('focus',function(){el.style.borderColor='#6EA8FF';});
    el.addEventListener('blur',function(){el.style.borderColor='rgba(255,255,255,.1)';});
    el.addEventListener('keydown',function(e){if(e.key==='Enter')doAuth();});
  });

  window.toggleAuthMode=function(){
    mode=mode==='login'?'register':'login';
    document.getElementById('authHeading').textContent=mode==='login'?'Willkommen zurück':'Konto erstellen';
    document.getElementById('authSub').textContent=mode==='login'?'Melde dich an um fortzufahren.':'Wähle Benutzername und Passwort.';
    document.getElementById('authBtn').textContent=mode==='login'?'Anmelden':'Registrieren';
    document.getElementById('authToggleBtn').textContent=mode==='login'?'Noch kein Konto? Registrieren':'Bereits registriert? Anmelden';
    document.getElementById('authErr').textContent='';
    document.getElementById('authPass').autocomplete=mode==='login'?'current-password':'new-password';
  };

  function showPending(username){
    document.getElementById('authHeading').textContent='Anfrage gesendet';
    document.getElementById('authSub').textContent='';
    document.getElementById('authUser').style.display='none';
    document.getElementById('authPass').style.display='none';
    document.getElementById('authUser').previousElementSibling.style.display='none';
    document.getElementById('authPass').previousElementSibling.style.display='none';
    document.getElementById('authErr').style.display='none';
    document.getElementById('authBtn').style.display='none';
    document.getElementById('authToggleBtn').style.display='none';
    var box=document.querySelector('#authOverlay .modal-inner')||document.querySelector('#authOverlay [style*="background"]');
    var msg=document.createElement('div');
    msg.style.cssText='text-align:center;padding:8px 0;color:rgba(244,246,251,.7);font-size:13px;line-height:1.7';
    msg.innerHTML='Dein Account <strong style="color:#F4F6FB">'+username+'</strong> wurde erstellt.<br>Der Admin muss deine Anfrage erst genehmigen.<br><span style="color:rgba(244,246,251,.4);font-size:11px">Du erhältst keinen weiteren Hinweis — versuch es einfach später erneut.</span>';
    document.querySelector('#authOverlay > div > div:last-child').appendChild(msg);
  }

  function unlockOverlay(){
    overlay.style.transition='opacity .4s';
    overlay.style.opacity='0';
    setTimeout(function(){overlay.style.display='none';},400);
  }

  window.doAuth=function(){
    var username=document.getElementById('authUser').value.trim();
    var password=document.getElementById('authPass').value;
    var btn=document.getElementById('authBtn');
    var err=document.getElementById('authErr');
    if(!username||!password){err.textContent='Bitte beide Felder ausfüllen.';return;}
    btn.disabled=true;btn.textContent='...';err.textContent='';
    var endpoint=mode==='login'?'/api/users/login':'/api/users/register';
    fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:username,password:password})})
      .then(function(r){return r.json().then(function(d){return{ok:r.ok,status:r.status,data:d};});})
      .then(function(res){
        if(res.ok && res.data.pending){
          showPending(username);
        } else if(res.ok){
          window.__practioUser={username:res.data.username||username,isAdmin:res.data.isAdmin||false};
          ensurePerson(res.data.username||username);
          unlockOverlay();
        } else {
          err.textContent=res.data.error||'Fehler beim Anmelden.';
          btn.disabled=false;btn.textContent=mode==='login'?'Anmelden':'Registrieren';
        }
      })
      .catch(function(){
        err.textContent='Verbindungsfehler. Bitte neu laden.';
        btn.disabled=false;btn.textContent=mode==='login'?'Anmelden':'Registrieren';
      });
  };

  // Prüfen ob bereits eingeloggt
  fetch('/api/users/me')
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.loggedIn){
        window.__practioUser={username:d.username,isAdmin:d.isAdmin||false};
        ensurePerson(d.username);
        overlay.style.display='none';
      } else {
        document.getElementById('authUser').focus();
      }
    })
    .catch(function(){document.getElementById('authUser').focus();});
})();
</script>

function Milestones({milestones,setMilestones,db}){
  const [adding,setAdding]=useState(false);
  const [draft,setDraft]=useState({label:"",target_date:"",progress:0,color:"#6EA8FF"});
  const add=async()=>{
    if(!draft.label.trim())return;
    const progress=Math.max(0,Math.min(100,Number(draft.progress)||0));
    const row={
      label:draft.label.trim(),
      target_date:draft.target_date||null,
      done:progress===100,
      progress,
      color:draft.color,
      sort_order:milestones.reduce((max,m)=>Math.max(max,Number(m.sort_order)||0),0)+1,
    };
    try{
      if(db==="ok"){
        const[r]=await sb.post("milestones",row);
        setMilestones(ms=>[...ms,r]);
      }else setMilestones(ms=>[...ms,{...row,id:Date.now().toString()}]);
    }catch{setMilestones(ms=>[...ms,{...row,id:Date.now().toString()}]);}
    setDraft({label:"",target_date:"",progress:0,color:"#6EA8FF"});
    setAdding(false);
  };
  const update=async(id,patch)=>{
    setMilestones(ms=>ms.map(m=>m.id===id?{...m,...patch}:m));
    if(db==="ok")try{await sb.patch("milestones",id,patch);}catch{}
  };
  const setProgress=(id,value)=>{
    const progress=Math.max(0,Math.min(100,Number(value)||0));
    update(id,{progress,done:progress===100});
  };
  const toggle=milestone=>update(milestone.id,{done:!milestone.done,progress:!milestone.done?100:Math.min(milestone.progress,99)});
  const del=async milestone=>{
    if(!confirm(`"${milestone.label}" wirklich löschen?`))return;
    setMilestones(ms=>ms.filter(m=>m.id!==milestone.id));
    if(db==="ok")try{await sb.del("milestones",milestone.id);}catch{}
  };
  return(
    <div className="page">
      <div className="ph">
        <div><h1 className="ptitle">Meilen<em>steine</em></h1><p className="psub">{milestones.filter(m=>m.done).length} erledigt · {milestones.filter(m=>!m.done).length} offen</p></div>
        <button className="btn btn-g" onClick={()=>setAdding(v=>!v)}><Ic d={ic.plus} size={14}/> Meilenstein</button>
      </div>
      <Dbb s={db}/>
      <div className="gl card">
        <div className="cb">
          {milestones.length===0?<div className="tce">Noch keine Meilensteine</div>:
          milestones.map((m,i)=>(
            <div className="msr" key={m.id} style={{animation:`fup 300ms var(--ease) ${i*50}ms both`}}>
              <div className="msh">
                <div className="msd" style={{background:m.color}}></div>
                <span className="msn">{m.label}</span>
                {m.done&&<span className="badge bd-gn">Done</span>}
                <span className="msdt">{m.target_date||"laufend"}</span>
                <div className="msactions">
                  <input className="msprogress" type="number" min="0" max="100" value={m.progress} onChange={e=>setProgress(m.id,e.target.value)} title="Fortschritt in Prozent"/>
                  <button className={`tck ${m.done?"done":""}`} onClick={()=>toggle(m)} title={m.done?"Wieder öffnen":"Als erledigt markieren"}>
                    <svg viewBox="0 0 24 24" fill="none" stroke="#06070A" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><path d={ic.check}/></svg>
                  </button>
                  <button className="tdel" onClick={()=>del(m)} title="Meilenstein löschen">✕</button>
                </div>
              </div>
              <div className="pt"><div className="pf" style={{width:`${m.progress}%`,background:m.color}}></div></div>
              <div style={{fontSize:10,color:"var(--t3)",fontFamily:"'IBM Plex Mono',monospace",marginTop:5}}>{m.progress}%</div>
            </div>
          ))}
          {adding&&(
            <div className="msform">
              <input autoFocus className="mslabel" placeholder="Meilenstein…" value={draft.label} onChange={e=>setDraft({...draft,label:e.target.value})} onKeyDown={e=>{if(e.key==="Enter")add();if(e.key==="Escape")setAdding(false);}}/>
              <input type="date" value={draft.target_date} onChange={e=>setDraft({...draft,target_date:e.target.value})}/>
              <input type="number" min="0" max="100" placeholder="Fortschritt %" value={draft.progress} onChange={e=>setDraft({...draft,progress:e.target.value})}/>
              <input className="mscolor" type="color" value={draft.color} onChange={e=>setDraft({...draft,color:e.target.value})} title="Farbe"/>
              <div style={{display:"flex",gap:6}}>
                <button className="btn btn-p" onClick={add}>Hinzufügen</button>
                <button className="btn btn-g" onClick={()=>setAdding(false)}>✕</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

  'epikur-dashboard':'olesorgenfrey/Epikur-dashboard',

function currentTaskIdentity(persons){
  const username=(window.__practioUser?.username||'').trim();
  const person=persons.find(p=>p.name.toLocaleLowerCase('de-DE')===username.toLocaleLowerCase('de-DE'))||null;
  return{username,person};
}

function formatTaskList(tasks,persons){
  return tasks.map(t=>{
    const p=persons.find(x=>x.id===t.assignee_id);
    return`• ${p?p.name:'?'}: "${t.text}" (id:"${t.id}")`;
  }).join('\n');
}

function buildTaskCtx(tasks,persons){
  const{username,person}=currentTaskIdentity(persons);
  const ownTasks=person?tasks.filter(t=>t.assignee_id===person.id):[];
  const otherTasks=person?tasks.filter(t=>t.assignee_id!==person.id):tasks;
  let s='[Practio Kontext]\n';
  s+=`Aktueller Nutzer: ${username||'unbekannt'}${person?` (Person-ID:"${person.id}")`:''}\n`;
  s+='Regel: Konzentriere dich bei allgemeinen Fragen und Empfehlungen vorrangig auf die Tasks des aktuellen Nutzers. ';
  s+='Tasks anderer Personen sind ebenfalls verfügbar und dürfen normal besprochen oder geändert werden, wenn sie für die Anfrage relevant sind.\n';
  if(person)s+=`Neue Tasks ohne ausdrücklich genannte andere Zuweisung standardmäßig ${person.name} (id:"${person.id}") zuweisen.\n`;
  s+='GitHub: olesorgenfrey · Repos: '+Object.values(GITHUB_REPOS).join(', ')+'\n';
  if(persons.length)s+='Personen: '+persons.map(p=>`${p.name} (id:"${p.id}")`).join(', ')+'\n';
  const ownOpen=ownTasks.filter(t=>!t.done);
  const otherOpen=otherTasks.filter(t=>!t.done);
  if(ownOpen.length)s+='Eigene offene Tasks (Priorität):\n'+formatTaskList(ownOpen,persons)+'\n';
  if(otherOpen.length)s+='Weitere offene Tasks:\n'+formatTaskList(otherOpen,persons)+'\n';
  const ownDone=ownTasks.filter(t=>t.done).length;
  const otherDone=otherTasks.filter(t=>t.done).length;
  if(ownDone||otherDone)s+=`Erledigte Tasks: eigene ${ownDone}, weitere ${otherDone}\n`;
  return{context:s+'[/Practio Kontext]\n\n',currentPerson:person};
}

function execTaskActions(responseText,tasks,persons,setTasks){
  const RE=/<practio_action>([\s\S]*?)<\/practio_action>/g;
  const acts=[];let m;
  while((m=RE.exec(responseText))!==null){try{acts.push(JSON.parse(m[1]));}catch{}}
  const clean=responseText.replace(/<practio_action>[\s\S]*?<\/practio_action>/g,'').replace(/\n{3,}/g,'\n\n').trim();
  if(!acts.length)return{clean,summary:''};
  let next=[...tasks];
  const results=[];
  for(const a of acts){
    if(a.action==='create_task'){
      const p=persons.find(x=>x.id===a.assignee_id);
      next=[...next,{id:Date.now().toString()+(Math.random()*1000|0),text:a.text,meta:'',assignee_id:a.assignee_id,done:false,priority:'medium'}];
      results.push(`Task erstellt: "${a.text}"${p?` → ${p.name}`:''}`);}
    else if(a.action==='toggle_task'){
      const t=next.find(x=>x.id===a.id);
      if(!t){results.push(`Task ${a.id} nicht gefunden`);continue;}
      next=next.map(x=>x.id===a.id?{...x,done:a.done}:x);
      results.push(`"${t?.text||a.id}" ${a.done?'abgehakt':'geöffnet'}`);}
    else if(a.action==='delete_task'){
      const t=next.find(x=>x.id===a.id);
      if(!t){results.push(`Task ${a.id} nicht gefunden`);continue;}
      next=next.filter(x=>x.id!==a.id);
      results.push(`"${t?.text||a.id}" gelöscht`);}
  }
  setTasks(next);
  try{const d=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');d.tasks=next;localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}catch{}
  return{clean,summary:results.length?'\n\n✓ '+results.join(' · '):''};
}

    return()=>clearInterval(poll);
  },[deviceLogin,provider]);
  useEffect(()=>{sessionStorage.setItem(`aiModel:${provider}`,model);},[provider,model]);
  useEffect(()=>{sessionStorage.setItem(`aiEffort:${provider}`,effort);},[provider,effort]);

  const ensureChat=async()=>{
    if(chatId)return chatId;
    try{
      const r=await fetch('/api/claude/chats',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({provider,project:'epikur-dashboard',model,effort})});
      const d=await r.json();
      if(!r.ok||!d.id)return null;
      sessionStorage.setItem(`aiDashChatId:${provider}`,d.id);
      setChatId(d.id);
      return d.id;
    }catch{return null;}
  };

  const send=async()=>{
    const text=input.trim();
    if(!text||loading)return;
    setInput('');
    const id=await ensureChat();
    if(!id){setMsgs(ms=>[...ms,{role:'assistant',content:'Fehler: Chat konnte nicht erstellt werden.'}]);return;}
    setMsgs(ms=>[...ms,{role:'user',content:text}]);
    setLoading(true);
    const taskCtx=buildTaskCtx(tasks,persons);
    try{
      const r=await fetch(`/api/${provider}/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({conversationId:id,message:text,context:taskCtx.context,model,effort})});
      const d=await r.json();
      if(!r.ok){
        setMsgs(ms=>[...ms,{role:'assistant',content:d.error||`${provider==='codex'?'Codex':'Claude'} konnte die Anfrage nicht ausführen.`,loginUrl:d.loginUrl||null,loginProvider:d.loginProvider||null}]);
        setLoading(false);
        if(r.status===401)setProviderStatus({loggedIn:false});
        return;
      }
      const raw=d.response||d.error||'Keine Antwort.';
      const{clean,summary}=execTaskActions(raw,tasks,persons,setTasks);
      setMsgs(ms=>[...ms,{role:'assistant',content:clean+(summary?'\n'+summary.trim():'')}]);
    }catch{
      setMsgs(ms=>[...ms,{role:'assistant',content:'Verbindungsfehler. Bitte neu versuchen.'}]);
    }
    setLoading(false);
  };

  const renderText=c=>c.split('\n').map((l,i,a)=><React.Fragment key={i}>{l}{i<a.length-1&&<br/>}</React.Fragment>);

  return(
    <>
      {open&&<div style={{position:'fixed',inset:0,zIndex:8000}} onClick={()=>setOpen(false)}/>}
      <div className={`aichat-panel${open?' open':''}`}>
        <div style={{padding:'16px 18px',borderBottom:'1px solid rgba(255,255,255,.08)',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:32,height:32,borderRadius:9,background:'linear-gradient(145deg,#6EA8FF,#A8C8FF)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke="#06070A" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:600}}>KI-Assistent</div>
              <div style={{fontSize:10,color:'var(--t3)',fontFamily:"'IBM Plex Mono',monospace"}}>Nutzer: {username} · {provider==='codex'?'Codex':'Claude'}</div>
            </div>
            <button onClick={()=>setOpen(false)} style={{border:0,background:'rgba(255,255,255,.05)',color:'var(--t3)',cursor:'pointer',borderRadius:7,width:28,height:28,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>✕</button>
          </div>
          <div className="aichat-controls">
            <select className="aichat-select" value={provider} onChange={e=>setProvider(e.target.value)} disabled={loading}>
              <option value="claude">Claude</option>
              <option value="codex">Codex</option>
            </select>
            <select className="aichat-select" value={model} onChange={e=>setModel(e.target.value)} disabled={loading}>
              {modelOptions.map(item=><option key={item.id} value={item.id}>{item.label}</option>)}
            </select>
            <select className="aichat-select" value={effort} onChange={e=>setEffort(e.target.value)} disabled={loading}>
              <option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option><option value="xhigh">XHigh</option>
            </select>
          </div>
          {providerStatus&&!providerStatus.loggedIn&&(
            <button className="btn btn-p" onClick={beginLogin} disabled={loginBusy} style={{width:'100%',marginTop:9,padding:'7px 10px',fontSize:11}}>
              {loginBusy?'Login wird gestartet…':`${provider==='codex'?'Codex':'Claude'} anmelden`}
            </button>
          )}
          {deviceLogin&&(
            <div className="aichat-login">
              Öffne <a href={deviceLogin.url} target="_blank" rel="noopener noreferrer" style={{color:'#A8C8FF'}}>OpenAI Device Login</a> und gib diesen Code ein:<br/>
              <span className="aichat-code">{deviceLogin.code}</span>
            </div>
          )}
        </div>
        <div className="aichat-msgs">
          {msgs.length===0&&(
            <div style={{color:'var(--t3)',fontSize:12,fontFamily:"'IBM Plex Mono',monospace",textAlign:'center',padding:'40px 16px',lineHeight:2}}>
              Stell mir eine Frage.<br/>
              <span style={{fontSize:10,opacity:.55}}>Deine eigenen Tasks stehen standardmäßig im Fokus.<br/>Team-Tasks bleiben vollständig verfügbar.</span>
            </div>
          )}
          {msgs.map((m,i)=>(
            <div key={i} className={`aichat-bubble ${m.role==='user'?'user':'ai'}`}>
              {renderText(m.content)}
              {m.loginUrl&&<a href={m.loginUrl} target="_blank" rel="noopener noreferrer" style={{display:'block',marginTop:10,color:'#A8C8FF',fontWeight:600}}>Claude jetzt anmelden</a>}
              {m.loginProvider==='codex'&&<button onClick={beginLogin} className="btn btn-p" style={{display:'block',marginTop:10,padding:'6px 9px',fontSize:11}}>Codex jetzt anmelden</button>}
            </div>
          ))}
          {loading&&<div className="aichat-bubble ai"><div className="spin" style={{width:14,height:14}}></div></div>}
          <div ref={endRef}/>
        </div>
        <div className="aichat-in">
          <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
            <textarea ref={taRef} className="aichat-ta" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}} placeholder="Frage stellen…" rows={1}/>
            <button onClick={send} disabled={loading||!input.trim()} className="btn btn-p" style={{padding:'9px 13px',minHeight:'auto',flexShrink:0,opacity:(!input.trim()||loading)?0.45:1}}>
              <svg width={14} height={14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M22 2L11 13 M22 2L15 22 8 13 2 7z"/></svg>
            </button>
          </div>
          <div style={{marginTop:6,fontSize:9,color:'var(--t3)',fontFamily:"'IBM Plex Mono',monospace"}}>Enter senden · Shift+Enter Zeilenumbruch</div>
        </div>
      </div>
      <button onClick={()=>setOpen(o=>!o)} className={`aichat-btn${open?' open':''}`} title="KI-Assistent">
        {open?<svg width={20} height={20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6L6 18 M6 6l12 12"/></svg>:<svg width={20} height={20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>}
      </button>
    </>
  );
}

function App(){
  const initial=useRef(loadLocal()).current;
  const [page,setPage]=useState("overview");
  const [db,setDb]=useState("loading");
  const [persons,setPersons]=useState(initial.persons);
  const [pendingCount,setPendingCount]=useState(0);
  const [showAdmin,setShowAdmin]=useState(false);
  const isAdmin=window.__practioUser?.isAdmin||false;

  useEffect(()=>{
    const onPersonAdded=e=>{
      setPersons(ps=>ps.some(p=>p.id===e.detail.id)?ps:[...ps,e.detail]);
    };
    window.addEventListener('practio:person-added',onPersonAdded);
    return()=>window.removeEventListener('practio:person-added',onPersonAdded);
  },[]);

  useEffect(()=>{
    if(!isAdmin)return;
    const check=()=>fetch('/api/admin/users/pending').then(r=>r.json()).then(d=>setPendingCount(d.length)).catch(()=>{});
    check();
    const t=setInterval(check,30_000);
    return()=>clearInterval(t);
  },[isAdmin]);
  const [leads,setLeads]=useState(initial.leads);
  const [tasks,setTasks]=useState(initial.tasks);
  const [milestones,setMilestones]=useState(initial.milestones);
  const [costs,setCosts]=useState(initial.costs);
  const [scenarios,setScenarios]=useState(initial.scenarios);
  const [savedAt,setSavedAt]=useState(initial.savedAt||null);
  const [loaded,setLoaded]=useState(false);

  useEffect(()=>{
    (async()=>{
      try{
        const[p,l,t,m,c,sc]=await Promise.all([
          sb.get("persons","order=created_at.asc"),
          sb.get("leads","order=created_at.asc"),
          sb.get("tasks","order=created_at.asc"),
          sb.get("milestones","order=sort_order.asc"),
          sb.get("finance_costs","order=label.asc"),
          sb.get("finance_scenarios","order=sort_order.asc"),
        ]);
        if(p.length)setPersons(p);
        if(l.length)setLeads(l);
        if(t.length)setTasks(t);
        if(m.length)setMilestones(m);
        if(c.length)setCosts(c);
        if(sc.length)setScenarios(sc);
        setDb("ok");
      }catch{setDb("error");}
      finally{setLoaded(true);}
    })();
  },[]);

  useEffect(()=>{
    if(!loaded)return;
    const timer=setTimeout(()=>{
      const savedAt=new Date().toISOString();
      const current=loadLocal();
      localStorage.setItem(STORAGE_KEY,JSON.stringify({
        ...current,persons,leads,tasks,milestones,costs,scenarios,savedAt
      }));
      setSavedAt(savedAt);
    },250);
    return()=>clearTimeout(timer);
  },[loaded,persons,leads,tasks,milestones,costs,scenarios]);

  const open=tasks.filter(t=>!t.done).length;

  return(
    <>
      {Object.entries(BG).map(([key,url])=>(
        <div key={key} className={`bg ${page===key?"on":"off"} ${key}`} style={{backgroundImage:url?`url('${url}')`:'none'}}/>
      ))}
      <div className="bgov"/>
      <div className="savepill" title={savedAt?new Date(savedAt).toLocaleString("de-DE"):"Automatisches Speichern aktiv"}>
        <span className="savedot"></span>
        {savedAt?`Automatisch gespeichert · ${new Date(savedAt).toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})}`:"Autosave aktiv"}
      </div>
      <div className="app">
        <nav className="sb" role="navigation">
          <div className="logo">
            <div className="lmark">P</div>
            <div><div className="lname">Practio</div><div className="lmeta">intern · v0.1</div></div>
          </div>
          <div className="nlbl">Navigation</div>
          {NAV.map(item=>(
            <button key={item.id} className={`ni ${page===item.id?"on":""}`} onClick={()=>setPage(item.id)} aria-current={page===item.id?"page":undefined}>
              <span className="nico"><Ic d={item.icon}/></span>
              {item.label}
              {item.id==="tasks"&&open>0&&<span className="nbadge">{open}</span>}
              {item.id==="leads"&&leads.length>0&&<span className="nbadge">{leads.length}</span>}
            </button>
          ))}
          {isAdmin&&(
            <button className="ni" onClick={()=>setShowAdmin(true)} style={{marginTop:'auto',position:'relative'}}>
              <span className="nico"><Ic d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9 M13.73 21a2 2 0 0 1-3.46 0"/></span>
              Anfragen
              {pendingCount>0&&<span className="nbadge" style={{background:'#F87171'}}>{pendingCount}</span>}
            </button>
          )}
          <div className="sbfoot">„Schweigepflicht beginnt bei der Software"</div>
        </nav>
        {showAdmin&&<AdminPanel onClose={()=>{setShowAdmin(false);fetch('/api/admin/users/pending').then(r=>r.json()).then(d=>setPendingCount(d.length)).catch(()=>{});}}/>}
        <AiChat tasks={tasks} setTasks={setTasks} persons={persons}/>
        <main role="main" style={{flex:1,minWidth:0,paddingBottom:40}}>
          {page==="overview"   &&<Overview    leads={leads} tasks={tasks} persons={persons} db={db}/>}
          {page==="leads"      &&<Leads       leads={leads} setLeads={setLeads} db={db}/>}
          {page==="tasks"      &&<Tasks       tasks={tasks} setTasks={setTasks} persons={persons} setPersons={setPersons} db={db}/>}
          {page==="milestones" &&<Milestones  milestones={milestones} setMilestones={setMilestones} db={db}/>}
          {page==="finance"    &&<Finance     costs={costs} scenarios={scenarios} db={db}/>}
          {page==="code"       &&<Terminal/>}
        </main>
      </div>
    </>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
