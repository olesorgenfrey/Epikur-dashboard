<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Practio Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    /* === DESIGN TOKENS (Semantic) === */
    :root {
      /* Surface */
      --color-bg:          #0C0E14;
      --color-surface-1:   #13161F;
      --color-surface-2:   #1A1E2A;
      --color-surface-3:   #222739;

      /* Border */
      --color-border:      #252B3D;
      --color-border-2:    #2E3550;

      /* Text */
      --color-text-primary:   #E8EDF8;
      --color-text-secondary: #7B8BAD;
      --color-text-muted:     #424D6A;

      /* Semantic */
      --color-primary:     #3D7EFF;
      --color-primary-dim: rgba(61,126,255,.12);
      --color-success:     #23C55E;
      --color-success-dim: rgba(35,197,94,.12);
      --color-warning:     #F59E0B;
      --color-warning-dim: rgba(245,158,11,.12);
      --color-danger:      #EF4444;
      --color-danger-dim:  rgba(239,68,68,.12);
      --color-purple:      #A855F7;
      --color-purple-dim:  rgba(168,85,247,.12);

      /* Typography scale */
      --text-xs:   11px;
      --text-sm:   13px;
      --text-base: 15px;
      --text-lg:   18px;
      --text-xl:   22px;
      --text-2xl:  28px;

      /* Spacing (4pt grid) */
      --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px;  --sp-4: 16px;
      --sp-5: 20px; --sp-6: 24px; --sp-8: 32px;  --sp-10: 40px;

      /* Radii */
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;

      /* Motion */
      --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
      --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);
      --dur-fast: 120ms;
      --dur-base: 200ms;
      --dur-slow: 320ms;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--color-bg);
      color: var(--color-text-primary);
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: var(--text-base);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Noise + ambient */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 70% 45% at 15% -5%, rgba(61,126,255,.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 35% at 85% 105%, rgba(168,85,247,.05) 0%, transparent 55%);
    }

    #root { position: relative; z-index: 1; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--color-border-2); border-radius: 2px; }

    /* Layout */
    .app { display: flex; min-height: 100vh; }

    /* === SIDEBAR === */
    .sidebar {
      width: 232px; flex-shrink: 0;
      background: var(--color-surface-1);
      border-right: 1px solid var(--color-border);
      display: flex; flex-direction: column;
      position: sticky; top: 0; height: 100vh;
      overflow-y: auto;
    }

    .sidebar-logo {
      padding: var(--sp-5) var(--sp-5) var(--sp-4);
      border-bottom: 1px solid var(--color-border);
    }

    .logo-lockup { display: flex; align-items: center; gap: var(--sp-3); }

    .logo-icon {
      width: 32px; height: 32px; border-radius: var(--radius-sm);
      background: linear-gradient(145deg, #3D7EFF, #6EA3FF);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; color: #fff; flex-shrink: 0;
      box-shadow: 0 0 0 1px rgba(61,126,255,.3), 0 4px 12px rgba(61,126,255,.25);
    }

    .logo-text { font-size: var(--text-base); font-weight: 700; letter-spacing: -.3px; }
    .logo-version {
      font-size: var(--text-xs); color: var(--color-text-muted);
      font-family: 'IBM Plex Mono', monospace; margin-top: 1px;
    }

    .sidebar-nav { padding: var(--sp-3) 0; flex: 1; }
    .nav-section-label {
      font-size: 10px; font-weight: 600; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--color-text-muted);
      padding: var(--sp-4) var(--sp-5) var(--sp-2);
    }

    .nav-item {
      display: flex; align-items: center; gap: var(--sp-3);
      padding: 10px var(--sp-5);
      cursor: pointer; font-size: var(--text-sm); font-weight: 500;
      color: var(--color-text-secondary);
      border-left: 2px solid transparent;
      transition: color var(--dur-fast) var(--ease-out),
                  background var(--dur-fast) var(--ease-out),
                  border-color var(--dur-fast) var(--ease-out);
      min-height: 44px; /* touch target */
      user-select: none;
    }
    .nav-item:hover { background: var(--color-surface-2); color: var(--color-text-primary); }
    .nav-item.active {
      color: var(--color-primary); border-left-color: var(--color-primary);
      background: var(--color-primary-dim);
    }

    .nav-icon {
      width: 18px; height: 18px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-icon svg { width: 16px; height: 16px; }

    .nav-badge {
      margin-left: auto; background: var(--color-primary);
      color: #fff; font-size: 10px; font-weight: 600;
      font-family: 'IBM Plex Mono', monospace;
      padding: 1px 6px; border-radius: 20px; line-height: 1.6;
    }

    .sidebar-footer {
      padding: var(--sp-4) var(--sp-5);
      border-top: 1px solid var(--color-border);
      font-size: var(--text-xs); color: var(--color-text-muted);
      font-family: 'IBM Plex Mono', monospace; line-height: 1.6;
    }

    /* === MAIN === */
    .main { flex: 1; overflow-y: auto; padding: var(--sp-8) var(--sp-8); min-width: 0; }

    /* Page header */
    .page-header { margin-bottom: var(--sp-6); animation: fadeUp var(--dur-slow) var(--ease-out) both; }
    .page-title { font-size: var(--text-2xl); font-weight: 700; letter-spacing: -.5px; line-height: 1.2; }
    .page-subtitle {
      font-size: var(--text-sm); color: var(--color-text-secondary);
      font-family: 'IBM Plex Mono', monospace; margin-top: var(--sp-1);
    }

    /* === STAT CARDS === */
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--sp-4); margin-bottom: var(--sp-6); }

    .stat-card {
      background: var(--color-surface-1); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); padding: var(--sp-5);
      animation: fadeUp var(--dur-slow) var(--ease-out) both;
    }
    .stat-card:nth-child(1) { animation-delay: 50ms; }
    .stat-card:nth-child(2) { animation-delay: 90ms; }
    .stat-card:nth-child(3) { animation-delay: 130ms; }
    .stat-card:nth-child(4) { animation-delay: 170ms; }

    .stat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--sp-3); }
    .stat-label { font-size: var(--text-xs); font-weight: 600; letter-spacing: .8px; text-transform: uppercase; color: var(--color-text-muted); }
    .stat-icon { width: 28px; height: 28px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; }
    .stat-icon svg { width: 14px; height: 14px; }

    .stat-value { font-size: var(--text-2xl); font-weight: 700; letter-spacing: -1px; font-variant-numeric: tabular-nums; line-height: 1; margin-bottom: var(--sp-2); }
    .stat-sub { font-size: var(--text-xs); color: var(--color-text-secondary); font-family: 'IBM Plex Mono', monospace; }
    .stat-sub .trend { margin-right: 4px; }

    /* === CARD === */
    .card {
      background: var(--color-surface-1); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); overflow: hidden;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--sp-4) var(--sp-5); border-bottom: 1px solid var(--color-border);
    }
    .card-title { font-size: var(--text-sm); font-weight: 600; color: var(--color-text-secondary); letter-spacing: .2px; }
    .card-body { padding: var(--sp-5); }

    /* === GRIDS === */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-4); margin-bottom: var(--sp-4); }
    .grid-3 { display: grid; grid-template-columns: 3fr 2fr; gap: var(--sp-4); margin-bottom: var(--sp-4); }

    /* === BADGES === */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: var(--text-xs); font-weight: 600;
      padding: 3px 8px; border-radius: 20px;
      font-family: 'IBM Plex Mono', monospace; white-space: nowrap;
    }
    .badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
    .badge-blue    { background: var(--color-primary-dim); color: #6EA3FF; }
    .badge-green   { background: var(--color-success-dim); color: var(--color-success); }
    .badge-yellow  { background: var(--color-warning-dim); color: var(--color-warning); }
    .badge-red     { background: var(--color-danger-dim);  color: var(--color-danger); }
    .badge-gray    { background: rgba(123,139,173,.1);     color: var(--color-text-secondary); }
    .badge-purple  { background: var(--color-purple-dim);  color: var(--color-purple); }

    /* === FUNNEL === */
    .funnel-row { display: flex; align-items: center; gap: var(--sp-3); padding: var(--sp-2) 0; }
    .funnel-label { font-size: var(--text-xs); color: var(--color-text-secondary); font-family: 'IBM Plex Mono', monospace; width: 80px; flex-shrink: 0; }
    .funnel-track { flex: 1; background: var(--color-surface-3); border-radius: 3px; height: 20px; overflow: hidden; }
    .funnel-fill  { height: 100%; border-radius: 3px; display: flex; align-items: center; padding-left: var(--sp-2); font-size: 11px; font-weight: 600; color: #fff; transition: width 600ms var(--ease-out); }
    .funnel-count { font-size: var(--text-xs); font-family: 'IBM Plex Mono', monospace; color: var(--color-text-secondary); width: 20px; text-align: right; }

    /* === PROGRESS === */
    .progress-track { background: var(--color-surface-3); border-radius: 3px; height: 4px; overflow: hidden; }
    .progress-fill  { height: 100%; border-radius: 3px; transition: width 600ms var(--ease-out); }

    /* === TABLE === */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      text-align: left; font-size: var(--text-xs); font-weight: 600;
      letter-spacing: .8px; text-transform: uppercase; color: var(--color-text-muted);
      padding: var(--sp-3) var(--sp-4); border-bottom: 1px solid var(--color-border);
    }
    .data-table td {
      padding: var(--sp-3) var(--sp-4); font-size: var(--text-sm);
      color: var(--color-text-secondary); border-bottom: 1px solid var(--color-border);
      vertical-align: middle;
    }
    .data-table tbody tr { transition: background var(--dur-fast); cursor: pointer; }
    .data-table tbody tr:hover td { background: var(--color-surface-2); }
    .data-table tbody tr:last-child td { border-bottom: none; }
    .td-primary { font-weight: 600; color: var(--color-text-primary) !important; }
    .td-mono { font-family: 'IBM Plex Mono', monospace; font-size: var(--text-xs) !important; }

    /* === TASKS === */
    .task-row {
      display: flex; align-items: flex-start; gap: var(--sp-3);
      padding: var(--sp-3) 0; border-bottom: 1px solid var(--color-border);
      animation: fadeUp var(--dur-base) var(--ease-out) both;
    }
    .task-row:last-child { border-bottom: none; }

    .task-checkbox {
      width: 18px; height: 18px; flex-shrink: 0; margin-top: 2px;
      border: 1.5px solid var(--color-border-2); border-radius: 5px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all var(--dur-fast) var(--ease-out);
      min-width: 44px; min-height: 44px; /* accessible hit area via padding trick */
      width: 18px; /* keep visual */
    }
    .task-checkbox:hover { border-color: var(--color-primary); background: var(--color-primary-dim); }
    .task-checkbox.checked { background: var(--color-success); border-color: var(--color-success); }
    .task-checkbox.checked svg { opacity: 1; }
    .task-checkbox svg { width: 10px; height: 10px; color: #fff; opacity: 0; transition: opacity var(--dur-fast); }

    .task-body { flex: 1; min-width: 0; }
    .task-title { font-size: var(--text-sm); font-weight: 500; line-height: 1.4; }
    .task-title.done { text-decoration: line-through; color: var(--color-text-muted); }
    .task-meta  { font-size: var(--text-xs); color: var(--color-text-muted); font-family: 'IBM Plex Mono', monospace; margin-top: 2px; }

    .assignee-chip {
      font-size: 10px; font-weight: 600; font-family: 'IBM Plex Mono', monospace;
      padding: 2px 8px; border-radius: 12px; flex-shrink: 0; align-self: center;
    }
    .assignee-ole    { background: var(--color-primary-dim); color: #6EA3FF; }
    .assignee-kumpel { background: var(--color-purple-dim);  color: var(--color-purple); }

    /* === MILESTONE === */
    .milestone-row { padding: var(--sp-4) 0; border-bottom: 1px solid var(--color-border); }
    .milestone-row:last-child { border-bottom: none; }
    .milestone-header { display: flex; align-items: center; gap: var(--sp-3); margin-bottom: var(--sp-2); }
    .milestone-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .milestone-name { font-size: var(--text-sm); font-weight: 600; flex: 1; }
    .milestone-date { font-size: var(--text-xs); color: var(--color-text-muted); font-family: 'IBM Plex Mono', monospace; }
    .milestone-pct  { font-size: var(--text-xs); color: var(--color-text-muted); font-family: 'IBM Plex Mono', monospace; margin-top: var(--sp-1); }

    /* === FINANCE === */
    .finance-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--sp-3) 0; border-bottom: 1px solid var(--color-border);
      font-size: var(--text-sm);
    }
    .finance-row:last-child { border-bottom: none; }
    .finance-label { color: var(--color-text-secondary); display: flex; align-items: center; gap: var(--sp-2); }
    .finance-dot { width: 6px; height: 6px; border-radius: 50%; }
    .finance-value { font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-variant-numeric: tabular-nums; }
    .finance-total .finance-label { color: var(--color-text-primary); font-weight: 600; }
    .finance-total .finance-value { color: var(--color-text-primary); }

    /* === FORM INPUTS === */
    .input-row { display: flex; gap: var(--sp-2); padding-top: var(--sp-4); border-top: 1px solid var(--color-border); margin-top: var(--sp-3); }

    input, select {
      background: var(--color-surface-2); border: 1px solid var(--color-border-2);
      color: var(--color-text-primary); padding: var(--sp-2) var(--sp-3);
      border-radius: var(--radius-sm); font-size: var(--text-sm);
      font-family: 'Inter', sans-serif; outline: none;
      transition: border-color var(--dur-fast); min-height: 36px;
    }
    input:focus, select:focus { border-color: var(--color-primary); }
    input::placeholder { color: var(--color-text-muted); }
    select option { background: var(--color-surface-2); }

    /* === BUTTONS === */
    .btn {
      padding: var(--sp-2) var(--sp-4); border-radius: var(--radius-sm);
      font-size: var(--text-sm); font-weight: 600; cursor: pointer;
      border: none; font-family: 'Inter', sans-serif;
      transition: background var(--dur-fast) var(--ease-out), transform var(--dur-fast) var(--ease-out);
      white-space: nowrap; min-height: 36px; min-width: 44px;
      display: inline-flex; align-items: center; gap: var(--sp-1);
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--color-primary); color: #fff; }
    .btn-primary:hover { background: #5A93FF; }
    .btn-ghost { background: var(--color-surface-2); color: var(--color-text-secondary); border: 1px solid var(--color-border-2); }
    .btn-ghost:hover { background: var(--color-surface-3); color: var(--color-text-primary); }

    /* === TABS === */
    .tab-bar { display: flex; gap: var(--sp-1); margin-bottom: var(--sp-5); flex-wrap: wrap; }
    .tab {
      padding: 6px var(--sp-3); border-radius: var(--radius-sm);
      font-size: var(--text-xs); font-weight: 600; cursor: pointer;
      color: var(--color-text-secondary); border: 1px solid transparent;
      transition: all var(--dur-fast); min-height: 32px; user-select: none;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .tab:hover { color: var(--color-text-primary); background: var(--color-surface-2); }
    .tab.active { color: #6EA3FF; background: var(--color-primary-dim); border-color: rgba(61,126,255,.2); }
    .tab-count { font-family: 'IBM Plex Mono', monospace; opacity: .6; }

    /* === STATUS SELECT === */
    .status-select {
      background: var(--color-surface-2); border: 1px solid var(--color-border);
      color: var(--color-text-secondary); padding: 3px 6px;
      border-radius: var(--radius-sm); font-size: var(--text-xs);
      font-family: 'IBM Plex Mono', monospace; cursor: pointer; outline: none;
    }

    /* === ANIMATIONS === */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .page { animation: fadeUp var(--dur-slow) var(--ease-out) both; }

    /* === OVERVIEW LAYOUT === */
    .section-gap { margin-bottom: var(--sp-4); }

    /* Reduce motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

/* === SVG ICONS === */
const Icon = ({ d, size = 16 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
       stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
    <path d={d} />
  </svg>
);

const icons = {
  overview: "M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z M9 22V12h6v10",
  leads:    "M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2 M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z M23 21v-2a4 4 0 0 0-3-3.87 M16 3.13a4 4 0 0 1 0 7.75",
  tasks:    "M9 11l3 3L22 4 M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11",
  milestones:"M12 22V12 M12 7V2 M4.93 10.93l1.41 1.41 M17.66 10.93l-1.41 1.41 M2 18h20 M4 22h16",
  finance:  "M12 1v22 M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6",
  check:    "M20 6L9 17l-5-5",
};

/* === DATA === */
const INITIAL_LEADS = [];

const INITIAL_TASKS = [];

const MILESTONES = [];

const STATUS_CONFIG = {
  offen:         { label: "Offen",         cls: "badge-gray"   },
  angerufen:     { label: "Angerufen",     cls: "badge-yellow" },
  einwilligung:  { label: "Einwilligung",  cls: "badge-blue"   },
  mail_gesendet: { label: "Mail gesendet", cls: "badge-blue"   },
  follow_up:     { label: "Follow-up",     cls: "badge-yellow" },
  abgeschlossen: { label: "Abgeschlossen", cls: "badge-green"  },
  abgelehnt:     { label: "Abgelehnt",     cls: "badge-red"    },
};

const NAV = [
  { id: "overview",   label: "Übersicht",    icon: icons.overview   },
  { id: "leads",      label: "Leads",        icon: icons.leads      },
  { id: "tasks",      label: "Tasks",        icon: icons.tasks      },
  { id: "milestones", label: "Meilensteine", icon: icons.milestones },
  { id: "finance",    label: "Finanzen",     icon: icons.finance    },
];

/* === COMPONENTS === */
function StatCard({ label, value, sub, color, icon, delay }) {
  return (
    <div className="stat-card" style={{ animationDelay: delay }}>
      <div className="stat-header">
        <span className="stat-label">{label}</span>
        <div className="stat-icon" style={{ background: `${color}20` }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
            <path d={icon} />
          </svg>
        </div>
      </div>
      <div className="stat-value" style={{ color }}>{value}</div>
      <div className="stat-sub">{sub}</div>
    </div>
  );
}

function TaskRow({ task, onToggle, delay }) {
  return (
    <div className="task-row" style={{ animationDelay: delay }}>
      <button
        className={`task-checkbox ${task.done ? "checked" : ""}`}
        onClick={() => onToggle(task.id)}
        aria-label={task.done ? "Als offen markieren" : "Als erledigt markieren"}
        style={{ minWidth: 18, minHeight: 18, padding: 0 }}
      >
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none"
             stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
          <path d={icons.check} />
        </svg>
      </button>
      <div className="task-body">
        <div className={`task-title ${task.done ? "done" : ""}`}>{task.text}</div>
        <div className="task-meta">{task.meta}</div>
      </div>
      <span className={`assignee-chip ${task.assignee === "Ole" ? "assignee-ole" : "assignee-kumpel"}`}>
        {task.assignee}
      </span>
    </div>
  );
}

/* === PAGES === */
function OverviewPage({ leads, tasks, onToggle }) {
  const stats = {
    total:     leads.length,
    contacted: leads.filter(l => l.status !== "offen").length,
    consented: leads.filter(l => ["einwilligung","mail_gesendet","abgeschlossen"].includes(l.status)).length,
    won:       leads.filter(l => l.status === "abgeschlossen").length,
    openTasks: tasks.filter(t => !t.done).length,
    doneTasks: tasks.filter(t => t.done).length,
  };

  const funnel = [
    { label: "Leads",    count: leads.length,            color: "#3D7EFF" },
    { label: "Kontakt",  count: stats.contacted,          color: "#6EA3FF" },
    { label: "Einwillg.",count: stats.consented,          color: "#F59E0B" },
    { label: "Gewonnen", count: stats.won,                color: "#23C55E" },
  ];

  return (
    <div className="page">
      <div className="page-header">
        <h1 className="page-title">Übersicht</h1>
        <p className="page-subtitle">Practio · Go-to-Market Status</p>
      </div>

      <div className="stat-grid">
        <StatCard label="Leads gesamt"    value={stats.total}     sub={`→ ${stats.contacted} kontaktiert`}  color="#3D7EFF" icon={icons.leads}      delay="50ms" />
        <StatCard label="Einwilligungen"  value={stats.consented} sub={`→ ${stats.won} gewonnen`}           color="#F59E0B" icon={icons.overview}   delay="90ms" />
        <StatCard label="Offene Tasks"    value={stats.openTasks} sub={`→ ${stats.doneTasks} erledigt`}     color="#A855F7" icon={icons.tasks}      delay="130ms" />
        <StatCard label="MRR"             value="€0"              sub="→ Ziel: €500 / Monat"               color="#23C55E" icon={icons.finance}    delay="170ms" />
      </div>

      <div className="grid-2 section-gap">
        <div className="card" style={{animation: "fadeUp 320ms var(--ease-out) 200ms both"}}>
          <div className="card-header"><span className="card-title">Akquise-Funnel</span></div>
          <div className="card-body">
            {funnel.map((row, i) => (
              <div className="funnel-row" key={i}>
                <span className="funnel-label">{row.label}</span>
                <div className="funnel-track">
                  <div className="funnel-fill" style={{ width: `${(row.count / leads.length) * 100}%`, background: row.color }}>
                    {row.count > 0 && row.count}
                  </div>
                </div>
                <span className="funnel-count">{row.count}</span>
              </div>
            ))}
          </div>
        </div>

        <div className="card" style={{animation: "fadeUp 320ms var(--ease-out) 240ms both"}}>
          <div className="card-header"><span className="card-title">Nächste Meilensteine</span></div>
          <div className="card-body" style={{padding: "var(--sp-3) var(--sp-5)"}}>
            {MILESTONES.filter(m => !m.done).slice(0, 4).map((m, i) => (
              <div className="milestone-row" key={i} style={{paddingTop: "var(--sp-3)", paddingBottom: "var(--sp-3)"}}>
                <div className="milestone-header">
                  <div className="milestone-dot" style={{background: m.color}} />
                  <span className="milestone-name">{m.label}</span>
                  <span className="milestone-date">{m.date}</span>
                </div>
                <div className="progress-track">
                  <div className="progress-fill" style={{width: `${m.pct}%`, background: m.color}} />
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div className="card section-gap" style={{animation: "fadeUp 320ms var(--ease-out) 280ms both"}}>
        <div className="card-header"><span className="card-title">Offene Tasks</span></div>
        <div className="card-body" style={{paddingTop: "var(--sp-2)", paddingBottom: "var(--sp-2)"}}>
          {tasks.filter(t => !t.done).slice(0, 5).map((t, i) => (
            <TaskRow key={t.id} task={t} onToggle={onToggle} delay={`${i * 40}ms`} />
          ))}
        </div>
      </div>
    </div>
  );
}

function LeadsPage({ leads, setLeads }) {
  const [filter, setFilter] = useState("alle");
  const [newLead, setNewLead] = useState({ name: "", city: "", type: "Psychotherapie" });

  const filtered = filter === "alle" ? leads : leads.filter(l => l.status === filter);

  const addLead = () => {
    if (!newLead.name.trim()) return;
    setLeads(ls => [...ls, { ...newLead, id: Date.now(), status: "offen", notes: "" }]);
    setNewLead({ name: "", city: "", type: "Psychotherapie" });
  };

  const filters = ["alle", "offen", "angerufen", "einwilligung", "mail_gesendet", "abgeschlossen", "abgelehnt"];

  return (
    <div className="page">
      <div className="page-header">
        <h1 className="page-title">Leads</h1>
        <p className="page-subtitle">{leads.length} Praxen · Norddeutschland</p>
      </div>

      <div className="tab-bar">
        {filters.map(f => (
          <button key={f} className={`tab ${filter === f ? "active" : ""}`} onClick={() => setFilter(f)}>
            {f === "alle" ? "Alle" : STATUS_CONFIG[f]?.label || f}
            <span className="tab-count">{f === "alle" ? leads.length : leads.filter(l => l.status === f).length}</span>
          </button>
        ))}
      </div>

      <div className="card">
        <table className="data-table">
          <thead>
            <tr>
              <th>Praxis</th><th>Ort</th><th>Typ</th><th>Status</th><th>Notiz</th><th>Aktion</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(lead => (
              <tr key={lead.id}>
                <td className="td-primary">{lead.name}</td>
                <td>{lead.city}</td>
                <td className="td-mono">{lead.type}</td>
                <td>
                  <span className={`badge ${STATUS_CONFIG[lead.status]?.cls || "badge-gray"}`}>
                    {STATUS_CONFIG[lead.status]?.label || lead.status}
                  </span>
                </td>
                <td style={{maxWidth: 160, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap"}}>
                  {lead.notes || <span style={{color: "var(--color-text-muted)"}}>—</span>}
                </td>
                <td>
                  <select className="status-select" value={lead.status}
                    onChange={e => setLeads(ls => ls.map(l => l.id === lead.id ? {...l, status: e.target.value} : l))}>
                    {Object.entries(STATUS_CONFIG).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                  </select>
                </td>
              </tr>
            ))}
          </tbody>
        </table>

        <div style={{padding: "0 var(--sp-5) var(--sp-4)"}}>
          <div className="input-row">
            <input placeholder="Praxisname" value={newLead.name}
              onChange={e => setNewLead({...newLead, name: e.target.value})}
              onKeyDown={e => e.key === "Enter" && addLead()} style={{flex: 2}} />
            <input placeholder="Ort" value={newLead.city}
              onChange={e => setNewLead({...newLead, city: e.target.value})} style={{flex: 1}} />
            <select value={newLead.type} onChange={e => setNewLead({...newLead, type: e.target.value})}>
              <option>Psychotherapie</option>
              <option>Privatpraxis</option>
              <option>Gruppenpraxis</option>
            </select>
            <button className="btn btn-primary" onClick={addLead}>+ Lead</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function TasksPage({ tasks, setTasks }) {
  const [newTask, setNewTask] = useState({ text: "", meta: "", assignee: "Ole" });
  const toggle = id => setTasks(ts => ts.map(t => t.id === id ? {...t, done: !t.done} : t));

  const addTask = () => {
    if (!newTask.text.trim()) return;
    setTasks(ts => [...ts, { ...newTask, id: Date.now(), done: false }]);
    setNewTask({ text: "", meta: "", assignee: "Ole" });
  };

  return (
    <div className="page">
      <div className="page-header">
        <h1 className="page-title">Tasks</h1>
        <p className="page-subtitle">{tasks.filter(t => !t.done).length} offen · {tasks.filter(t => t.done).length} erledigt</p>
      </div>

      <div className="grid-2 section-gap">
        {["Ole", "Kumpel"].map(person => (
          <div className="card" key={person}>
            <div className="card-header">
              <span className="card-title">{person}</span>
              <span className={`badge ${person === "Ole" ? "badge-blue" : "badge-purple"}`}>
                {tasks.filter(t => t.assignee === person && !t.done).length} offen
              </span>
            </div>
            <div className="card-body" style={{paddingTop: "var(--sp-2)", paddingBottom: "var(--sp-2)"}}>
              {tasks.filter(t => t.assignee === person).map((t, i) => (
                <TaskRow key={t.id} task={t} onToggle={toggle} delay={`${i * 40}ms`} />
              ))}
            </div>
          </div>
        ))}
      </div>

      <div className="card">
        <div className="card-header"><span className="card-title">Task hinzufügen</span></div>
        <div style={{padding: "0 var(--sp-5) var(--sp-4)"}}>
          <div className="input-row">
            <input placeholder="Aufgabe beschreiben…" value={newTask.text}
              onChange={e => setNewTask({...newTask, text: e.target.value})}
              onKeyDown={e => e.key === "Enter" && addTask()} style={{flex: 3}} />
            <input placeholder="Kategorie" value={newTask.meta}
              onChange={e => setNewTask({...newTask, meta: e.target.value})} style={{flex: 1}} />
            <select value={newTask.assignee} onChange={e => setNewTask({...newTask, assignee: e.target.value})}>
              <option value="Ole">Ole</option>
              <option value="Kumpel">Kumpel</option>
            </select>
            <button className="btn btn-primary" onClick={addTask}>+ Task</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function MilestonesPage() {
  return (
    <div className="page">
      <div className="page-header">
        <h1 className="page-title">Meilensteine</h1>
        <p className="page-subtitle">Practio Roadmap 2025–2026</p>
      </div>

      <div className="card">
        <div className="card-body" style={{paddingTop: "var(--sp-2)", paddingBottom: "var(--sp-2)"}}>
          {MILESTONES.map((m, i) => (
            <div className="milestone-row" key={i} style={{animation: `fadeUp 300ms var(--ease-out) ${i * 50}ms both`}}>
              <div className="milestone-header">
                <div className="milestone-dot" style={{background: m.color}} />
                <span className="milestone-name">{m.label}</span>
                {m.done && <span className="badge badge-green">Done</span>}
                <span className="milestone-date">{m.date}</span>
              </div>
              <div className="progress-track">
                <div className="progress-fill" style={{width: `${m.pct}%`, background: m.color}} />
              </div>
              <div className="milestone-pct">{m.pct}% abgeschlossen</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function FinancePage() {
  const costs = [
    { label: "Strato Server",  value: "~€10" },
    { label: "OpenAI API",     value: "~€20" },
    { label: "Domain & SSL",   value: "~€2"  },
    { label: "Tools & SaaS",   value: "~€30" },
  ];

  const scenarios = [
    { label: "1 Kunde",           value: "€99 / Mo.",    color: "#EF4444" },
    { label: "3 Kunden",          value: "€297 / Mo.",   color: "#F59E0B" },
    { label: "5 Kunden (Break-even)", value: "€495 / Mo.", color: "#23C55E" },
    { label: "10 Kunden",         value: "€990 / Mo.",   color: "#3D7EFF" },
    { label: "20 Kunden",         value: "€1.980 / Mo.", color: "#A855F7" },
  ];

  return (
    <div className="page">
      <div className="page-header">
        <h1 className="page-title">Finanzen</h1>
        <p className="page-subtitle">Umsatzziele & Planung</p>
      </div>

      <div className="stat-grid section-gap">
        <StatCard label="MRR Aktuell"  value="€0"    sub="0 Kunden"          color="#7B8BAD" icon={icons.finance} delay="0ms" />
        <StatCard label="MRR Ziel Q3"  value="€500"  sub="~5 Kunden à €99"   color="#F59E0B" icon={icons.finance} delay="40ms" />
        <StatCard label="Break-even"   value="€200"  sub="Server + Tools/Mo." color="#3D7EFF" icon={icons.finance} delay="80ms" />
        <StatCard label="Preis/Praxis" value="€99"   sub="Monatlich, kündbar" color="#23C55E" icon={icons.finance} delay="120ms" />
      </div>

      <div className="grid-2 section-gap">
        <div className="card">
          <div className="card-header"><span className="card-title">Kosten (monatlich)</span></div>
          <div className="card-body" style={{paddingTop: "var(--sp-2)", paddingBottom: "var(--sp-2)"}}>
            {costs.map((r, i) => (
              <div className="finance-row" key={i}>
                <span className="finance-label">{r.label}</span>
                <span className="finance-value">{r.value}</span>
              </div>
            ))}
            <div className="finance-row finance-total" style={{borderTop: "1px solid var(--color-border-2)", marginTop: "var(--sp-2)", paddingTop: "var(--sp-3)", borderBottom: "none"}}>
              <span className="finance-label">Gesamt</span>
              <span className="finance-value">~€62</span>
            </div>
          </div>
        </div>

        <div className="card">
          <div className="card-header"><span className="card-title">Umsatz-Szenarien</span></div>
          <div className="card-body" style={{paddingTop: "var(--sp-2)", paddingBottom: "var(--sp-2)"}}>
            {scenarios.map((r, i) => (
              <div className="finance-row" key={i}>
                <span className="finance-label">
                  <span className="finance-dot" style={{background: r.color}} />

                </span>
                <span className="finance-value" style={{color: r.color}}>{r.value}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>

/* === APP === */
function App() {
  const [page, setPage]   = useState("overview");
  const [leads, setLeads] = useState(INITIAL_LEADS);
  const [tasks, setTasks] = useState(INITIAL_TASKS);

  const toggleTask = id => setTasks(ts => ts.map(t => t.id === id ? {...t, done: !t.done} : t));

  const openTasks = tasks.filter(t => !t.done).length;

  return (
    <div className="app">
      <nav className="sidebar" role="navigation" aria-label="Hauptnavigation">
        <div className="sidebar-logo">
          <div className="logo-lockup">
            <div className="logo-icon" role="img" aria-label="Practio Logo">P</div>
            <div>
              <div className="logo-text">Practio</div>
              <div className="logo-version">v0.1 · dashboard</div>
            </div>
          </div>
        </div>

        <div className="sidebar-nav">
          <div className="nav-section-label">Navigation</div>
          {NAV.map(item => (
            <button
              key={item.id}
              className={`nav-item ${page === item.id ? "active" : ""}`}
              onClick={() => setPage(item.id)}
              aria-current={page === item.id ? "page" : undefined}
            >
              <span className="nav-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                  <path d={item.icon} />
                </svg>
              </span>
              {item.label}
              {item.id === "tasks" && openTasks > 0 && <span className="nav-badge">{openTasks}</span>}
              {item.id === "leads" && <span className="nav-badge">{leads.length}</span>}
            </button>
          ))}
        </div>

        <div className="sidebar-footer">
          „Schweigepflicht beginnt<br />bei der Software"
        </div>
      </nav>

      <main className="main" role="main">
        {page === "overview"   && <OverviewPage   leads={leads} tasks={tasks} onToggle={toggleTask} />}
        {page === "leads"      && <LeadsPage      leads={leads} setLeads={setLeads} />}
        {page === "tasks"      && <TasksPage      tasks={tasks} setTasks={setTasks} />}
        {page === "milestones" && <MilestonesPage />}
        {page === "finance"    && <FinancePage    />}
      </main>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
