<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Practio — Internes Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root {
  --glass-bg:      rgba(255, 255, 255, 0.02);
  --glass-bg-2:    rgba(255, 255, 255, 0.01);
  --glass-border:  rgba(255, 255, 255, 0.28);
  --glass-border-strong: rgba(255, 255, 255, 0.40);
  --glass-highlight: rgba(255, 255, 255, 0.06);

  --text:   #F4F6FB;
  --text-2: rgba(244, 246, 251, 0.62);
  --text-3: rgba(244, 246, 251, 0.35);

  --accent:  #6EA8FF;
  --gold:    #D4B483;
  --success: #4ADE80;
  --warning: #FBBf24;
  --danger:  #F87171;
  --purple:  #C084FC;

  --ease-out:    cubic-bezier(0.23, 1, 0.32, 1);
  --ease-spring: cubic-bezier(0.34, 1.4, 0.64, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  color: var(--text);
  background: #06070A;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* === BACKGROUND IMAGE LAYER (changes per page) === */
.bg-layer {
  position: fixed; inset: 0; z-index: 0;
  background-size: cover; background-position: center;
  transition: opacity 800ms var(--ease-out), transform 1200ms var(--ease-out);
  transform: scale(1.05);
}
.bg-layer.active { opacity: 1; transform: scale(1); }
.bg-layer.inactive { opacity: 0; }
.bg-overlay {
  position: fixed; inset: 0; z-index: 1;
  background:
    radial-gradient(ellipse 100% 80% at 30% 20%, rgba(6,7,10,.4), transparent),
    linear-gradient(120deg, rgba(6,7,10,.82) 0%, rgba(6,7,10,.55) 50%, rgba(6,7,10,.75) 100%);
  pointer-events: none;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 2px; }

/* === GLASS PRIMITIVE === */
.glass {
  background: var(--glass-bg);
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  position: relative;
  overflow: hidden;
}
.glass::before {
  content: ''; position: absolute; inset: 0; border-radius: inherit;
  pointer-events: none;
  background: linear-gradient(135deg, rgba(255,255,255,.18) 0%, transparent 30%);
}
.glass::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: rgba(255,255,255,.45);
  pointer-events: none;
}

/* === LAYOUT === */
.app { position: relative; z-index: 2; display: flex; min-height: 100vh; padding: 20px; gap: 20px; }

/* === SIDEBAR === */
.sidebar {
  width: 230px; flex-shrink: 0;
  display: flex; flex-direction: column;
  padding: 24px 0;
  position: sticky; top: 20px; height: calc(100vh - 40px);
  animation: slideIn 700ms var(--ease-out) both;
  background: transparent;
  backdrop-filter: none; -webkit-backdrop-filter: none;
  border: none; border-radius: 0;
}
.sidebar::before, .sidebar::after { display: none; }

.sidebar-logo { padding: 0 22px 22px; }
.logo-row { display: flex; align-items: center; gap: 12px; }
.logo-mark {
  width: 38px; height: 38px; border-radius: 11px;
  background: linear-gradient(145deg, #6EA8FF, #A8C8FF);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; font-weight: 700; color: #0A0E18; flex-shrink: 0;
  box-shadow: 0 4px 20px rgba(110,168,255,.4), inset 0 1px 1px rgba(255,255,255,.5);
}
.logo-name { font-size: 16px; font-weight: 700; letter-spacing: -.3px; }
.logo-meta { font-size: 11px; color: var(--text-3); font-family: 'IBM Plex Mono', monospace; }

.nav-label {
  font-size: 10px; font-weight: 600; letter-spacing: 1.4px;
  text-transform: uppercase; color: var(--text-3);
  padding: 22px 22px 10px;
}
.nav-item {
  display: flex; align-items: center; gap: 13px;
  margin: 3px 12px; padding: 11px 14px;
  border-radius: 8px; cursor: pointer;
  font-size: 14px; font-weight: 500; color: var(--text-2);
  transition: all 200ms var(--ease-out);
  min-height: 44px; border: 1px solid transparent;
  position: relative; overflow: hidden;
  background: transparent; appearance: none; -webkit-appearance: none;
  width: calc(100% - 24px); text-align: left; font-family: inherit;
}
.nav-item:hover { color: var(--text); background: rgba(255,255,255,.06); }
.nav-item.active {
  color: var(--text); background: rgba(110,168,255,.16);
  border-color: rgba(110,168,255,.3);
  box-shadow: inset 0 1px 1px rgba(255,255,255,.15);
}
.nav-item.active::before {
  content: ''; position: absolute; left: 0; top: 20%; bottom: 20%;
  width: 3px; background: var(--accent); border-radius: 0 3px 3px 0;
}
.nav-icon { width: 18px; height: 18px; flex-shrink: 0; display: flex; }
.nav-badge {
  margin-left: auto; font-size: 10px; font-weight: 600;
  font-family: 'IBM Plex Mono', monospace;
  background: rgba(110,168,255,.25); color: #A8C8FF;
  padding: 2px 7px; border-radius: 20px;
}

.sidebar-foot {
  margin-top: auto; padding: 18px 22px 0;
  font-family: 'Instrument Serif', serif; font-style: italic;
  font-size: 15px; color: var(--text-2); line-height: 1.4;
}

/* === MAIN === */
.main { flex: 1; min-width: 0; padding-bottom: 40px; }

.page-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 28px; padding-top: 8px;
  animation: fadeUp 600ms var(--ease-out) both;
}
.page-title {
  font-family: 'Instrument Serif', serif; font-size: 46px;
  line-height: 1; letter-spacing: -.5px;
}
.page-title em { font-style: italic; color: var(--gold); }
.page-sub { font-size: 13px; color: var(--text-2); font-family: 'IBM Plex Mono', monospace; margin-top: 6px; }
.head-pill {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 16px; border-radius: 30px;
  background: rgba(255,255,255,.06); border: 1px solid var(--glass-border);
  font-size: 12px; color: var(--text-2); font-family: 'IBM Plex Mono', monospace;
}
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); box-shadow: 0 0 8px var(--success); animation: pulse 2s ease-in-out infinite; }

/* === STAT GRID === */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
.stat-card {
  padding: 22px;
  animation: fadeUp 600ms var(--ease-out) both;
  transition: transform 300ms var(--ease-out);
  border-radius: 14px;
}
.stat-card:hover { transform: translateY(-3px); }
.stat-card:nth-child(1){animation-delay:60ms}
.stat-card:nth-child(2){animation-delay:110ms}
.stat-card:nth-child(3){animation-delay:160ms}
.stat-card:nth-child(4){animation-delay:210ms}
.stat-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.stat-name { font-size: 11px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; color: var(--text-3); }
.stat-ico {
  width: 32px; height: 32px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,.08); box-shadow: inset 0 1px 1px rgba(255,255,255,.12);
}
.stat-big { font-size: 38px; font-weight: 700; letter-spacing: -1.5px; line-height: 1; font-variant-numeric: tabular-nums; }
.stat-cap { font-size: 12px; color: var(--text-2); font-family: 'IBM Plex Mono', monospace; margin-top: 8px; }

/* === CARD === */
.card { animation: fadeUp 600ms var(--ease-out) both; }
.card-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 22px; border-bottom: 1px solid var(--glass-border);
}
.card-title { font-size: 14px; font-weight: 600; }
.card-body { padding: 20px 22px; }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }

/* === FUNNEL === */
.funnel-row { display: flex; align-items: center; gap: 14px; padding: 9px 0; }
.funnel-label { font-size: 12px; color: var(--text-2); font-family: 'IBM Plex Mono', monospace; width: 78px; flex-shrink: 0; }
.funnel-track { flex: 1; height: 22px; border-radius: 8px; background: rgba(255,255,255,.06); overflow: hidden; }
.funnel-fill {
  height: 100%; border-radius: 8px; display: flex; align-items: center;
  padding-left: 10px; font-size: 11px; font-weight: 600; color: #06070A;
  transition: width 700ms var(--ease-out);
  box-shadow: inset 0 1px 1px rgba(255,255,255,.4);
}
.funnel-num { font-size: 12px; font-family: 'IBM Plex Mono', monospace; color: var(--text-2); width: 20px; text-align: right; }

/* === PROGRESS === */
.prog-track { height: 5px; border-radius: 4px; background: rgba(255,255,255,.08); overflow: hidden; }
.prog-fill { height: 100%; border-radius: 4px; transition: width 700ms var(--ease-out); box-shadow: inset 0 1px 1px rgba(255,255,255,.3); }

/* === MILESTONE === */
.ms-row { padding: 14px 0; border-bottom: 1px solid var(--glass-border); }
.ms-row:last-child { border-bottom: none; }
.ms-head { display: flex; align-items: center; gap: 12px; margin-bottom: 9px; }
.ms-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 8px currentColor; }
.ms-name { font-size: 14px; font-weight: 600; flex: 1; }
.ms-date { font-size: 11px; color: var(--text-3); font-family: 'IBM Plex Mono', monospace; }

/* === TASK === */
.task-row {
  display: flex; align-items: flex-start; gap: 13px;
  padding: 13px 0; border-bottom: 1px solid var(--glass-border);
  animation: fadeUp 400ms var(--ease-out) both;
}
.task-row:last-child { border-bottom: none; }
.task-check {
  width: 20px; height: 20px; flex-shrink: 0; margin-top: 1px;
  border: 1.5px solid rgba(255,255,255,.25); border-radius: 7px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 180ms var(--ease-spring); background: transparent; padding: 0;
}
.task-check:hover { border-color: var(--accent); background: rgba(110,168,255,.15); }
.task-check.done { background: var(--success); border-color: var(--success); box-shadow: 0 0 12px rgba(74,222,128,.4); }
.task-check svg { width: 11px; height: 11px; opacity: 0; transition: opacity 150ms; }
.task-check.done svg { opacity: 1; }
.task-body { flex: 1; min-width: 0; }
.task-text { font-size: 14px; font-weight: 500; }
.task-text.done { text-decoration: line-through; color: var(--text-3); }
.task-meta { font-size: 11px; color: var(--text-3); font-family: 'IBM Plex Mono', monospace; margin-top: 2px; }
.chip {
  font-size: 10px; font-weight: 600; font-family: 'IBM Plex Mono', monospace;
  padding: 3px 9px; border-radius: 20px; align-self: center; flex-shrink: 0;
  box-shadow: inset 0 1px 1px rgba(255,255,255,.1);
}
.chip-ole { background: rgba(110,168,255,.2); color: #A8C8FF; }
.chip-kumpel { background: rgba(192,132,252,.2); color: var(--purple); }

/* === BADGES === */
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px;
  font-family: 'IBM Plex Mono', monospace;
  box-shadow: inset 0 1px 1px rgba(255,255,255,.1);
}
.badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.badge-blue   { background: rgba(110,168,255,.18); color: #A8C8FF; }
.badge-green  { background: rgba(74,222,128,.16);  color: var(--success); }
.badge-yellow { background: rgba(251,191,36,.16);  color: var(--warning); }
.badge-red    { background: rgba(248,113,113,.16); color: var(--danger); }
.badge-gray   { background: rgba(255,255,255,.08); color: var(--text-2); }
.badge-purple { background: rgba(192,132,252,.16); color: var(--purple); }

/* === TABLE === */
.tbl { width: 100%; border-collapse: collapse; }
.tbl th {
  text-align: left; font-size: 10px; font-weight: 600;
  letter-spacing: .8px; text-transform: uppercase; color: var(--text-3);
  padding: 0 14px 12px; border-bottom: 1px solid var(--glass-border);
}
.tbl td { padding: 12px 14px; font-size: 13px; color: var(--text-2); border-bottom: 1px solid var(--glass-border); }
.tbl tbody tr { transition: background 150ms; cursor: pointer; }
.tbl tbody tr:hover td { background: rgba(255,255,255,.04); }
.tbl tbody tr:last-child td { border-bottom: none; }
.td-name { font-weight: 600; color: var(--text) !important; }
.td-mono { font-family: 'IBM Plex Mono', monospace; font-size: 11px !important; }

/* === FINANCE === */
.fin-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0; border-bottom: 1px solid var(--glass-border); font-size: 14px;
}
.fin-row:last-child { border-bottom: none; }
.fin-label { color: var(--text-2); display: flex; align-items: center; gap: 10px; }
.fin-dot { width: 7px; height: 7px; border-radius: 50%; box-shadow: 0 0 6px currentColor; }
.fin-val { font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-variant-numeric: tabular-nums; }

/* === TABS === */
.tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
.tab {
  padding: 8px 15px; border-radius: 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--text-2); border: 1px solid transparent;
  background: rgba(255,255,255,.04); transition: all 180ms var(--ease-out);
  min-height: 36px; display: inline-flex; align-items: center; gap: 6px;
}
.tab:hover { color: var(--text); background: rgba(255,255,255,.08); }
.tab.active {
  color: var(--text); background: rgba(110,168,255,.18);
  border-color: rgba(110,168,255,.3); box-shadow: inset 0 1px 1px rgba(255,255,255,.15);
}
.tab-ct { font-family: 'IBM Plex Mono', monospace; opacity: .6; }

/* === FORM === */
.input-row { display: flex; gap: 10px; padding-top: 18px; border-top: 1px solid var(--glass-border); margin-top: 16px; }
input, select {
  background: rgba(255,255,255,.06); border: 1px solid var(--glass-border);
  color: var(--text); padding: 10px 13px; border-radius: 11px;
  font-size: 13px; font-family: 'Inter', sans-serif; outline: none;
  transition: border-color 180ms, background 180ms; min-height: 40px;
}
input:focus, select:focus { border-color: var(--accent); background: rgba(110,168,255,.08); }
input::placeholder { color: var(--text-3); }
select option { background: #14161E; }
.status-sel {
  background: rgba(255,255,255,.06); border: 1px solid var(--glass-border);
  color: var(--text-2); padding: 5px 8px; border-radius: 8px;
  font-size: 11px; font-family: 'IBM Plex Mono', monospace; cursor: pointer; outline: none;
}

/* === BUTTON === */
.btn {
  padding: 10px 18px; border-radius: 11px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: none; font-family: 'Inter', sans-serif;
  transition: all 180ms var(--ease-out); min-height: 40px;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn:active { transform: scale(.97); }
.btn-primary {
  background: linear-gradient(135deg, #6EA8FF, #5A93FF); color: #06070A;
  box-shadow: 0 4px 16px rgba(110,168,255,.35), inset 0 1px 1px rgba(255,255,255,.4);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(110,168,255,.45), inset 0 1px 1px rgba(255,255,255,.4); }

/* === ANIMATIONS === */
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideIn { from{opacity:0;transform:translateX(-16px)} to{opacity:1;transform:translateX(0)} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.page { animation: fadeUp 500ms var(--ease-out) both; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration:.01ms!important; transition-duration:.01ms!important; }
}
</style>
</head>

function StatCard({name,value,cap,color,icon,delay}) {

      <button className={`task-check ${t.done?"done":""}`} onClick={()=>onToggle(t.id)} aria-label={t.done?"Offen":"Erledigt"}>
        <svg viewBox="0 0 24 24" fill="none" stroke="#06070A" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><path d={ic.check}/></svg>
      </button>
      <div className="task-body">
        <div className={`task-text ${t.done?"done":""}`}>{t.text}</div>
        <div className="task-meta">{t.meta}</div>
      </div>
      <span className={`chip ${t.assignee==="Ole"?"chip-ole":"chip-kumpel"}`}>{t.assignee}</span>
    </div>
  );
}

function Overview({leads,tasks,onToggle}) {
  const s = {
    total:leads.length,
    contacted:leads.filter(l=>l.status!=="offen").length,
    consented:leads.filter(l=>["einwilligung","mail_gesendet","abgeschlossen"].includes(l.status)).length,
    won:leads.filter(l=>l.status==="abgeschlossen").length,
    open:tasks.filter(t=>!t.done).length, done:tasks.filter(t=>t.done).length,
  };
  const funnel=[
    {label:"Leads",count:leads.length,color:"#6EA8FF"},
    {label:"Kontakt",count:s.contacted,color:"#A8C8FF"},
    {label:"Einwillg.",count:s.consented,color:"#FBBf24"},
    {label:"Gewonnen",count:s.won,color:"#4ADE80"},
  ];
  return (
    <div className="page">
      <div className="page-head">
        <div>
          <h1 className="page-title">Über<em>sicht</em></h1>
          <p className="page-sub">Practio · Go-to-Market Status</p>
        </div>
        <div className="head-pill"><span className="live-dot"></span> Live · Stand heute</div>
      </div>
      <div className="stat-grid">
        <StatCard name="Leads gesamt" value={s.total} cap={`→ ${s.contacted} kontaktiert`} color="#6EA8FF" icon={ic.leads} delay="60ms"/>
        <StatCard name="Einwilligungen" value={s.consented} cap={`→ ${s.won} gewonnen`} color="#FBBf24" icon={ic.overview} delay="110ms"/>
        <StatCard name="Offene Tasks" value={s.open} cap={`→ ${s.done} erledigt`} color="#C084FC" icon={ic.tasks} delay="160ms"/>
        <StatCard name="MRR" value="€0" cap="→ Ziel: €500 / Monat" color="#4ADE80" icon={ic.finance} delay="210ms"/>
      </div>
      <div className="grid-2">
        <div className="glass card" style={{animationDelay:"240ms"}}>
          <div className="card-head"><span className="card-title">Akquise-Funnel</span></div>
          <div className="card-body">
            {funnel.map((r,i)=>(
              <div className="funnel-row" key={i}>
                <span className="funnel-label">{r.label}</span>
                <div className="funnel-track"><div className="funnel-fill" style={{width:`${(r.count/leads.length)*100}%`,background:r.color}}>{r.count>0&&r.count}</div></div>
                <span className="funnel-num">{r.count}</span>
              </div>
            ))}
          </div>
        </div>
        <div className="glass card" style={{animationDelay:"280ms"}}>
          <div className="card-head"><span className="card-title">Nächste Meilensteine</span></div>
          <div className="card-body">
            {MILESTONES.filter(m=>!m.done).slice(0,4).map((m,i)=>(
              <div className="ms-row" key={i} style={{padding:"10px 0"}}>
                <div className="ms-head">
                  <div className="ms-dot" style={{background:m.color,color:m.color}}></div>
                  <span className="ms-name">{m.label}</span>
                  <span className="ms-date">{m.date}</span>
                </div>
                <div className="prog-track"><div className="prog-fill" style={{width:`${m.pct}%`,background:m.color}}></div></div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div className="glass card" style={{animationDelay:"320ms"}}>
        <div className="card-head"><span className="card-title">Offene Tasks</span></div>
        <div className="card-body" style={{paddingTop:"6px",paddingBottom:"6px"}}>
          {tasks.filter(t=>!t.done).slice(0,5).map((t,i)=>(<Task key={t.id} t={t} onToggle={onToggle} delay={`${i*40}ms`}/>))}
        </div>
      </div>
    </div>
  );
}

function Leads({leads,setLeads}) {
  const [filter,setFilter]=useState("alle");
  const [nl,setNl]=useState({name:"",city:"",type:"Psychotherapie"});
  const filtered=filter==="alle"?leads:leads.filter(l=>l.status===filter);
  const add=()=>{ if(!nl.name.trim())return; setLeads(ls=>[...ls,{...nl,id:Date.now(),status:"offen",notes:""}]); setNl({name:"",city:"",type:"Psychotherapie"}); };
  const filters=["alle","offen","angerufen","einwilligung","mail_gesendet","abgeschlossen","abgelehnt"];
  return (
    <div className="page">
      <div className="page-head">
        <div><h1 className="page-title">Le<em>ads</em></h1><p className="page-sub">{leads.length} Praxen · Norddeutschland</p></div>
      </div>
      <div className="tabs">
        {filters.map(f=>(
          <button key={f} className={`tab ${filter===f?"active":""}`} onClick={()=>setFilter(f)}>
            {f==="alle"?"Alle":STATUS[f]?.label||f}
            <span className="tab-ct">{f==="alle"?leads.length:leads.filter(l=>l.status===f).length}</span>
          </button>
        ))}
      </div>
      <div className="glass card">
        <div style={{padding:"8px 8px 0"}}>
          <table className="tbl">
            <thead><tr><th>Praxis</th><th>Ort</th><th>Typ</th><th>Status</th><th>Notiz</th><th>Aktion</th></tr></thead>
            <tbody>
              {filtered.map(l=>(
                <tr key={l.id}>
                  <td className="td-name">{l.name}</td>
                  <td>{l.city}</td>
                  <td className="td-mono">{l.type}</td>
                  <td><span className={`badge ${STATUS[l.status]?.cls||"badge-gray"}`}>{STATUS[l.status]?.label||l.status}</span></td>
                  <td style={{maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.notes||<span style={{color:"var(--text-3)"}}>—</span>}</td>
                  <td>
                    <select className="status-sel" value={l.status} onChange={e=>setLeads(ls=>ls.map(x=>x.id===l.id?{...x,status:e.target.value}:x))}>
                      {Object.entries(STATUS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                    </select>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{padding:"0 22px 20px"}}>
          <div className="input-row">
            <input placeholder="Praxisname" value={nl.name} onChange={e=>setNl({...nl,name:e.target.value})} onKeyDown={e=>e.key==="Enter"&&add()} style={{flex:2}}/>
            <input placeholder="Ort" value={nl.city} onChange={e=>setNl({...nl,city:e.target.value})} style={{flex:1}}/>
            <select value={nl.type} onChange={e=>setNl({...nl,type:e.target.value})}><option>Psychotherapie</option><option>Privatpraxis</option><option>Gruppenpraxis</option></select>
            <button className="btn btn-primary" onClick={add}>+ Lead</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function Tasks({tasks,setTasks}) {
  const [nt,setNt]=useState({text:"",meta:"",assignee:"Ole"});
  const toggle=id=>setTasks(ts=>ts.map(t=>t.id===id?{...t,done:!t.done}:t));
  const add=()=>{ if(!nt.text.trim())return; setTasks(ts=>[...ts,{...nt,id:Date.now(),done:false}]); setNt({text:"",meta:"",assignee:"Ole"}); };
  return (
    <div className="page">
      <div className="page-head">
        <div><h1 className="page-title">Ta<em>sks</em></h1><p className="page-sub">{tasks.filter(t=>!t.done).length} offen · {tasks.filter(t=>t.done).length} erledigt</p></div>
      </div>
      <div className="grid-2">
        {["Ole","Kumpel"].map(p=>(
          <div className="glass card" key={p}>
            <div className="card-head">
              <span className="card-title">{p}</span>
              <span className={`badge ${p==="Ole"?"badge-blue":"badge-purple"}`}>{tasks.filter(t=>t.assignee===p&&!t.done).length} offen</span>
            </div>
            <div className="card-body" style={{paddingTop:"6px",paddingBottom:"6px"}}>
              {tasks.filter(t=>t.assignee===p).map((t,i)=>(<Task key={t.id} t={t} onToggle={toggle} delay={`${i*40}ms`}/>))}
            </div>
          </div>
        ))}
      </div>
      <div className="glass card">
        <div className="card-head"><span className="card-title">Task hinzufügen</span></div>
        <div style={{padding:"0 22px 20px"}}>
          <div className="input-row" style={{borderTop:"none",paddingTop:"16px"}}>
            <input placeholder="Aufgabe beschreiben…" value={nt.text} onChange={e=>setNt({...nt,text:e.target.value})} onKeyDown={e=>e.key==="Enter"&&add()} style={{flex:3}}/>
            <input placeholder="Kategorie" value={nt.meta} onChange={e=>setNt({...nt,meta:e.target.value})} style={{flex:1}}/>
            <select value={nt.assignee} onChange={e=>setNt({...nt,assignee:e.target.value})}><option value="Ole">Ole</option><option value="Kumpel">Kumpel</option></select>
            <button className="btn btn-primary" onClick={add}>+ Task</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function Milestones() {
  return (
    <div className="page">
      <div className="page-head"><div><h1 className="page-title">Meilen<em>steine</em></h1><p className="page-sub">Practio Roadmap 2025–2026</p></div></div>
      <div className="glass card">
        <div className="card-body">
          {MILESTONES.map((m,i)=>(
            <div className="ms-row" key={i} style={{animationDelay:`${i*50}ms`}}>
              <div className="ms-head">
                <div className="ms-dot" style={{background:m.color,color:m.color}}></div>
                <span className="ms-name">{m.label}</span>
                {m.done&&<span className="badge badge-green">Done</span>}
                <span className="ms-date">{m.date}</span>
              </div>
              <div className="prog-track"><div className="prog-fill" style={{width:`${m.pct}%`,background:m.color}}></div></div>
              <div style={{fontSize:11,color:"var(--text-3)",fontFamily:"'IBM Plex Mono',monospace",marginTop:6}}>{m.pct}% abgeschlossen</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function Finance() {
  const costs=[{label:"Strato Server",value:"~€10"},{label:"OpenAI API",value:"~€20"},{label:"Domain & SSL",value:"~€2"},{label:"Tools & SaaS",value:"~€30"}];
  const scen=[
    {label:"1 Kunde",value:"€99 / Mo.",color:"#F87171"},
    {label:"3 Kunden",value:"€297 / Mo.",color:"#FBBf24"},
    {label:"5 Kunden (Break-even)",value:"€495 / Mo.",color:"#4ADE80"},
    {label:"10 Kunden",value:"€990 / Mo.",color:"#6EA8FF"},
    {label:"20 Kunden",value:"€1.980 / Mo.",color:"#C084FC"},
  ];
  return (
    <div className="page">
      <div className="page-head"><div><h1 className="page-title">Finan<em>zen</em></h1><p className="page-sub">Umsatzziele & Planung</p></div></div>
      <div className="stat-grid">
        <StatCard name="MRR Aktuell" value="€0" cap="0 Kunden" color="#9CA3AF" icon={ic.finance} delay="60ms"/>
        <StatCard name="MRR Ziel Q3" value="€500" cap="~5 Kunden à €99" color="#FBBf24" icon={ic.finance} delay="110ms"/>
        <StatCard name="Break-even" value="€200" cap="Server + Tools/Mo." color="#6EA8FF" icon={ic.finance} delay="160ms"/>
        <StatCard name="Preis/Praxis" value="€99" cap="Monatlich, kündbar" color="#4ADE80" icon={ic.finance} delay="210ms"/>
      </div>
      <div className="grid-2">
        <div className="glass card" style={{animationDelay:"240ms"}}>
          <div className="card-head"><span className="card-title">Kosten (monatlich)</span></div>
          <div className="card-body">
            {costs.map((r,i)=>(<div className="fin-row" key={i}><span className="fin-label">{r.label}</span><span className="fin-val">{r.value}</span></div>))}
            <div className="fin-row" style={{borderTop:"1px solid var(--glass-border-strong)",marginTop:8,paddingTop:12,borderBottom:"none"}}>
              <span className="fin-label" style={{color:"var(--text)",fontWeight:600}}>Gesamt</span>
              <span className="fin-val" style={{color:"var(--text)"}}>~€62</span>
            </div>
          </div>
        </div>
        <div className="glass card" style={{animationDelay:"280ms"}}>
          <div className="card-head"><span className="card-title">Umsatz-Szenarien</span></div>
          <div className="card-body">
            {scen.map((r,i)=>(
              <div className="fin-row" key={i}>
                <span className="fin-label"><span className="fin-dot" style={{background:r.color,color:r.color}}></span>{r.label}</span>
                <span className="fin-val" style={{color:r.color}}>{r.value}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [page,setPage]=useState("overview");
  const [leads,setLeads]=useState(INITIAL_LEADS);
  const [tasks,setTasks]=useState(INITIAL_TASKS);
  const toggle=id=>setTasks(ts=>ts.map(t=>t.id===id?{...t,done:!t.done}:t));
  const open=tasks.filter(t=>!t.done).length;

  return (
    <>
      {Object.entries(BG).map(([key,url])=>(
        <div key={key} className={`bg-layer ${page===key?"active":"inactive"}`} style={{backgroundImage:`url('${url}')`}}/>
      ))}
      <div className="bg-overlay"/>

      <div className="app">
        <nav className="sidebar" role="navigation" aria-label="Hauptnavigation">
          <div className="sidebar-logo">
            <div className="logo-row">
              <div className="logo-mark">P</div>
              <div><div className="logo-name">Practio</div><div className="logo-meta">intern · v0.1</div></div>
            </div>
          </div>
          <div className="nav-label">Navigation</div>
          {NAV.map(item=>(
            <button key={item.id} className={`nav-item ${page===item.id?"active":""}`} onClick={()=>setPage(item.id)} aria-current={page===item.id?"page":undefined}>
              <span className="nav-icon"><Icon d={item.icon}/></span>
              {item.label}
              {item.id==="tasks"&&open>0&&<span className="nav-badge">{open}</span>}
              {item.id==="leads"&&<span className="nav-badge">{leads.length}</span>}
            </button>
          ))}
          <div className="sidebar-foot">„Schweigepflicht beginnt bei der Software"</div>
        </nav>

        <main className="main" role="main">
          {page==="overview"&&<Overview leads={leads} tasks={tasks} onToggle={toggle}/>}
          {page==="leads"&&<Leads leads={leads} setLeads={setLeads}/>}
          {page==="tasks"&&<Tasks tasks={tasks} setTasks={setTasks}/>}
          {page==="milestones"&&<Milestones/>}
          {page==="finance"&&<Finance/>}
        </main>
      </div>
    </>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
