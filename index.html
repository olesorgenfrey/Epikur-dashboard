function currentTaskIdentity(persons){
  const username=(window.__practioUser?.username||'').trim();
  const person=persons.find(p=>p.name.toLocaleLowerCase('de-DE')===username.toLocaleLowerCase('de-DE'))||null;
  return{username,person};
}

function formatTaskList(tasks,persons){
  return tasks.map(t=>{
    const p=persons.find(x=>x.id===(t.team_member_id||t.assignee_id));
    const meta=[
      t.priority&&`prio:${t.priority}`,
      t.effort&&`effort:${t.effort}`,
      t.module&&`modul:${t.module}`,
      t.vibe_difficulty&&`vibe:${t.vibe_difficulty}`,
      t.vibe_duration&&`dauer:${t.vibe_duration}`,
    ].filter(Boolean).join(' ');
    return`• ${p?p.name:'?'}: "${taskName(t)}" (id:"${t.id}"${meta?' '+meta:''})`;
  }).join('\n');
}

function buildTaskCtx(tasks,persons,milestones,masterplans){
  const{username,person}=currentTaskIdentity(persons);
  const ownTasks=person?tasks.filter(t=>(t.team_member_id||t.assignee_id)===person.id):[];
  const otherTasks=person?tasks.filter(t=>(t.team_member_id||t.assignee_id)!==person.id):tasks;
  let s='[Practio Kontext]\n';
  s+=`Aktueller Nutzer: ${username||'unbekannt'}${person?` (Person-ID:"${person.id}")`:''}\n`;
  s+='Regel: Konzentriere dich bei allgemeinen Fragen und Empfehlungen vorrangig auf die Tasks des aktuellen Nutzers. ';
  s+='Tasks anderer Personen sind ebenfalls verfügbar und dürfen normal besprochen oder geändert werden, wenn sie für die Anfrage relevant sind.\n';
  if(person)s+=`Neue Tasks ohne ausdrücklich genannte andere Zuweisung standardmäßig ${person.name} (id:"${person.id}") zuweisen.\n`;
  s+='GitHub: olesorgenfrey · Repos: '+Object.values(GITHUB_REPOS).join(', ')+'\n';
  if(persons.length)s+='Personen: '+persons.map(p=>`${p.name} (id:"${p.id}")`).join(', ')+'\n';
  if(milestones&&milestones.length)s+='Meilensteine: '+milestones.map(ms=>`${ms.label} (id:"${ms.id}")`).join(', ')+'\n';
  const allModules=(masterplans||[]).flatMap(mp=>Array.isArray(mp.modules)?mp.modules:[]).filter((v,i,a)=>a.indexOf(v)===i);
  if(allModules.length)s+='Module: '+allModules.join(', ')+'\n';
  const ownOpen=ownTasks.filter(t=>t.status!=="done"&&!t.done);
  const otherOpen=otherTasks.filter(t=>t.status!=="done"&&!t.done);
  if(ownOpen.length)s+='Eigene offene Tasks (Priorität):\n'+formatTaskList(ownOpen,persons)+'\n';
  if(otherOpen.length)s+='Weitere offene Tasks:\n'+formatTaskList(otherOpen,persons)+'\n';
  const ownDone=ownTasks.filter(t=>t.done).length;
  const otherDone=otherTasks.filter(t=>t.done).length;
  if(ownDone||otherDone)s+=`Erledigte Tasks: eigene ${ownDone}, weitere ${otherDone}\n`;
  return{context:s+'[/Practio Kontext]\n\n',currentPerson:person};
}

function execTaskActions(responseText,tasks,persons,setTasks){
  const RE=/<practio_action>([\s\S]*?)<\/practio_action>/g;
  const acts=[];let m;
  while((m=RE.exec(responseText))!==null){try{acts.push(JSON.parse(m[1]));}catch{}}
  const clean=responseText.replace(/<practio_action>[\s\S]*?<\/practio_action>/g,'').replace(/\n{3,}/g,'\n\n').trim();
  if(!acts.length)return{clean,summary:''};
  let next=[...tasks];
  const results=[];
  const persisted=[];
  const deleted=[];
  for(const a of acts){
    if(a.action==='create_task'){
      const title=a.title||a.text||'Neuer Task';
      const p=persons.find(x=>x.id===a.assignee_id);
      const row={
        id:makeId(),project_id:PROJECT_ID,
        title,text:title,
        description:a.description||"",
        acceptance_criteria:Array.isArray(a.acceptance_criteria)?a.acceptance_criteria:[],
        definition_of_done:Array.isArray(a.definition_of_done)?a.definition_of_done:[],
        team_member_id:a.assignee_id||null,
        milestone_id:a.milestone_id||null,
        module:a.module||"",
        priority:['high','medium','low'].includes(a.priority)?a.priority:'medium',
        effort:['XS','S','M','L','XL'].includes(a.effort)?a.effort:'M',
        vibe_difficulty:VIBE_DIFFICULTIES.find(v=>v.id===a.vibe_difficulty)?a.vibe_difficulty:null,
        vibe_duration:VIBE_DURATIONS.includes(a.vibe_duration)?a.vibe_duration:null,
        status:a.status||"backlog",
        done:false,dependencies:[],sort_order:Date.now(),
      };
      next=[...next,row];persisted.push(row);
      results.push(`Task erstellt: "${title}"${p?` → ${p.name}`:''}`);}
    else if(a.action==='update_task'){
      const t=next.find(x=>x.id===a.id);
      if(!t){results.push(`Task ${a.id} nicht gefunden`);continue;}
      const fields={};
      if(a.title)fields.title=fields.text=a.title;
      if(a.description!==undefined)fields.description=a.description;
      if(['high','medium','low'].includes(a.priority))fields.priority=a.priority;
      if(['XS','S','M','L','XL'].includes(a.effort))fields.effort=a.effort;
      if(a.status)fields.status=a.status;
      if(a.module!==undefined)fields.module=a.module;
      if(a.milestone_id!==undefined)fields.milestone_id=a.milestone_id;
      if(a.assignee_id!==undefined)fields.team_member_id=a.assignee_id;
      if(Array.isArray(a.acceptance_criteria))fields.acceptance_criteria=a.acceptance_criteria;
      if(Array.isArray(a.definition_of_done))fields.definition_of_done=a.definition_of_done;
      if(VIBE_DIFFICULTIES.find(v=>v.id===a.vibe_difficulty))fields.vibe_difficulty=a.vibe_difficulty;
      if(VIBE_DURATIONS.includes(a.vibe_duration))fields.vibe_duration=a.vibe_duration;
      const updated={...t,...fields};
      updated.done=updated.status==='done';
      next=next.map(x=>x.id===a.id?updated:x);persisted.push(updated);
      results.push(`"${t.text||a.id}" aktualisiert`);}
    else if(a.action==='toggle_task'){
      const t=next.find(x=>x.id===a.id);
      if(!t){results.push(`Task ${a.id} nicht gefunden`);continue;}
      const updated={...t,done:a.done,status:a.done?'done':(t.status==='done'?'backlog':t.status||'backlog')};
      next=next.map(x=>x.id===a.id?updated:x);persisted.push(updated);
      results.push(`"${t?.text||a.id}" ${a.done?'abgehakt':'geöffnet'}`);}
    else if(a.action==='delete_task'){
      const t=next.find(x=>x.id===a.id);
      if(!t){results.push(`Task ${a.id} nicht gefunden`);continue;}
      next=next.filter(x=>x.id!==a.id);deleted.push(a.id);
      results.push(`"${t?.text||a.id}" gelöscht`);}
  }
  setTasks(next);
  persisted.forEach(row=>pcApi.save("tasks",row).catch(()=>{}));
  deleted.forEach(id=>pcApi.del("tasks",id).catch(()=>{}));
  try{const d=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');d.tasks=next;localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}catch{}
  return{clean,summary:results.length?'\n\n✓ '+results.join(' · '):''};
}

function AiChat({tasks,setTasks,persons,milestones,masterplans}){
  const [open,setOpen]=useState(false);
  const [provider,setProvider]=useState(()=>sessionStorage.getItem('aiProvider')||'claude');
  const initialChatKey=`aiDashChatId:${sessionStorage.getItem('aiProvider')||'claude'}`;
  const [chatId,setChatId]=useState(()=>sessionStorage.getItem(initialChatKey)||(initialChatKey.endsWith(':claude')?sessionStorage.getItem('aiDashChatId'):null));
  const [model,setModel]=useState(()=>sessionStorage.getItem(`aiModel:${provider}`)||(provider==='codex'?'gpt-5.5':'sonnet'));
  const [effort,setEffort]=useState(()=>sessionStorage.getItem(`aiEffort:${provider}`)||'low');
  const [codexModels,setCodexModels]=useState([
    {id:'gpt-5.5',label:'GPT-5.5'},
    {id:'gpt-5.4',label:'GPT-5.4'},
    {id:'gpt-5.4-mini',label:'GPT-5.4-Mini'},
  ]);
  const [providerStatus,setProviderStatus]=useState(null);
  const [deviceLogin,setDeviceLogin]=useState(null);
  const [loginBusy,setLoginBusy]=useState(false);
  const [msgs,setMsgs]=useState([]);
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const endRef=useRef(null);
  const taRef=useRef(null);
  const claudeModels=[{id:'sonnet',label:'Sonnet'},{id:'opus',label:'Opus'},{id:'haiku',label:'Haiku'}];
  const modelOptions=provider==='codex'?codexModels:claudeModels;
  const username=window.__practioUser?.username||'unbekannt';

  const checkProviderStatus=async(selectedProvider=provider)=>{
    try{
      const r=await fetch(`/api/${selectedProvider}/status`,{cache:'no-store'});
      const d=await r.json();
      if(selectedProvider===provider)setProviderStatus(d);
      return d;
    }catch{return{loggedIn:false};}
  };

  const beginLogin=async()=>{
    if(provider==='claude'){
      window.open('/claude-auth','_blank','noopener');
      return;
    }
    setLoginBusy(true);
    const tab=window.open('about:blank','_blank');
    try{
      const r=await fetch('/api/codex/login/start',{method:'POST'});
      const d=await r.json();
      if(!r.ok)throw new Error(d.error||'Codex-Login konnte nicht gestartet werden.');
      if(d.loggedIn){if(tab)tab.close();setProviderStatus({loggedIn:true});return;}
      setDeviceLogin(d);
      if(tab)tab.location=d.url;
    }catch(error){
      if(tab)tab.close();
      setMsgs(ms=>[...ms,{role:'assistant',content:error.message}]);
    }finally{setLoginBusy(false);}
  };

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'});},[msgs,loading,deviceLogin]);
  useEffect(()=>{if(open)setTimeout(()=>taRef.current?.focus(),150);},[open]);
  useEffect(()=>{
    sessionStorage.setItem('aiProvider',provider);
    const key=`aiDashChatId:${provider}`;
    setChatId(sessionStorage.getItem(key)||(provider==='claude'?sessionStorage.getItem('aiDashChatId'):null));
    const fallback=provider==='codex'?'gpt-5.5':'sonnet';
    setModel(sessionStorage.getItem(`aiModel:${provider}`)||fallback);
    setEffort(sessionStorage.getItem(`aiEffort:${provider}`)||'low');
    setProviderStatus(null);
    setDeviceLogin(null);
    setMsgs([]);
  },[provider]);
  useEffect(()=>{
    if(!open)return;
    checkProviderStatus();
    if(provider==='codex'){
      fetch('/api/codex/models',{cache:'no-store'}).then(r=>r.json()).then(d=>{
        if(Array.isArray(d.models)&&d.models.length)setCodexModels(d.models);
      }).catch(()=>{});
    }
  },[open,provider]);
  useEffect(()=>{
    if(!deviceLogin||provider!=='codex')return;
    const poll=setInterval(async()=>{
      const status=await checkProviderStatus('codex');
      if(status.loggedIn){
        clearInterval(poll);
        setDeviceLogin(null);
        setProviderStatus(status);
        setMsgs(ms=>[...ms.filter(m=>!m.loginProvider),{role:'assistant',content:'Codex ist jetzt angemeldet.'}]);
      }
    },3000);
    return()=>clearInterval(poll);
  },[deviceLogin,provider]);
  useEffect(()=>{sessionStorage.setItem(`aiModel:${provider}`,model);},[provider,model]);
  useEffect(()=>{sessionStorage.setItem(`aiEffort:${provider}`,effort);},[provider,effort]);

  const ensureChat=async()=>{
    if(chatId)return chatId;
    try{
      const r=await fetch('/api/claude/chats',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({provider,project:'epikur-dashboard',model,effort})});
      const d=await r.json();
      if(!r.ok||!d.id)return null;
      sessionStorage.setItem(`aiDashChatId:${provider}`,d.id);
      setChatId(d.id);
      return d.id;
    }catch{return null;}
  };

  const send=async()=>{
    const text=input.trim();
    if(!text||loading)return;
    setInput('');
    const id=await ensureChat();
    if(!id){setMsgs(ms=>[...ms,{role:'assistant',content:'Fehler: Chat konnte nicht erstellt werden.'}]);return;}
    setMsgs(ms=>[...ms,{role:'user',content:text}]);
    setLoading(true);
    const taskCtx=buildTaskCtx(tasks,persons,milestones||[],masterplans||[]);
    try{
      const r=await fetch(`/api/${provider}/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({conversationId:id,message:text,context:taskCtx.context,model,effort})});
      const d=await r.json();
      if(!r.ok){
        setMsgs(ms=>[...ms,{role:'assistant',content:d.error||`${provider==='codex'?'Codex':'Claude'} konnte die Anfrage nicht ausführen.`,loginUrl:d.loginUrl||null,loginProvider:d.loginProvider||null}]);
        setLoading(false);
        if(r.status===401)setProviderStatus({loggedIn:false});
        if(r.status===404){sessionStorage.removeItem(`aiDashChatId:${provider}`);setChatId(null);}
        return;
      }
      const raw=d.response||d.error||'Keine Antwort.';
      const{clean,summary}=execTaskActions(raw,tasks,persons,setTasks);
      setMsgs(ms=>[...ms,{role:'assistant',content:clean+(summary?'\n'+summary.trim():'')}]);
    }catch{
      setMsgs(ms=>[...ms,{role:'assistant',content:'Verbindungsfehler. Bitte neu versuchen.'}]);
    }
    setLoading(false);
  };

  const renderText=c=>c.split('\n').map((l,i,a)=><React.Fragment key={i}>{l}{i<a.length-1&&<br/>}</React.Fragment>);

  return(
    <>
      {open&&<div style={{position:'fixed',inset:0,zIndex:8000}} onClick={()=>setOpen(false)}/>}
      <div className={`aichat-panel${open?' open':''}`}>
        <div style={{padding:'16px 18px',borderBottom:'1px solid rgba(255,255,255,.08)',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:32,height:32,borderRadius:9,background:'linear-gradient(145deg,#6EA8FF,#A8C8FF)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke="#06070A" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:600}}>KI-Assistent</div>
              <div style={{fontSize:10,color:'var(--t3)',fontFamily:"'IBM Plex Mono',monospace"}}>Nutzer: {username} · {provider==='codex'?'Codex':'Claude'}</div>
            </div>
            <button onClick={()=>setOpen(false)} style={{border:0,background:'rgba(255,255,255,.05)',color:'var(--t3)',cursor:'pointer',borderRadius:7,width:28,height:28,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>✕</button>
          </div>
          <div className="aichat-controls">
            <select className="aichat-select" value={provider} onChange={e=>setProvider(e.target.value)} disabled={loading}>
              <option value="claude">Claude</option>
              <option value="codex">Codex</option>
            </select>
            <select className="aichat-select" value={model} onChange={e=>setModel(e.target.value)} disabled={loading}>
              {modelOptions.map(item=><option key={item.id} value={item.id}>{item.label}</option>)}
            </select>
            <select className="aichat-select" value={effort} onChange={e=>setEffort(e.target.value)} disabled={loading}>
              <option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option><option value="xhigh">XHigh</option>
            </select>
          </div>
          {providerStatus&&!providerStatus.loggedIn&&(
            <button className="btn btn-p" onClick={beginLogin} disabled={loginBusy} style={{width:'100%',marginTop:9,padding:'7px 10px',fontSize:11}}>
              {loginBusy?'Login wird gestartet…':`${provider==='codex'?'Codex':'Claude'} anmelden`}
            </button>
          )}
          {deviceLogin&&(
            <div className="aichat-login">
              Öffne <a href={deviceLogin.url} target="_blank" rel="noopener noreferrer" style={{color:'#A8C8FF'}}>OpenAI Device Login</a> und gib diesen Code ein:<br/>
              <span className="aichat-code">{deviceLogin.code}</span>
            </div>
          )}
        </div>
        <div className="aichat-msgs">
          {msgs.length===0&&(
            <div style={{color:'var(--t3)',fontSize:12,fontFamily:"'IBM Plex Mono',monospace",textAlign:'center',padding:'40px 16px',lineHeight:2}}>
              Stell mir eine Frage.<br/>
              <span style={{fontSize:10,opacity:.55}}>Deine eigenen Tasks stehen standardmäßig im Fokus.<br/>Team-Tasks bleiben vollständig verfügbar.</span>
            </div>
          )}
          {msgs.map((m,i)=>(
            <div key={i} className={`aichat-bubble ${m.role==='user'?'user':'ai'}`}>
              {renderText(m.content)}
              {m.loginUrl&&<a href={m.loginUrl} target="_blank" rel="noopener noreferrer" style={{display:'block',marginTop:10,color:'#A8C8FF',fontWeight:600}}>Claude jetzt anmelden</a>}
              {m.loginProvider==='codex'&&<button onClick={beginLogin} className="btn btn-p" style={{display:'block',marginTop:10,padding:'6px 9px',fontSize:11}}>Codex jetzt anmelden</button>}
            </div>
          ))}
          {loading&&<div className="aichat-bubble ai"><div className="spin" style={{width:14,height:14}}></div></div>}
          <div ref={endRef}/>
        </div>
        <div className="aichat-in">
          <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
            <textarea ref={taRef} className="aichat-ta" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}} placeholder="Frage stellen…" rows={1}/>
            <button onClick={send} disabled={loading||!input.trim()} className="btn btn-p" style={{padding:'9px 13px',minHeight:'auto',flexShrink:0,opacity:(!input.trim()||loading)?0.45:1}}>
              <svg width={14} height={14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M22 2L11 13 M22 2L15 22 8 13 2 7z"/></svg>
            </button>
          </div>
          <div style={{marginTop:6,fontSize:9,color:'var(--t3)',fontFamily:"'IBM Plex Mono',monospace"}}>Enter senden · Shift+Enter Zeilenumbruch</div>
        </div>
      </div>
      <button onClick={()=>setOpen(o=>!o)} className={`aichat-btn${open?' open':''}`} title="KI-Assistent">
        {open?<svg width={20} height={20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6L6 18 M6 6l12 12"/></svg>:<svg width={20} height={20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>}
      </button>
    </>
  );
}

  const [masterplans,setMasterplans]=useState(initial.masterplans);
  const [teamMembers,setTeamMembers]=useState(initial.teamMembers);
  const [taskComments,setTaskComments]=useState(initial.taskComments);
  const [checklistItems,setChecklistItems]=useState(initial.checklistItems);
  const [githubLinks,setGithubLinks]=useState(initial.githubLinks);
  const [aiReviews,setAiReviews]=useState(initial.aiReviews);
  const [activityLog,setActivityLog]=useState(initial.activityLog);
  const [savedAt,setSavedAt]=useState(initial.savedAt||null);
  const [loaded,setLoaded]=useState(false);

  useEffect(()=>{
    (async()=>{
      try{
        const[p,l,t,m,c,sc]=await Promise.all([
          sb.get("persons","order=created_at.asc"),
          sb.get("leads","order=created_at.asc"),

        setDb("ok");
      }catch{setDb("error");}

          ...task,title:task.title||task.text,text:task.title||task.text,
          status:task.status||(task.done?"done":"backlog"),
          acceptance_criteria:Array.isArray(task.acceptance_criteria)?task.acceptance_criteria:[],
          definition_of_done:Array.isArray(task.definition_of_done)?task.definition_of_done:[],
          dependencies:Array.isArray(task.dependencies)?task.dependencies:[],
        });

  },[]);

    const upsert=setter=>setter(items=>{
      const index=items.findIndex(item=>item.id===row.id);
      return index>=0?items.map(item=>item.id===row.id?{...item,...row}:item):[...items,row];
    });
    if(table==="masterplans")upsert(setMasterplans);
    else if(table==="milestones")upsert(setMilestones);
    else if(table==="tasks")upsert(setTasks);
    else if(table==="team_members")upsert(setTeamMembers);
    else if(table==="task_comments")upsert(setTaskComments);
    else if(table==="task_checklist_items")upsert(setChecklistItems);
    else if(table==="github_links")upsert(setGithubLinks);
    else if(table==="ai_reviews")upsert(setAiReviews);
    else if(table==="activity_log")setActivityLog(items=>[row,...items.filter(item=>item.id!==row.id)]);
  };

  const saveResource=async(table,value)=>{
    const row={
      ...value,
      id:value.id||makeId(),
      created_at:value.created_at||new Date().toISOString(),
      updated_at:new Date().toISOString(),
    };
    if(table==="tasks"){
      row.title=row.title||row.text;
      row.text=row.title;
      row.done=row.status==="done";
    }
    applyExternal(table,row);
    const localActivity={
      id:makeId(),project_id:row.project_id||PROJECT_ID,task_id:row.task_id||(table==="tasks"?row.id:null),
      actor:window.__practioUser?.username||"lokal",action:`${table}.saved`,source:projectMode==="local"?"local":"dashboard",
      details:{resourceId:row.id},created_at:new Date().toISOString(),
    };
    setActivityLog(items=>[localActivity,...items].slice(0,100));
    try{
      const saved=await pcApi.save(table,row);
      applyExternal(table,saved);
      return saved;
    }catch{
      setProjectMode("local");
      setProjectWarning("Server-Speicherung fehlgeschlagen; Änderung bleibt im Browser gespeichert.");
      return row;
    }
  };

  const deleteResource=async(table,id)=>{
    const remove=setter=>setter(items=>items.filter(item=>item.id!==id));
    if(table==="masterplans")remove(setMasterplans);
    else if(table==="milestones")remove(setMilestones);
    else if(table==="tasks"){
      remove(setTasks);
      setTaskComments(items=>items.filter(item=>item.task_id!==id));
      setChecklistItems(items=>items.filter(item=>item.task_id!==id));
      setGithubLinks(items=>items.filter(item=>item.task_id!==id));
      setAiReviews(items=>items.filter(item=>item.task_id!==id));
    }
    else if(table==="team_members")remove(setTeamMembers);
    else if(table==="task_comments")remove(setTaskComments);
    else if(table==="task_checklist_items")remove(setChecklistItems);
    else if(table==="github_links")remove(setGithubLinks);
    else if(table==="ai_reviews")remove(setAiReviews);
    try{await pcApi.del(table,id);}
    catch{
      setProjectMode("local");
      setProjectWarning("Server-Löschung fehlgeschlagen; lokal wurde der Eintrag entfernt.");
    }
  };

  useEffect(()=>{
    if(!loaded)return;
    const timer=setTimeout(()=>{
      const savedAt=new Date().toISOString();
      const current=loadLocal();
      localStorage.setItem(STORAGE_KEY,JSON.stringify({
        ...current,persons,leads,tasks,milestones,costs,scenarios,masterplans,teamMembers,
        taskComments,checklistItems,githubLinks,aiReviews,activityLog,savedAt
      }));
      setSavedAt(savedAt);
    },250);
    return()=>clearTimeout(timer);
  },[loaded,persons,leads,tasks,milestones,costs,scenarios,masterplans,teamMembers,taskComments,checklistItems,githubLinks,aiReviews,activityLog]);

  const open=tasks.filter(t=>!t.done).length;

  return(
    <>
      {Object.entries(BG).map(([key,url])=>(
        <div key={key} className={`bg ${page===key?"on":"off"} ${key}`} style={{backgroundImage:url?`url('${url}')`:'none'}}/>
      ))}
      <div className="bgov"/>
      <div className="savepill" title={savedAt?new Date(savedAt).toLocaleString("de-DE"):"Automatisches Speichern aktiv"}>
        <span className="savedot"></span>
        {savedAt?`Automatisch gespeichert · ${new Date(savedAt).toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})}`:"Autosave aktiv"}
      </div>
      <div className="app">
        <nav className="sb" role="navigation">
          <div className="logo">
            <div className="lmark">P</div>
            <div><div className="lname">Practio</div><div className="lmeta">intern · v0.1</div></div>
          </div>
          <div className="nlbl">Navigation</div>
          {NAV.map(item=>(
            <button key={item.id} className={`ni ${page===item.id?"on":""}`} onClick={()=>setPage(item.id)} aria-current={page===item.id?"page":undefined}>
              <span className="nico"><Ic d={item.icon}/></span>
              {item.label}
              {item.id==="tasks"&&open>0&&<span className="nbadge">{open}</span>}
              {item.id==="leads"&&leads.length>0&&<span className="nbadge">{leads.length}</span>}
            </button>
          ))}
          {isAdmin&&(
            <button className="ni" onClick={()=>setShowAdmin(true)} style={{marginTop:'auto',position:'relative'}}>
              <span className="nico"><Ic d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9 M13.73 21a2 2 0 0 1-3.46 0"/></span>
              Anfragen
              {pendingCount>0&&<span className="nbadge" style={{background:'#F87171'}}>{pendingCount}</span>}
            </button>
          )}
          <div className="sbfoot">„Schweigepflicht beginnt bei der Software"</div>
        </nav>
        {showAdmin&&<AdminPanel onClose={()=>{setShowAdmin(false);fetch('/api/admin/users/pending').then(r=>r.json()).then(d=>setPendingCount(Array.isArray(d)?d.length:0)).catch(()=>{});}}/>}
        <AiChat tasks={tasks} setTasks={setTasks} persons={teamMembers} milestones={milestones} masterplans={masterplans}/>
        <main role="main" style={{flex:1,minWidth:0,paddingBottom:40}}>
          {page==="overview"   &&<Overview    leads={leads} tasks={tasks} persons={persons} teamMembers={teamMembers} db={db}/>}
          {page==="masterplan" &&<MasterplanPage masterplans={masterplans} milestones={milestones} tasks={tasks} teamMembers={teamMembers} mode={projectMode} warning={projectWarning} saveResource={saveResource} onOpenBoard={()=>setPage("tasks")}/>}
          {page==="leads"      &&<Leads       leads={leads} setLeads={setLeads} db={db}/>}
          {page==="tasks"      &&<ProjectBoard tasks={tasks} teamMembers={teamMembers} comments={taskComments} checklist={checklistItems} githubLinks={githubLinks} mode={projectMode} warning={projectWarning} saveResource={saveResource} deleteResource={deleteResource} applyExternal={applyExternal}/>}
          {page==="team"       &&<TeamPage teamMembers={teamMembers} tasks={tasks} mode={projectMode} warning={projectWarning} saveResource={saveResource}/>}
          {page==="review"     &&<ReviewAssistant tasks={tasks} githubLinks={githubLinks} aiReviews={aiReviews} activityLog={activityLog} mode={projectMode} warning={projectWarning} applyExternal={applyExternal}/>}
          {page==="milestones" &&<Milestones  milestones={milestones} setMilestones={setMilestones} db={db} saveResource={saveResource} deleteResource={deleteResource}/>}
          {page==="finance"    &&<Finance     costs={costs} scenarios={scenarios} db={db}/>}
          {page==="code"       &&<Terminal/>}
        </main>
      </div>
    </>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
