<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Practio — Internes Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root{
  --gb:rgba(255,255,255,.02);
  --gborder:rgba(255,255,255,.28);
  --t:#F4F6FB;--t2:rgba(244,246,251,.62);--t3:rgba(244,246,251,.35);
  --a:#6EA8FF;--gold:#D4B483;--ok:#4ADE80;--warn:#FBBf24;--err:#F87171;--pu:#C084FC;
  --ease:cubic-bezier(0.23,1,0.32,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;color:var(--t);background:#06070A;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.bg{position:fixed;inset:0;z-index:0;background-color:#06070A;background-size:contain;background-position:center;background-repeat:no-repeat;transition:opacity 800ms var(--ease),transform 1200ms var(--ease);transform:scale(1.04)}
.bg.code{background-image:none!important;background:#06070A}
.bg.on{opacity:1;transform:scale(1)}.bg.off{opacity:0}
.bgov{position:fixed;inset:0;z-index:1;background:linear-gradient(120deg,rgba(6,7,10,.85) 0%,rgba(6,7,10,.55) 50%,rgba(6,7,10,.75) 100%);pointer-events:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px}
.gl{background:var(--gb);border:1px solid var(--gborder);border-radius:14px;position:relative;overflow:hidden}
.gl::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:rgba(255,255,255,.45);pointer-events:none;z-index:1}
.gl::after{content:'';position:absolute;inset:0;border-radius:14px;background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,transparent 40%);pointer-events:none}
.app{position:relative;z-index:2;display:flex;min-height:100vh;padding:20px;gap:20px}
.sb{width:220px;flex-shrink:0;display:flex;flex-direction:column;padding:20px 0;position:sticky;top:20px;height:calc(100vh - 40px);animation:slin 700ms var(--ease) both;background:transparent}
.logo{display:flex;align-items:center;gap:11px;padding:0 16px 20px}
.lmark{width:34px;height:34px;border-radius:9px;background:linear-gradient(145deg,#6EA8FF,#A8C8FF);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#0A0E18;flex-shrink:0;box-shadow:0 4px 16px rgba(110,168,255,.35)}
.lname{font-size:15px;font-weight:700;letter-spacing:-.3px}.lmeta{font-size:10px;color:var(--t3);font-family:'IBM Plex Mono',monospace}
.nlbl{font-size:9px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:var(--t3);padding:18px 16px 8px}
.ni{display:flex;align-items:center;gap:11px;margin:2px 8px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--t2);transition:all 180ms var(--ease);min-height:44px;border:1px solid transparent;background:transparent;appearance:none;-webkit-appearance:none;width:calc(100% - 16px);text-align:left;font-family:inherit;position:relative;overflow:hidden}
.ni:hover{color:var(--t);background:rgba(255,255,255,.05)}
.ni.on{color:var(--t);background:rgba(110,168,255,.12);border-color:rgba(110,168,255,.25)}
.ni.on::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:var(--a);border-radius:0 3px 3px 0}
.nico{width:16px;height:16px;flex-shrink:0;display:flex}
.nbadge{margin-left:auto;font-size:10px;font-weight:600;font-family:'IBM Plex Mono',monospace;background:rgba(110,168,255,.2);color:#A8C8FF;padding:2px 6px;border-radius:20px}
.sbfoot{margin-top:auto;padding:16px 16px 0;font-family:'Instrument Serif',serif;font-style:italic;font-size:14px;color:var(--t2);line-height:1.4}
.main{flex:1;min-width:0;padding-bottom:40px}
.ph{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;padding-top:8px;animation:fup 500ms var(--ease) both}
.ptitle{font-family:'Instrument Serif',serif;font-size:42px;line-height:1;letter-spacing:-.5px}
.ptitle em{font-style:italic;color:var(--gold)}
.psub{font-size:12px;color:var(--t2);font-family:'IBM Plex Mono',monospace;margin-top:5px}
.pill{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:30px;background:rgba(255,255,255,.05);border:1px solid var(--gborder);font-size:11px;color:var(--t2);font-family:'IBM Plex Mono',monospace}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--ok);box-shadow:0 0 7px var(--ok);animation:pulse 2s ease-in-out infinite}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.sc{padding:20px;animation:fup 600ms var(--ease) both;transition:transform 250ms var(--ease)}
.sc:hover{transform:translateY(-2px)}
.stop{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sname{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--t3)}
.sbig{font-size:36px;font-weight:700;letter-spacing:-1.5px;line-height:1;font-variant-numeric:tabular-nums}
.scap{font-size:11px;color:var(--t2);font-family:'IBM Plex Mono',monospace;margin-top:7px}
.card{animation:fup 600ms var(--ease) both}
.ch{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:1px solid var(--gborder)}
.ct{font-size:13px;font-weight:600}
.cb{padding:16px 20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.fr{display:flex;align-items:center;gap:12px;padding:8px 0}
.fl{font-size:11px;color:var(--t2);font-family:'IBM Plex Mono',monospace;width:76px;flex-shrink:0}
.ft{flex:1;height:20px;border-radius:6px;background:rgba(255,255,255,.05);overflow:hidden}
.ff{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:600;color:#06070A;transition:width 700ms var(--ease)}
.fn{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--t2);width:18px;text-align:right}
.pt{height:4px;border-radius:3px;background:rgba(255,255,255,.07);overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width 700ms var(--ease)}
.msr{padding:12px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.msr:last-child{border-bottom:none}
.msh{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.msd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.msn{font-size:13px;font-weight:600;flex:1}
.msdt{font-size:10px;color:var(--t3);font-family:'IBM Plex Mono',monospace}
.msactions{display:flex;align-items:center;gap:5px;margin-left:4px}
.msprogress{width:62px;min-height:28px;padding:4px 7px;font-size:10px;font-family:'IBM Plex Mono',monospace;text-align:right}
.msform{display:grid;grid-template-columns:minmax(180px,2fr) minmax(140px,1fr) 110px 110px auto;gap:8px;padding-top:16px;border-top:1px solid var(--gborder);margin-top:14px;align-items:center}
.mscolor{height:38px;padding:4px;cursor:pointer}
@media(max-width:900px){.msform{grid-template-columns:1fr 1fr}.msform .mslabel{grid-column:1/-1}}
/* TASKS BOARD */
.board{display:flex;gap:14px;margin-bottom:18px;overflow-x:auto;padding-bottom:4px}
.board::-webkit-scrollbar{height:3px}
.tcol{flex:0 0 280px;display:flex;flex-direction:column}
.tch{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--gborder)}
.tcn{display:flex;align-items:center;gap:10px}
.av{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid var(--gborder);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.tct{font-size:13px;font-weight:600}
.tcb{flex:1;padding:8px 14px;min-height:80px}
.tce{text-align:center;padding:22px 0;color:var(--t3);font-size:11px;font-family:'IBM Plex Mono',monospace}
.tr{display:flex;align-items:flex-start;gap:11px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.tr:last-child{border-bottom:none}
.tck{width:18px;height:18px;flex-shrink:0;margin-top:2px;border:1.5px solid rgba(255,255,255,.2);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 160ms var(--ease);background:transparent;padding:0}
.tck:hover{border-color:var(--a);background:rgba(110,168,255,.12)}
.tck.done{background:var(--ok);border-color:var(--ok)}
.tck svg{width:10px;height:10px;opacity:0;transition:opacity 150ms}
.tck.done svg{opacity:1}
.tb{flex:1;min-width:0}.ttxt{font-size:13px;font-weight:500;line-height:1.4}
.ttxt.done{text-decoration:line-through;color:var(--t3)}
.tmet{font-size:10px;color:var(--t3);font-family:'IBM Plex Mono',monospace;margin-top:2px}
.tdel{background:none;border:none;color:var(--t3);cursor:pointer;padding:2px 5px;font-size:13px;line-height:1;transition:color 140ms;align-self:center}
.tdel:hover{color:var(--err)}
.tci{padding:10px 14px;border-top:1px solid var(--gborder)}
.tci input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:var(--t);padding:8px 11px;border-radius:8px;font-size:12px;font-family:'Inter',sans-serif;outline:none;transition:border-color 150ms;min-height:auto}
.tci input:focus{border-color:var(--a)}.tci input::placeholder{color:var(--t3)}
.addcol{flex:0 0 200px;display:flex;align-items:center;justify-content:center;gap:8px;border:1px dashed rgba(255,255,255,.15);border-radius:14px;color:var(--t3);font-size:13px;cursor:pointer;transition:all 200ms var(--ease);background:transparent;font-family:'Inter',sans-serif;min-height:160px}
.addcol:hover{border-color:rgba(255,255,255,.3);color:var(--t2);background:rgba(255,255,255,.02)}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;font-family:'IBM Plex Mono',monospace}
.badge::before{content:'';width:4px;height:4px;border-radius:50%;background:currentColor}
.bd-bl{background:rgba(110,168,255,.15);color:#A8C8FF}.bd-gn{background:rgba(74,222,128,.13);color:var(--ok)}
.bd-yw{background:rgba(251,191,36,.13);color:var(--warn)}.bd-rd{background:rgba(248,113,113,.13);color:var(--err)}
.bd-gy{background:rgba(255,255,255,.08);color:var(--t2)}.bd-pu{background:rgba(192,132,252,.13);color:var(--pu)}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--t3);padding:0 13px 11px;border-bottom:1px solid var(--gborder)}
.tbl td{padding:11px 13px;font-size:12px;color:var(--t2);border-bottom:1px solid rgba(255,255,255,.05)}
.tbl tbody tr{transition:background 130ms;cursor:pointer}
.tbl tbody tr:hover td{background:rgba(255,255,255,.03)}
.tbl tbody tr:last-child td{border-bottom:none}
.td-n{font-weight:600;color:var(--t)!important}.td-m{font-family:'IBM Plex Mono',monospace;font-size:10px!important}
.finr{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:13px}
.finr:last-child{border-bottom:none}
.finl{color:var(--t2);display:flex;align-items:center;gap:9px}
.find{width:6px;height:6px;border-radius:50%}
.finv{font-family:'IBM Plex Mono',monospace;font-weight:600;font-variant-numeric:tabular-nums}
.tabs{display:flex;gap:5px;margin-bottom:18px;flex-wrap:wrap}
.tab{padding:7px 13px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;color:var(--t2);border:1px solid transparent;background:rgba(255,255,255,.03);transition:all 160ms var(--ease);min-height:34px;display:inline-flex;align-items:center;gap:5px;font-family:'Inter',sans-serif}
.tab:hover{color:var(--t);background:rgba(255,255,255,.07)}
.tab.on{color:var(--t);background:rgba(110,168,255,.15);border-color:rgba(110,168,255,.25)}
.tct2{font-family:'IBM Plex Mono',monospace;opacity:.55}
input,select{background:rgba(255,255,255,.05);border:1px solid var(--gborder);color:var(--t);padding:9px 12px;border-radius:9px;font-size:12px;font-family:'Inter',sans-serif;outline:none;transition:border-color 160ms;min-height:38px}
input:focus,select:focus{border-color:var(--a)}
input::placeholder{color:var(--t3)}select option{background:#14161E}
.ssel{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--t2);padding:4px 7px;border-radius:7px;font-size:10px;font-family:'IBM Plex Mono',monospace;cursor:pointer;outline:none}
.btn{padding:9px 16px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all 160ms var(--ease);min-height:38px;display:inline-flex;align-items:center;gap:5px;text-decoration:none}
.btn:active{transform:scale(.97)}
.btn-p{background:linear-gradient(135deg,#6EA8FF,#5A93FF);color:#06070A;box-shadow:0 3px 12px rgba(110,168,255,.3)}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(110,168,255,.4)}
.btn-g{background:rgba(255,255,255,.05);color:var(--t2);border:1px solid var(--gborder)}
.btn-g:hover{background:rgba(255,255,255,.09);color:var(--t)}
.inrow{display:flex;gap:8px;padding-top:16px;border-top:1px solid var(--gborder);margin-top:14px}
.dbb{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:9px;margin-bottom:18px;font-size:12px;font-family:'IBM Plex Mono',monospace}
.dbl{background:rgba(110,168,255,.1);border:1px solid rgba(110,168,255,.2);color:#A8C8FF}
.dbe{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);color:var(--err)}
.dbo{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.18);color:var(--ok)}
.spin{width:12px;height:12px;border:2px solid rgba(110,168,255,.3);border-top-color:#A8C8FF;border-radius:50%;animation:spin 600ms linear infinite;display:inline-block}
.savepill{position:fixed;right:20px;bottom:20px;z-index:10;display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:30px;background:rgba(6,7,10,.72);border:1px solid var(--gborder);backdrop-filter:blur(12px);font-size:10px;color:var(--t2);font-family:'IBM Plex Mono',monospace}
.savedot{width:6px;height:6px;border-radius:50%;background:var(--ok);box-shadow:0 0 7px var(--ok)}
/* TERMINAL */
.tw{display:flex;flex-direction:column;height:calc(100vh - 180px);min-height:400px;padding:0;overflow:hidden}
.tbar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--gborder)}
.tdots{display:flex;gap:6px}.tdot{width:11px;height:11px;border-radius:50%}
.ttitle{font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--t2);margin-left:6px}
.tstat{display:flex;align-items:center;gap:7px;font-size:11px;font-family:'IBM Plex Mono',monospace}
.tstatd{width:7px;height:7px;border-radius:50%}
.toff{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px;text-align:center}
@keyframes fup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slin{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
.page{animation:fup 450ms var(--ease) both}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
/* AI CHAT */
.aichat-btn{position:fixed;bottom:70px;right:20px;width:48px;height:48px;border-radius:50%;background:linear-gradient(145deg,#6EA8FF,#5A93FF);border:none;color:#06070A;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(110,168,255,.4);transition:all 250ms var(--ease);z-index:8002}
.aichat-btn:hover{transform:scale(1.08);box-shadow:0 6px 26px rgba(110,168,255,.55)}
.aichat-btn.open{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);color:var(--t2);box-shadow:none;transform:none}
.aichat-panel{position:fixed;top:0;right:-420px;bottom:0;width:400px;z-index:8001;background:rgba(8,10,16,.97);backdrop-filter:blur(24px);border-left:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;transition:right 350ms var(--ease)}
.aichat-panel.open{right:0;box-shadow:-20px 0 60px rgba(0,0,0,.6)}
.aichat-msgs{flex:1;min-height:0;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:12px}
.aichat-msgs::-webkit-scrollbar{width:3px}.aichat-msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.aichat-bubble{max-width:85%;padding:9px 13px;font-size:13px;line-height:1.65;color:var(--t);word-break:break-word}
.aichat-bubble.user{align-self:flex-end;background:rgba(110,168,255,.18);border:1px solid rgba(110,168,255,.28);border-radius:13px 13px 4px 13px}
.aichat-bubble.ai{align-self:flex-start;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);border-radius:13px 13px 13px 4px}
.aichat-controls{display:flex;gap:6px;width:100%;margin-top:10px}
.aichat-select{min-width:0;flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--t2);border-radius:7px;padding:6px 7px;font-size:10px;font-family:'IBM Plex Mono',monospace;outline:none}
.aichat-select option{background:#11141c;color:var(--t)}
.aichat-login{margin-top:9px;padding:9px 10px;border-radius:8px;background:rgba(110,168,255,.08);border:1px solid rgba(110,168,255,.2);font-size:11px;color:var(--t2);line-height:1.5}
.aichat-code{display:inline-block;margin:5px 0 0;padding:4px 7px;border-radius:5px;background:rgba(255,255,255,.08);color:#fff;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.08em}
.aichat-in{padding:12px 18px 16px;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0}
.aichat-ta{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:var(--t);padding:9px 12px;border-radius:10px;font-size:13px;font-family:'Inter',sans-serif;outline:none;resize:none;line-height:1.5;max-height:100px;overflow-y:auto;transition:border-color 150ms}
.aichat-ta:focus{border-color:var(--a)}.aichat-ta::placeholder{color:var(--t3)}
/* PROJECT CONTROL */
.pc-banner{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 14px;margin-bottom:16px;border-radius:10px;background:rgba(110,168,255,.09);border:1px solid rgba(110,168,255,.22);font-size:11px;color:#C8DCFF;font-family:'IBM Plex Mono',monospace}
.pc-banner.warn{background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.24);color:#FDE68A}
.pc-grid{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:14px;margin-bottom:18px}
.pc-span-12{grid-column:span 12}.pc-span-8{grid-column:span 8}.pc-span-7{grid-column:span 7}.pc-span-6{grid-column:span 6}.pc-span-5{grid-column:span 5}.pc-span-4{grid-column:span 4}
.pc-card{padding:18px 20px}.pc-card h2{font-size:13px;font-weight:600;margin-bottom:13px}.pc-help{font-size:11px;color:var(--t3);line-height:1.6;margin-top:5px}
.pc-label{display:block;font-size:10px;font-weight:600;letter-spacing:.65px;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
.pc-field{margin-bottom:14px}.pc-field:last-child{margin-bottom:0}
textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--gborder);color:var(--t);padding:10px 12px;border-radius:9px;font-size:12px;font-family:'Inter',sans-serif;outline:none;resize:vertical;line-height:1.55;transition:border-color 160ms}
textarea:focus{border-color:var(--a)}textarea::placeholder{color:var(--t3)}
.pc-input{width:100%}.pc-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.pc-actions.end{justify-content:flex-end}
.pc-list{display:flex;flex-direction:column;gap:8px}.pc-list-row{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)}.pc-list-row:last-child{border-bottom:0}

<!-- Auth Overlay (vanilla JS, lädt vor React) -->
<div id="authOverlay" style="position:fixed;inset:0;z-index:9999;background:#06070A;display:flex;align-items:center;justify-content:center;padding:20px;font-family:'Inter',-apple-system,sans-serif;">
  <div style="width:100%;max-width:360px">
    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:13px;letter-spacing:.15em;text-transform:uppercase;color:rgba(244,246,251,.35);margin-bottom:8px">Practio</div>
      <h1 style="font-size:24px;font-weight:600;color:#F4F6FB;margin:0" id="authHeading">Willkommen zurück</h1>
      <p style="margin-top:8px;font-size:13px;color:rgba(244,246,251,.5)" id="authSub">Melde dich an um fortzufahren.</p>
    </div>
    <div style="background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:24px">
      <label style="display:block;font-size:11px;color:rgba(244,246,251,.5);margin-bottom:6px">Benutzername</label>
      <input id="authUser" type="text" autocomplete="username" autocorrect="off" autocapitalize="none" spellcheck="false" placeholder="z.B. ole"
        style="display:block;width:100%;padding:10px 12px;background:#0d1117;border:1px solid rgba(255,255,255,.1);border-radius:9px;color:#F4F6FB;font-size:14px;outline:none;margin-bottom:14px;font-family:inherit">
      <label style="display:block;font-size:11px;color:rgba(244,246,251,.5);margin-bottom:6px">Passwort</label>
      <input id="authPass" type="password" autocomplete="current-password" placeholder="••••••"
        style="display:block;width:100%;padding:10px 12px;background:#0d1117;border:1px solid rgba(255,255,255,.1);border-radius:9px;color:#F4F6FB;font-size:14px;outline:none;margin-bottom:6px;font-family:inherit">
      <div id="authErr" style="font-size:11px;color:#F87171;min-height:18px;margin-bottom:10px"></div>
      <button id="authBtn" onclick="doAuth()"
        style="width:100%;padding:11px;background:#6EA8FF;border:0;border-radius:9px;color:#06070A;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px">Anmelden</button>
      <button id="authToggleBtn" onclick="toggleAuthMode()"
        style="width:100%;padding:9px;background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:9px;color:rgba(244,246,251,.5);font-size:12px;cursor:pointer;font-family:inherit">Noch kein Konto? Registrieren</button>
    </div>
  </div>
</div>

<script>
(function(){
  var COLORS=['blue','purple','green','yellow','red'];

  function colorForName(name){
    var h=0;for(var i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))>>>0;
    return COLORS[h%COLORS.length];
  }

  function ensurePerson(username){
    try{
      var key='practio-dashboard-v1';
      var data=JSON.parse(localStorage.getItem(key)||'{}');
      var persons=data.persons||[];
      var lname=username.toLowerCase();
      var exists=persons.some(function(p){return p.name.toLowerCase()===lname;});
      if(!exists){
        var np={id:Date.now().toString(),name:username,color:colorForName(username),created_at:new Date().toISOString()};
        persons.push(np);
        localStorage.setItem(key,JSON.stringify(Object.assign({},data,{persons:persons})));
        window.dispatchEvent(new CustomEvent('practio:person-added',{detail:np}));
      }
    }catch(e){}
  }

  var mode='login';
  var overlay=document.getElementById('authOverlay');

  ['authUser','authPass'].forEach(function(id){
    var el=document.getElementById(id);
    el.addEventListener('focus',function(){el.style.borderColor='#6EA8FF';});
    el.addEventListener('blur',function(){el.style.borderColor='rgba(255,255,255,.1)';});
    el.addEventListener('keydown',function(e){if(e.key==='Enter')doAuth();});
  });

  window.toggleAuthMode=function(){
    mode=mode==='login'?'register':'login';
    document.getElementById('authHeading').textContent=mode==='login'?'Willkommen zurück':'Konto erstellen';
    document.getElementById('authSub').textContent=mode==='login'?'Melde dich an um fortzufahren.':'Wähle Benutzername und Passwort.';
    document.getElementById('authBtn').textContent=mode==='login'?'Anmelden':'Registrieren';
    document.getElementById('authToggleBtn').textContent=mode==='login'?'Noch kein Konto? Registrieren':'Bereits registriert? Anmelden';
    document.getElementById('authErr').textContent='';
    document.getElementById('authPass').autocomplete=mode==='login'?'current-password':'new-password';
  };

  function showPending(username){
    document.getElementById('authHeading').textContent='Anfrage gesendet';
    document.getElementById('authSub').textContent='';
    document.getElementById('authUser').style.display='none';
    document.getElementById('authPass').style.display='none';
    document.getElementById('authUser').previousElementSibling.style.display='none';
    document.getElementById('authPass').previousElementSibling.style.display='none';
    document.getElementById('authErr').style.display='none';
    document.getElementById('authBtn').style.display='none';
    document.getElementById('authToggleBtn').style.display='none';
    var box=document.querySelector('#authOverlay .modal-inner')||document.querySelector('#authOverlay [style*="background"]');
    var msg=document.createElement('div');
    msg.style.cssText='text-align:center;padding:8px 0;color:rgba(244,246,251,.7);font-size:13px;line-height:1.7';
    msg.innerHTML='Dein Account <strong style="color:#F4F6FB">'+username+'</strong> wurde erstellt.<br>Der Admin muss deine Anfrage erst genehmigen.<br><span style="color:rgba(244,246,251,.4);font-size:11px">Du erhältst keinen weiteren Hinweis — versuch es einfach später erneut.</span>';
    document.querySelector('#authOverlay > div > div:last-child').appendChild(msg);
  }

  function unlockOverlay(){
    overlay.style.transition='opacity .4s';
    overlay.style.opacity='0';
    setTimeout(function(){overlay.style.display='none';},400);
  }

  window.doAuth=function(){
    var username=document.getElementById('authUser').value.trim();
    var password=document.getElementById('authPass').value;
    var btn=document.getElementById('authBtn');
    var err=document.getElementById('authErr');
    if(!username||!password){err.textContent='Bitte beide Felder ausfüllen.';return;}
    btn.disabled=true;btn.textContent='...';err.textContent='';
    var endpoint=mode==='login'?'/api/users/login':'/api/users/register';
    fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:username,password:password})})
      .then(function(r){return r.json().then(function(d){return{ok:r.ok,status:r.status,data:d};});})
      .then(function(res){
        if(res.ok && res.data.pending){
          showPending(username);
        } else if(res.ok){
          window.__practioUser={username:res.data.username||username,isAdmin:res.data.isAdmin||false};
          ensurePerson(res.data.username||username);
          unlockOverlay();
        } else {
          err.textContent=res.data.error||'Fehler beim Anmelden.';
          btn.disabled=false;btn.textContent=mode==='login'?'Anmelden':'Registrieren';
        }
      })
      .catch(function(){
        err.textContent='Verbindungsfehler. Bitte neu laden.';
        btn.disabled=false;btn.textContent=mode==='login'?'Anmelden':'Registrieren';
      });
  };

  // Prüfen ob bereits eingeloggt
  fetch('/api/users/me')
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.loggedIn){
        window.__practioUser={username:d.username,isAdmin:d.isAdmin||false};
        ensurePerson(d.username);
        overlay.style.display='none';
      } else {
        document.getElementById('authUser').focus();
      }
    })
    .catch(function(){document.getElementById('authUser').focus();});
})();
</script>

function vibeDiffCls(d){return(VIBE_DIFFICULTIES.find(v=>v.id===d)||{cls:""}).cls;}
function vibeDiffForModule(module,isResearch){
  if(isResearch)return{vibe_difficulty:"leicht",vibe_duration:"~30 min"};
  const m=(module||"").toLowerCase();
  if(m.includes("sicherheit")||m.includes("betrieb"))return{vibe_difficulty:"sehr schwer",vibe_duration:"~2-3 Tage"};
  if(m.includes("abrechnung"))return{vibe_difficulty:"schwer",vibe_duration:"~1 Tag"};
  if(m.includes("dokumentation")||m.includes("dokument"))return{vibe_difficulty:"leicht",vibe_duration:"~2-3h"};
  return{vibe_difficulty:"mittel",vibe_duration:"~4-6h"};
}
const taskName=task=>task.title||task.text||"Unbenannter Task";
const memberFor=(task,members)=>members.find(member=>member.id===(task.team_member_id||task.assignee_id));
function nextSensibleTask(tasks){
  const done=new Set(tasks.filter(task=>task.status==="done"||task.done).map(task=>task.id));
  return tasks
    .filter(task=>!["done","blocked","review"].includes(task.status||"backlog"))
    .filter(task=>(task.dependencies||[]).every(id=>done.has(id)))
    .sort((a,b)=>{
      const statusScore={in_progress:4,this_week:3,backlog:2}[b.status||"backlog"]-{in_progress:4,this_week:3,backlog:2}[a.status||"backlog"];
      return statusScore||(PRIORITY_WEIGHT[b.priority]||0)-(PRIORITY_WEIGHT[a.priority]||0)||(a.sort_order||0)-(b.sort_order||0);
    })[0]||null;
}

function DailyFocus({tasks,teamMembers}){
  const focus=tasks
    .filter(task=>task.status==="in_progress")
    .sort((a,b)=>(PRIORITY_WEIGHT[b.priority]||0)-(PRIORITY_WEIGHT[a.priority]||0))[0]||nextSensibleTask(tasks);
  const nextTask=nextSensibleTask(tasks.filter(task=>task.id!==focus?.id));
  const blockers=tasks.filter(task=>task.status==="blocked");
  const ole=teamMembers.find(member=>member.name.toLowerCase()==="ole");
  const henry=teamMembers.find(member=>member.name.toLowerCase()==="henry");
  const ownTasks=member=>tasks.filter(task=>(task.team_member_id||task.assignee_id)===member?.id&&!["done"].includes(task.status));
  return(
    <div className="focus-grid">
      <div className="gl focus-main">
        <div className="focus-kicker">Daily Focus · wichtigste Aufgabe heute</div>
        <div className="focus-title">{focus?taskName(focus):"Keine ausführbare Aufgabe vorhanden"}</div>
        <div className="focus-meta">

        </div>
      </div>
      <div className="gl focus-side">
        <span className="ct">Ole</span>
        {ownTasks(ole).slice(0,3).map(task=><div className="focus-task" key={task.id}>{taskName(task)}</div>)}
        {!ownTasks(ole).length&&<div className="tce">Keine offenen Tasks</div>}
      </div>
      <div className="gl focus-side">
        <span className="ct">Henry</span>
        {ownTasks(henry).slice(0,3).map(task=><div className="focus-task" key={task.id}>{taskName(task)}</div>)}
        {!ownTasks(henry).length&&<div className="tce">Keine offenen Tasks</div>}
      </div>
      <div className="gl focus-side" style={{gridColumn:"1/-1"}}>
        <span className="ct">Nächster sinnvoller Task</span>
        <div className="focus-task">{nextTask?`${taskName(nextTask)} · ${memberFor(nextTask,teamMembers)?.name||"nicht zugewiesen"}`:"Keine weitere ausführbare Aufgabe vorhanden."}</div>

    </div>
  );
}

  },[newPN,taskDrafts]);

    if(db==="ok")try{await sb.patch("tasks",id,{done:!t.done});}catch{}

  };

    setTasks(ts=>[...ts,{...row,id:Date.now().toString()}]);

    const row={name:newPN.trim(),color:"blue"};

    setPersons(ps=>[...ps,{...row,id:Date.now().toString()}]);
    setNewPN("");setAddP(false);
  };
  const deletePerson=async(id)=>{
    const p=persons.find(x=>x.id===id);

    if(p.name.toLowerCase()===(window.__practioUser?.isAdmin&&window.__practioUser?.username||'').toLowerCase()){

    setPersons(ps=>ps.filter(x=>x.id!==id));
    try{if(db==="ok")await sb.del("persons",id);}catch{}

        )}

      <div className="board">
        {persons.map((p,pi)=>(
          <div className="gl tcol" key={p.id}>
            <div className="tch">
              <div className="tcn"><div className="av">{p.name[0]}</div><span className="tct">{p.name}</span></div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span className={`badge ${COLS[pi%COLS.length]}`}>{tasks.filter(t=>t.assignee_id===p.id&&!t.done).length}</span>

              </div>

            <div className="tcb">
              {tasks.filter(t=>t.assignee_id===p.id).length===0
                ?<div className="tce">Keine Tasks</div>
                :tasks.filter(t=>t.assignee_id===p.id).map((t,i)=>(
                  <div className="tr" key={t.id} style={{animationDelay:`${i*35}ms`}}>
                    <button className={`tck ${t.done?"done":""}`} onClick={()=>toggle(t.id)}>
                      <svg viewBox="0 0 24 24" fill="none" stroke="#06070A" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><path d={ic.check}/></svg>
                    </button>
                    <div className="tb"><div className={`ttxt ${t.done?"done":""}`}>{t.text}</div>{t.meta&&<div className="tmet">{t.meta}</div>}</div>
                    <button className="tdel" onClick={()=>del(t.id)}>✕</button>
                  </div>

            <div className="tci">
              <input placeholder="+ Aufgabe…" value={taskDrafts[p.id]||""} onChange={e=>setTaskDrafts(ds=>({...ds,[p.id]:e.target.value}))} onKeyDown={e=>{if(e.key==="Enter"&&e.target.value.trim())addT(e.target.value,p.id);}}/>
            </div>
          </div>
        ))}
        <button className="addcol" onClick={()=>setAddP(true)}><Ic d={ic.plus} size={18}/> Person</button>
      </div>
    </div>
  );
}

function ModeBanner({mode,warning}){
  if(mode==="loading")return null;
  const fallback=mode!=="supabase";
  return <div className={`pc-banner ${fallback?"warn":""}`}>
    <span>{fallback?"Fallback-Modus · lokal/serverseitig gespeichert":"Supabase · Projekt-Daten verbunden"}</span>
    <span>{warning||"GitHub- und AI-Zugriffe laufen ausschließlich über den Server."}</span>
  </div>;
}

function MasterplanPage({masterplans,milestones,tasks,teamMembers,mode,warning,saveResource,onOpenBoard}){
  const current=[...masterplans].sort((a,b)=>(b.version||0)-(a.version||0))[0]||DEFAULT_MASTERPLAN;
  const [draft,setDraft]=useState({...current});
  const [busy,setBusy]=useState(false);
  const [message,setMessage]=useState("");
  useEffect(()=>setDraft({...current}),[current.id,current.version]);
  const asLines=value=>(Array.isArray(value)?value:[]).join("\n");
  const fromLines=value=>value.split("\n").map(item=>item.trim()).filter(Boolean);
  const saveVersion=async()=>{
    setBusy(true);setMessage("");
    const version=Math.max(0,...masterplans.map(item=>Number(item.version)||0))+1;
    await saveResource("masterplans",{
      ...draft,id:makeId(),project_id:PROJECT_ID,version,
      modules:fromLines(asLines(draft.modules)),
      risks:fromLines(asLines(draft.risks)),
      open_questions:fromLines(asLines(draft.open_questions)),
      created_at:new Date().toISOString(),
    });
    setBusy(false);setMessage(`Version ${version} gespeichert.`);
  };
  const generateTasks=async(reset=false)=>{
    const modules=fromLines(asLines(draft.modules));
    if(!modules.length){setMessage("Mindestens ein Modul ist erforderlich.");return;}
    if(reset&&tasks.length>0){
      if(!window.confirm(`Alle ${tasks.length} bestehenden Tasks löschen und neu generieren?`))return;
    }
    setBusy(true);setMessage("");
    if(reset){
      for(const t of tasks){await deleteResource("tasks",t.id).catch(()=>{});}
    }
    const ole=teamMembers.find(member=>member.name.toLowerCase()==="ole");
    const henry=teamMembers.find(member=>member.name.toLowerCase()==="henry");
    const currentTasks=reset?[]:tasks;
    const existing=new Set(currentTasks.map(task=>taskName(task).toLowerCase()));
    let created=0;
    for(const [index,module] of modules.entries()){
      const researchTitle=`${module}: Anforderungen und Praxisfälle konkretisieren`;
      const existingResearch=currentTasks.find(task=>taskName(task).toLowerCase()===researchTitle.toLowerCase());
      const researchId=existingResearch?.id||makeId();
      const researchVibe=vibeDiffForModule(module,true);
      if(!existing.has(researchTitle.toLowerCase())){
        await saveResource("tasks",{
          id:researchId,project_id:PROJECT_ID,title:researchTitle,text:researchTitle,
          description:`Recherche, Praxisanforderungen und offene Entscheidungen für das Modul ${module} dokumentieren.`,
          acceptance_criteria:["Mindestens drei konkrete Praxisfälle dokumentiert","Offene Produktentscheidungen markiert","Ergebnis im Task kommentiert"],
          definition_of_done:["Recherche geprüft","Dokumentation verlinkt"],
          priority:"medium",module,effort:"S",...researchVibe,
          team_member_id:henry?.id||null,dependencies:[],status:"backlog",done:false,sort_order:index*2,
        });created++;
      }
      const buildTitle=`${module}: MVP-Slice umsetzen`;
      const buildVibe=vibeDiffForModule(module,false);
      if(!existing.has(buildTitle.toLowerCase())){
        await saveResource("tasks",{
          id:makeId(),project_id:PROJECT_ID,title:buildTitle,text:buildTitle,
          description:`Kleinsten produktionsfähigen End-to-End-Slice für ${module} implementieren.`,
          acceptance_criteria:["Kernworkflow funktioniert Ende-zu-Ende","Fehler- und Empty States vorhanden","Relevante Tests laufen","Keine Secrets im Frontend"],
          definition_of_done:["Branch und Commit verknüpft","AI Review durchgeführt","PR-Checks bestanden","Manuelle Freigabe dokumentiert"],
          priority:"high",module,effort:"M",...buildVibe,
          team_member_id:ole?.id||null,dependencies:[researchId],status:"backlog",done:false,sort_order:index*2+1,
        });created++;
      }
    }
    setBusy(false);setMessage(reset?`${created} Tasks neu generiert.`:`${created} Tasks erzeugt.`);
    if(created)setTimeout(onOpenBoard,450);
  };
  const updateList=(field,value)=>setDraft({...draft,[field]:value.split("\n")});
  return(
    <div className="page">
      <div className="ph">
        <div><h1 className="ptitle">Master<em>plan</em></h1><p className="psub">Produktplan · Version {current.version||1}</p></div>
        <div className="pc-actions">
          <button className="btn btn-g" onClick={saveVersion} disabled={busy}>Version speichern</button>
          <button className="btn btn-g" onClick={()=>generateTasks(false)} disabled={busy}>{busy?"Arbeite…":"Tasks ergänzen"}</button>
          <button className="btn btn-p" onClick={()=>generateTasks(true)} disabled={busy}>{busy?"Arbeite…":"Alles neu generieren"}</button>
        </div>
      </div>
      <ModeBanner mode={mode} warning={warning}/>
      {message&&<div className="dbb dbo">{message}</div>}
      <div className="pc-grid">
        <div className="gl pc-card pc-span-6">
          <div className="pc-field"><label className="pc-label" htmlFor="productGoal">Produktziel</label><textarea id="productGoal" rows={5} value={draft.product_goal||""} onChange={e=>setDraft({...draft,product_goal:e.target.value})}/></div>
        </div>
        <div className="gl pc-card pc-span-6">
          <div className="pc-field"><label className="pc-label" htmlFor="mvpGoal">MVP-Ziel</label><textarea id="mvpGoal" rows={5} value={draft.mvp_goal||""} onChange={e=>setDraft({...draft,mvp_goal:e.target.value})}/></div>
        </div>
        <div className="gl pc-card pc-span-4">
          <h2>Module</h2>
          <textarea rows={10} value={asLines(draft.modules)} onChange={e=>updateList("modules",e.target.value)} aria-label="Module, eine Zeile pro Eintrag"/>
          <div className="pc-help">Eine Zeile pro Modul. Daraus werden Recherche- und Umsetzungstasks erzeugt.</div>
        </div>
        <div className="gl pc-card pc-span-4">
          <h2>Risiken</h2>
          <textarea rows={10} value={asLines(draft.risks)} onChange={e=>updateList("risks",e.target.value)} aria-label="Risiken, eine Zeile pro Eintrag"/>
        </div>
        <div className="gl pc-card pc-span-4">
          <h2>Offene Fragen</h2>
          <textarea rows={10} value={asLines(draft.open_questions)} onChange={e=>updateList("open_questions",e.target.value)} aria-label="Offene Fragen, eine Zeile pro Eintrag"/>
        </div>
        <div className="gl pc-card pc-span-7">
          <h2>Milestones</h2>
          {milestones.length===0?<div className="tce">Noch keine Milestones. Lege sie unter „Meilensteine“ an.</div>:milestones.map(item=>(
            <div className="msr" key={item.id}>
              <div className="msh"><span className="msd" style={{background:item.color}}></span><span className="msn">{item.label}</span><span className="msdt">{item.target_date||"laufend"}</span></div>
              <div className="pt"><div className="pf" style={{width:`${item.progress||0}%`,background:item.color}}></div></div>
            </div>
          ))}
        </div>
        <div className="gl pc-card pc-span-5">
          <h2>Versionierung</h2>
          {[...masterplans].sort((a,b)=>(b.version||0)-(a.version||0)).map(item=>(
            <div className="pc-version" key={item.id}>
              <div><div style={{fontSize:12,fontWeight:600}}>Version {item.version}</div><div className="pc-help">{new Date(item.created_at||Date.now()).toLocaleString("de-DE")}</div></div>
              {item.id===current.id&&<span className="badge bd-gn">Aktuell</span>}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function GithubStates({link}){
  const states=[
    ["Branch vorhanden",link?.branch_exists],
    ["PR offen",link?.pr_open],
    ["Checks bestanden",link?.checks_passed],
    ["Review nötig",link?.review_needed],
    ["Mergebereit",link?.merge_ready],
  ];
  return <div className="gh-grid">{states.map(([label,on])=><div className={`gh-state ${on?"on":""}`} key={label}>{on?"Aktiv":"Offen"}<br/>{label}</div>)}</div>;
}

function TaskDrawer({task,tasks,teamMembers,comments,checklist,githubLinks,saveResource,deleteResource,applyExternal,onClose}){
  const [draft,setDraft]=useState({...task});
  const [comment,setComment]=useState("");
  const [checkLabel,setCheckLabel]=useState("");
  const existingLink=githubLinks.find(link=>link.task_id===task.id);
  const [link,setLink]=useState(existingLink||{
    id:makeId(),task_id:task.id,repository:"olesorgenfrey/epikur",branch_name:"",commit_hash:"",pr_url:"",
    branch_exists:false,pr_open:false,checks_passed:false,review_needed:true,merge_ready:false,
  });
  const [syncing,setSyncing]=useState(false);
  const [error,setError]=useState("");
  const lines=value=>(Array.isArray(value)?value:[]).join("\n");
  const fromLines=value=>value.split("\n").map(item=>item.trim()).filter(Boolean);
  const suggestBranch=()=>{
    const slug=taskName(draft).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"").slice(0,42);
    setLink({...link,branch_name:`feat/practio-${String(draft.id).slice(0,8)}-${slug}`});
  };
  const saveTask=async(close=true)=>{
    const row={
      ...draft,title:taskName(draft),text:taskName(draft),done:draft.status==="done",project_id:PROJECT_ID,
      acceptance_criteria:fromLines(lines(draft.acceptance_criteria)),
      definition_of_done:fromLines(lines(draft.definition_of_done)),
    };
    await saveResource("tasks",row);
    if(close)onClose();
    return row;
  };
  const addChecklist=async()=>{
    if(!checkLabel.trim())return;
    await saveTask(false);
    await saveResource("task_checklist_items",{id:makeId(),task_id:draft.id,label:checkLabel.trim(),done:false,sort_order:checklist.filter(item=>item.task_id===draft.id).length});
    setCheckLabel("");
  };
  const addComment=async()=>{
    if(!comment.trim())return;
    await saveTask(false);
    await saveResource("task_comments",{id:makeId(),task_id:draft.id,author:window.__practioUser?.username||"Team",body:comment.trim()});
    setComment("");
  };
  const syncGithub=async()=>{
    setSyncing(true);setError("");
    await saveTask(false);
    try{
      const synced=await pcApi.github(draft.id,{...link,link:{id:link.id}});
      setLink(synced);applyExternal("github_links",synced);
      applyExternal("activity_log",{id:makeId(),project_id:PROJECT_ID,task_id:draft.id,actor:window.__practioUser?.username||"Team",action:"github.status_synced",source:"github",details:{mode:synced.mode},created_at:new Date().toISOString()});
    }catch(err){
      const fallback={...link,branch_exists:Boolean(link.branch_name),pr_open:Boolean(link.pr_url),checks_passed:false,review_needed:true,merge_ready:false,last_synced_at:new Date().toISOString(),mode:"fallback"};
      setLink(fallback);applyExternal("github_links",fallback);setError(`${err.message} · Fallback-Status gespeichert.`);
    }
    setSyncing(false);
  };
  const remove=async()=>{
    if(!confirm(`"${taskName(draft)}" wirklich löschen?`))return;
    await deleteResource("tasks",draft.id);onClose();
  };
  return(
    <div className="pc-overlay" onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>
      <aside className="pc-drawer" role="dialog" aria-modal="true" aria-label="Task bearbeiten">
        <div className="drawer-head">
          <div><div className="focus-kicker">Task Detail</div><div className="drawer-title">{taskName(draft)}</div></div>
          <button className="icon-btn" onClick={onClose} aria-label="Task schließen">✕</button>
        </div>
        <div className="workflow">
          {["Plan","Task","Branch","Commit","AI Review","Pull Request","Checks","Freigabe","Merge"].map((step,index)=><React.Fragment key={step}><span className="workflow-step">{step}</span>{index<8&&<span className="workflow-arrow">→</span>}</React.Fragment>)}
        </div>
        <div className="form-grid">
          <div className="pc-field form-full"><label className="pc-label">Titel</label><input className="pc-input" value={draft.title||draft.text||""} onChange={e=>setDraft({...draft,title:e.target.value,text:e.target.value})}/></div>
          <div className="pc-field form-full"><label className="pc-label">Beschreibung</label><textarea rows={4} value={draft.description||""} onChange={e=>setDraft({...draft,description:e.target.value})}/></div>
          <div className="pc-field"><label className="pc-label">Status</label><select className="pc-input" value={draft.status||"backlog"} onChange={e=>setDraft({...draft,status:e.target.value})}>{TASK_STATUSES.map(status=><option key={status.id} value={status.id}>{status.label}</option>)}</select></div>
          <div className="pc-field"><label className="pc-label">Priorität</label><select className="pc-input" value={draft.priority||"medium"} onChange={e=>setDraft({...draft,priority:e.target.value})}><option value="high">Hoch</option><option value="medium">Mittel</option><option value="low">Niedrig</option></select></div>
          <div className="pc-field"><label className="pc-label">Modul</label><input className="pc-input" value={draft.module||""} onChange={e=>setDraft({...draft,module:e.target.value})}/></div>
          <div className="pc-field"><label className="pc-label">Aufwand</label><select className="pc-input" value={draft.effort||"M"} onChange={e=>setDraft({...draft,effort:e.target.value})}><option>XS</option><option>S</option><option>M</option><option>L</option><option>XL</option></select></div>
          <div className="pc-field"><label className="pc-label">Vibe-Schwierigkeit</label><select className="pc-input" value={draft.vibe_difficulty||""} onChange={e=>setDraft({...draft,vibe_difficulty:e.target.value||null})}><option value="">— nicht gesetzt —</option>{VIBE_DIFFICULTIES.map(v=><option key={v.id} value={v.id}>{v.label}</option>)}</select></div>
          <div className="pc-field"><label className="pc-label">Vibe-Dauer (Schätzung)</label><select className="pc-input" value={draft.vibe_duration||""} onChange={e=>setDraft({...draft,vibe_duration:e.target.value||null})}><option value="">— nicht gesetzt —</option>{VIBE_DURATIONS.map(d=><option key={d} value={d}>{d}</option>)}</select></div>
          <div className="pc-field"><label className="pc-label">Bearbeiter</label><select className="pc-input" value={draft.team_member_id||""} onChange={e=>setDraft({...draft,team_member_id:e.target.value||null})}><option value="">Nicht zugewiesen</option>{teamMembers.map(member=><option key={member.id} value={member.id}>{member.name}</option>)}</select></div>
          <div className="pc-field"><label className="pc-label">Abhängigkeiten</label><select multiple className="pc-input" style={{minHeight:88}} value={draft.dependencies||[]} onChange={e=>setDraft({...draft,dependencies:Array.from(e.target.selectedOptions).map(option=>option.value)})}>{tasks.filter(item=>item.id!==draft.id).map(item=><option key={item.id} value={item.id}>{taskName(item)}</option>)}</select></div>
          <div className="pc-field form-full"><label className="pc-label">Akzeptanzkriterien · eine Zeile pro Kriterium</label><textarea rows={5} value={lines(draft.acceptance_criteria)} onChange={e=>setDraft({...draft,acceptance_criteria:e.target.value.split("\n")})}/></div>
          <div className="pc-field form-full"><label className="pc-label">Definition of Done · eine Zeile pro Punkt</label><textarea rows={4} value={lines(draft.definition_of_done)} onChange={e=>setDraft({...draft,definition_of_done:e.target.value.split("\n")})}/></div>
        </div>
        <div className="gl pc-card" style={{marginTop:8}}>
          <h2>GitHub-Verknüpfung</h2>
          <div className="form-grid">
            <div className="pc-field"><label className="pc-label">Repository</label><input className="pc-input" value={link.repository||""} onChange={e=>setLink({...link,repository:e.target.value})}/></div>
            <div className="pc-field"><label className="pc-label">Branch</label><div className="pc-actions"><input style={{flex:1}} value={link.branch_name||""} onChange={e=>setLink({...link,branch_name:e.target.value})}/><button className="btn btn-g" onClick={suggestBranch}>Vorschlagen</button></div></div>
            <div className="pc-field"><label className="pc-label">Commit-Hash</label><input className="pc-input" value={link.commit_hash||""} onChange={e=>setLink({...link,commit_hash:e.target.value})}/></div>
            <div className="pc-field"><label className="pc-label">Pull-Request-Link</label><input className="pc-input" type="url" value={link.pr_url||""} onChange={e=>setLink({...link,pr_url:e.target.value})}/></div>
          </div>
          <GithubStates link={link}/>
          {error&&<div className="pc-help" role="alert">{error}</div>}
          <div className="pc-actions"><button className="btn btn-p" onClick={syncGithub} disabled={syncing}>{syncing?"Synchronisiere…":"GitHub-Status synchronisieren"}</button><span className="pc-help">Mergebereit bedeutet nur: Checks und Review sind grün. Der Merge bleibt manuell.</span></div>
        </div>
        <div className="pc-grid" style={{marginTop:14}}>
          <div className="gl pc-card pc-span-6">
            <h2>Checkliste</h2>
            {checklist.filter(item=>item.task_id===draft.id).map(item=><div className="check-row" key={item.id}><input type="checkbox" checked={Boolean(item.done)} onChange={()=>saveResource("task_checklist_items",{...item,done:!item.done})}/><span className="check-label">{item.label}</span><button className="tdel" onClick={()=>deleteResource("task_checklist_items",item.id)}>✕</button></div>)}
            {!checklist.some(item=>item.task_id===draft.id)&&<div className="tce">Noch keine Checklistenpunkte</div>}
            <div className="pc-actions" style={{marginTop:10}}><input style={{flex:1}} placeholder="Checklistenpunkt" value={checkLabel} onChange={e=>setCheckLabel(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addChecklist()}/><button className="btn btn-g" onClick={addChecklist}>Hinzufügen</button></div>
          </div>
          <div className="gl pc-card pc-span-6">
            <h2>Kommentare</h2>
            {comments.filter(item=>item.task_id===draft.id).map(item=><div className="comment" key={item.id}><div className="comment-head"><span>{item.author}</span><span>{new Date(item.created_at||Date.now()).toLocaleString("de-DE")}</span></div><div className="comment-body">{item.body}</div></div>)}
            {!comments.some(item=>item.task_id===draft.id)&&<div className="tce">Noch keine Kommentare</div>}
            <textarea rows={3} placeholder="Kommentar oder Review-Hinweis…" value={comment} onChange={e=>setComment(e.target.value)} style={{marginTop:10}}/>
            <button className="btn btn-g" onClick={addComment} style={{marginTop:8}}>Kommentar speichern</button>
          </div>
        </div>
        <div className="pc-actions end">
          <button className="btn" style={{background:"rgba(248,113,113,.12)",border:"1px solid rgba(248,113,113,.25)",color:"var(--err)"}} onClick={remove}>Task löschen</button>
          <button className="btn btn-g" onClick={onClose}>Abbrechen</button>
          <button className="btn btn-p" onClick={()=>saveTask(true)}>Task speichern</button>
        </div>
      </aside>
    </div>
  );
}

const REVIEW_LABELS={
  ready:"✅ Ready for PR",
  changes_needed:"⚠️ Änderungen nötig",
  reject:"❌ Nicht akzeptieren",
};
function ReviewAssistant({tasks,githubLinks,aiReviews,activityLog,mode,warning,applyExternal}){
  const firstTask=tasks.find(task=>task.status==="review")||tasks.find(task=>task.status!=="done")||tasks[0];
  const [taskId,setTaskId]=useState(firstTask?.id||"");
  const task=tasks.find(item=>item.id===taskId);
  const storedLink=githubLinks.find(item=>item.task_id===taskId);
  const [repository,setRepository]=useState(storedLink?.repository||"olesorgenfrey/epikur");
  const [commit,setCommit]=useState(storedLink?.commit_hash||"");
  const [prUrl,setPrUrl]=useState(storedLink?.pr_url||"");
  const [busy,setBusy]=useState(false);
  const [error,setError]=useState("");
  const latest=[...aiReviews].filter(item=>item.task_id===taskId).sort((a,b)=>new Date(b.created_at||0)-new Date(a.created_at||0))[0];
  useEffect(()=>{if(!taskId&&firstTask)setTaskId(firstTask.id);},[taskId,firstTask?.id]);
  useEffect(()=>{
    const next=githubLinks.find(item=>item.task_id===taskId);
    setRepository(next?.repository||"olesorgenfrey/epikur");setCommit(next?.commit_hash||"");setPrUrl(next?.pr_url||"");setError("");
  },[taskId,githubLinks]);
  const runReview=async()=>{
    if(!task)return;
    if(!commit&&!prUrl){setError("Commit-Hash oder PR-Link ist erforderlich.");return;}
    setBusy(true);setError("");
    try{
      const review=await pcApi.review(task.id,{repository,commit_hash:commit,pr_url:prUrl,task});
      applyExternal("ai_reviews",review);
      applyExternal("activity_log",{id:makeId(),project_id:PROJECT_ID,task_id:task.id,actor:window.__practioUser?.username||"Team",action:"ai.review_completed",source:"ai",details:{provider:review.provider,result:review.result},created_at:new Date().toISOString()});
    }catch(err){
      const review={id:makeId(),task_id:task.id,commit_hash:commit,pr_url:prUrl,result:"changes_needed",summary:"Review-Service nicht erreichbar. Fallback-Prüfung gespeichert.",findings:["Akzeptanzkriterien manuell gegen den Diff prüfen.",err.message],suggestions:["Server-Konfiguration prüfen und Review erneut starten."],next_task:"Review-Findings klären",provider:"fallback",created_at:new Date().toISOString()};
      applyExternal("ai_reviews",review);setError(err.message);
    }
    setBusy(false);
  };
  return(
    <div className="page">
      <div className="ph"><div><h1 className="ptitle">AI <em>Review</em></h1><p className="psub">Diff gegen Akzeptanzkriterien, Qualität, Sicherheit und UX prüfen</p></div></div>
      <ModeBanner mode={mode} warning={warning}/>
      <div className="pc-grid">
        <div className="gl pc-card pc-span-8">
          <h2>Review starten</h2>
          {tasks.length===0?<div className="tce">Noch keine Tasks. Generiere sie im Masterplan oder lege einen Task im Board an.</div>:<>
            <div className="pc-field"><label className="pc-label">Task</label><select className="pc-input" value={taskId} onChange={e=>setTaskId(e.target.value)}>{tasks.map(item=><option key={item.id} value={item.id}>{taskName(item)}</option>)}</select></div>
            <div className="form-grid">
              <div className="pc-field"><label className="pc-label">Repository</label><input className="pc-input" value={repository} onChange={e=>setRepository(e.target.value)}/></div>
              <div className="pc-field"><label className="pc-label">Commit-Hash</label><input className="pc-input" value={commit} onChange={e=>setCommit(e.target.value)}/></div>
              <div className="pc-field form-full"><label className="pc-label">Pull-Request-Link</label><input className="pc-input" type="url" value={prUrl} onChange={e=>setPrUrl(e.target.value)}/></div>
            </div>
            {task&&<div className="pc-list" style={{marginBottom:14}}>{(task.acceptance_criteria||[]).map((criterion,index)=><div className="pc-list-row" key={index}><span className="pc-dot"></span><span style={{fontSize:12,color:"var(--t2)"}}>{criterion}</span></div>)}</div>}
            {error&&<div className="dbb dbe" role="alert">{error}</div>}
            <button className="btn btn-p" onClick={runReview} disabled={busy}>{busy?"Diff wird analysiert…":"AI Review starten"}</button>
          </>}
          {latest&&<div className={`review-result ${latest.result}`}>
            <div className="review-heading">{REVIEW_LABELS[latest.result]||latest.result}</div>
            <div className="review-copy">{latest.summary}</div>
            {!!latest.findings?.length&&<><div className="pc-label" style={{marginTop:14}}>Findings</div>{latest.findings.map((finding,index)=><div className="pc-list-row" key={index}><span className="pc-dot" style={{background:"var(--warn)"}}></span><span className="review-copy">{finding}</span></div>)}</>}
            {!!latest.suggestions?.length&&<><div className="pc-label" style={{marginTop:14}}>Verbesserungen</div>{latest.suggestions.map((suggestion,index)=><div className="pc-list-row" key={index}><span className="pc-dot"></span><span className="review-copy">{suggestion}</span></div>)}</>}
            {latest.next_task&&<div style={{marginTop:14,padding:12,borderRadius:9,background:"rgba(110,168,255,.08)"}}><div className="pc-label">Nächster sinnvoller Task</div><div className="review-copy">{latest.next_task}</div></div>}
            <div className="pc-help">Provider: {latest.provider||"unbekannt"} · Merge bleibt manuell.</div>
          </div>}
        </div>
        <div className="gl pc-card pc-span-4">
          <h2>Aktivitätsprotokoll</h2>
          {activityLog.slice(0,14).map(entry=><div className="activity-row" key={entry.id}><div className="activity-action">{entry.action}</div><div className="activity-meta">{entry.actor} · {entry.source} · {new Date(entry.created_at).toLocaleString("de-DE")}</div></div>)}
          {!activityLog.length&&<div className="tce">GitHub- und AI-Aktionen erscheinen hier.</div>}
        </div>
      </div>
    </div>
  );
}

function Milestones({milestones,setMilestones,db,saveResource,deleteResource}){
  const [adding,setAdding]=useState(false);
  const [draft,setDraft]=useState({label:"",target_date:"",progress:0,color:"#6EA8FF"});
  const add=async()=>{
    if(!draft.label.trim())return;
    const progress=Math.max(0,Math.min(100,Number(draft.progress)||0));
    const row={
      label:draft.label.trim(),
      target_date:draft.target_date||null,
      done:progress===100,
      progress,
      color:draft.color,
      sort_order:milestones.reduce((max,m)=>Math.max(max,Number(m.sort_order)||0),0)+1,
      project_id:PROJECT_ID,
    };
    await saveResource("milestones",{...row,id:makeId()});
    setDraft({label:"",target_date:"",progress:0,color:"#6EA8FF"});
    setAdding(false);
  };
  const update=async(id,patch)=>{
    const milestone=milestones.find(item=>item.id===id);
    if(milestone)await saveResource("milestones",{...milestone,...patch});
  };
  const setProgress=(id,value)=>{
    const progress=Math.max(0,Math.min(100,Number(value)||0));
    update(id,{progress,done:progress===100});
  };
  const toggle=milestone=>update(milestone.id,{done:!milestone.done,progress:!milestone.done?100:Math.min(milestone.progress,99)});
  const del=async milestone=>{
    if(!confirm(`"${milestone.label}" wirklich löschen?`))return;
    await deleteResource("milestones",milestone.id);
  };
  return(
    <div className="page">
      <div className="ph">
        <div><h1 className="ptitle">Meilen<em>steine</em></h1><p className="psub">{milestones.filter(m=>m.done).length} erledigt · {milestones.filter(m=>!m.done).length} offen</p></div>
        <button className="btn btn-g" onClick={()=>setAdding(v=>!v)}><Ic d={ic.plus} size={14}/> Meilenstein</button>
      </div>
      <Dbb s={db}/>
      <div className="gl card">
        <div className="cb">
          {milestones.length===0?<div className="tce">Noch keine Meilensteine</div>:
          milestones.map((m,i)=>(
            <div className="msr" key={m.id} style={{animation:`fup 300ms var(--ease) ${i*50}ms both`}}>
              <div className="msh">
                <div className="msd" style={{background:m.color}}></div>
                <span className="msn">{m.label}</span>
                {m.done&&<span className="badge bd-gn">Done</span>}
                <span className="msdt">{m.target_date||"laufend"}</span>
                <div className="msactions">
                  <input className="msprogress" type="number" min="0" max="100" value={m.progress??0} onChange={e=>setProgress(m.id,e.target.value)} title="Fortschritt in Prozent"/>
                  <button className={`tck ${m.done?"done":""}`} onClick={()=>toggle(m)} title={m.done?"Wieder öffnen":"Als erledigt markieren"}>
                    <svg viewBox="0 0 24 24" fill="none" stroke="#06070A" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><path d={ic.check}/></svg>
                  </button>
                  <button className="tdel" onClick={()=>del(m)} title="Meilenstein löschen">✕</button>
                </div>
              </div>
              <div className="pt"><div className="pf" style={{width:`${m.progress??0}%`,background:m.color}}></div></div>
              <div style={{fontSize:10,color:"var(--t3)",fontFamily:"'IBM Plex Mono',monospace",marginTop:5}}>{m.progress??0}%</div>
            </div>
          ))}
          {adding&&(
            <div className="msform">
              <input autoFocus className="mslabel" placeholder="Meilenstein…" value={draft.label} onChange={e=>setDraft({...draft,label:e.target.value})} onKeyDown={e=>{if(e.key==="Enter")add();if(e.key==="Escape")setAdding(false);}}/>
              <input type="date" value={draft.target_date} onChange={e=>setDraft({...draft,target_date:e.target.value})}/>
              <input type="number" min="0" max="100" placeholder="Fortschritt %" value={draft.progress} onChange={e=>setDraft({...draft,progress:e.target.value})}/>
              <input className="mscolor" type="color" value={draft.color} onChange={e=>setDraft({...draft,color:e.target.value})} title="Farbe"/>
              <div style={{display:"flex",gap:6}}>
                <button className="btn btn-p" onClick={add}>Hinzufügen</button>
                <button className="btn btn-g" onClick={()=>setAdding(false)}>✕</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function AdminPanel({onClose}){
  const [pending,setPending]=useState([]);
  const [busy,setBusy]=useState({});
  useEffect(()=>{
    fetch('/api/admin/users/pending').then(r=>r.json()).then(d=>setPending(Array.isArray(d)?d:[])).catch(()=>{});
  },[]);
  const approve=async(id,username)=>{
    setBusy(b=>({...b,[id]:'approve'}));
    await fetch(`/api/admin/users/${id}/approve`,{method:'POST'});
    window.dispatchEvent(new CustomEvent('practio:person-added',{detail:{id:Date.now().toString(),name:username,color:(['blue','purple','green','yellow','red'])[username.length%5],created_at:new Date().toISOString()}}));
    setPending(ps=>ps.filter(p=>p.id!==id));
    setBusy(b=>({...b,[id]:null}));
  };

    await fetch(`/api/admin/users/${id}`,{method:'DELETE'});
    setPending(ps=>ps.filter(p=>p.id!==id));
    setBusy(b=>({...b,[id]:null}));

                  {busy[u.id]==='approve'?'...':'Genehmigen'}

                <button className="btn" disabled={!!busy[u.id]} onClick={()=>reject(u.id)} style={{fontSize:11,padding:'5px 10px',background:'rgba(248,113,113,.15)',border:'1px solid rgba(248,113,113,.3)',color:'#F87171'}}>
                  {busy[u.id]==='reject'?'...':'Ablehnen'}
                </button>

            </div>
          ))
        }
      </div>
    </div>
  );
}
