<style>
:root {
  --glass-bg:     rgba(255,255,255,.02);
  --glass-border: rgba(255,255,255,.28);
  --text:   #F4F6FB;
  --text-2: rgba(244,246,251,.62);
  --text-3: rgba(244,246,251,.35);
  --accent:  #6EA8FF;
  --gold:    #D4B483;
  --success: #4ADE80;
  --warning: #FBBf24;
  --danger:  #F87171;
  --purple:  #C084FC;
  --ease-out: cubic-bezier(0.23,1,0.32,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;color:var(--text);background:#06070A;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.bg-layer{position:fixed;inset:0;z-index:0;background-size:contain;background-position:center;background-repeat:no-repeat;transition:opacity 800ms var(--ease-out);opacity:0}
.bg-layer.active{opacity:1}
.bg-layer.inactive{opacity:0}
.bg-overlay{position:fixed;inset:0;z-index:1;background:linear-gradient(120deg,rgba(6,7,10,.85) 0%,rgba(6,7,10,.55) 50%,rgba(6,7,10,.75) 100%);pointer-events:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px}
.glass{background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:14px;position:relative;overflow:hidden}
.glass::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:rgba(255,255,255,.45);pointer-events:none}
.glass::after{content:'';position:absolute;inset:0;border-radius:14px;background:linear-gradient(135deg,rgba(255,255,255,.07) 0%,transparent 40%);pointer-events:none}
.app{position:relative;z-index:2;display:flex;min-height:100vh;padding:20px;gap:20px}
.sidebar{width:220px;flex-shrink:0;display:flex;flex-direction:column;padding:22px 0;position:sticky;top:20px;height:calc(100vh - 40px);animation:slideIn 700ms var(--ease-out) both;background:transparent;border:none}
.logo-row{display:flex;align-items:center;gap:11px;padding:0 18px 20px}
.logo-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(145deg,#6EA8FF,#A8C8FF);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#0A0E18;flex-shrink:0;box-shadow:0 4px 16px rgba(110,168,255,.35)}
.logo-name{font-size:15px;font-weight:700;letter-spacing:-.3px}
.logo-meta{font-size:10px;color:var(--text-3);font-family:'IBM Plex Mono',monospace}
.nav-label{font-size:9px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-3);padding:18px 18px 8px}
.nav-item{display:flex;align-items:center;gap:12px;margin:2px 10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text-2);transition:all 180ms var(--ease-out);min-height:44px;border:1px solid transparent;background:transparent;appearance:none;-webkit-appearance:none;width:calc(100% - 20px);text-align:left;font-family:inherit;position:relative;overflow:hidden}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.05)}
.nav-item.active{color:var(--text);background:rgba(110,168,255,.12);border-color:rgba(110,168,255,.25)}
.nav-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
.nav-icon{width:16px;height:16px;flex-shrink:0;display:flex}
.nav-badge{margin-left:auto;font-size:10px;font-weight:600;font-family:'IBM Plex Mono',monospace;background:rgba(110,168,255,.2);color:#A8C8FF;padding:2px 6px;border-radius:20px}
.sidebar-foot{margin-top:auto;padding:16px 18px 0;font-family:'Instrument Serif',serif;font-style:italic;font-size:14px;color:var(--text-2);line-height:1.4}
.main{flex:1;min-width:0;padding-bottom:40px}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;padding-top:8px;animation:fadeUp 500ms var(--ease-out) both}
.page-title{font-family:'Instrument Serif',serif;font-size:42px;line-height:1;letter-spacing:-.5px}
.page-title em{font-style:italic;color:var(--gold)}
.page-sub{font-size:12px;color:var(--text-2);font-family:'IBM Plex Mono',monospace;margin-top:5px}
.head-pill{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:30px;background:rgba(255,255,255,.05);border:1px solid var(--glass-border);font-size:11px;color:var(--text-2);font-family:'IBM Plex Mono',monospace}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--success);box-shadow:0 0 7px var(--success);animation:pulse 2s ease-in-out infinite}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.stat-card{padding:20px;animation:fadeUp 600ms var(--ease-out) both;transition:transform 250ms var(--ease-out)}
.stat-card:hover{transform:translateY(-2px)}
.stat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.stat-name{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text-3)}
.stat-big{font-size:36px;font-weight:700;letter-spacing:-1.5px;line-height:1;font-variant-numeric:tabular-nums}
.stat-cap{font-size:11px;color:var(--text-2);font-family:'IBM Plex Mono',monospace;margin-top:7px}
.card{animation:fadeUp 600ms var(--ease-out) both}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--glass-border)}
.card-title{font-size:13px;font-weight:600}
.card-body{padding:18px 20px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.funnel-row{display:flex;align-items:center;gap:12px;padding:8px 0}
.funnel-label{font-size:11px;color:var(--text-2);font-family:'IBM Plex Mono',monospace;width:76px;flex-shrink:0}
.funnel-track{flex:1;height:20px;border-radius:6px;background:rgba(255,255,255,.05);overflow:hidden}
.funnel-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:600;color:#06070A;transition:width 700ms var(--ease-out)}
.funnel-num{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--text-2);width:18px;text-align:right}
.prog-track{height:4px;border-radius:3px;background:rgba(255,255,255,.07);overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width 700ms var(--ease-out)}
.ms-row{padding:12px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.ms-row:last-child{border-bottom:none}
.ms-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ms-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ms-name{font-size:13px;font-weight:600;flex:1}
.ms-date{font-size:10px;color:var(--text-3);font-family:'IBM Plex Mono',monospace}

/* TASKS MULTI-LIST */
.tasks-board{display:flex;gap:14px;margin-bottom:18px;overflow-x:auto;padding-bottom:4px}
.tasks-board::-webkit-scrollbar{height:3px}
.task-col{flex:0 0 280px;display:flex;flex-direction:column}
.task-col-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--glass-border)}
.task-col-name{display:flex;align-items:center;gap:10px}
.avatar{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text);flex-shrink:0}
.task-col-title{font-size:13px;font-weight:600}
.task-col-body{flex:1;padding:8px 14px;min-height:80px}
.task-col-empty{text-align:center;padding:22px 0;color:var(--text-3);font-size:11px;font-family:'IBM Plex Mono',monospace}
.task-row{display:flex;align-items:flex-start;gap:11px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.task-row:last-child{border-bottom:none}
.task-check{width:18px;height:18px;flex-shrink:0;margin-top:2px;border:1.5px solid rgba(255,255,255,.2);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 160ms var(--ease-out);background:transparent;padding:0}
.task-check:hover{border-color:var(--accent);background:rgba(110,168,255,.12)}
.task-check.done{background:var(--success);border-color:var(--success)}
.task-check svg{width:10px;height:10px;opacity:0;transition:opacity 150ms}
.task-check.done svg{opacity:1}
.task-body{flex:1;min-width:0}
.task-text{font-size:13px;font-weight:500;line-height:1.4}
.task-text.done{text-decoration:line-through;color:var(--text-3)}
.task-meta{font-size:10px;color:var(--text-3);font-family:'IBM Plex Mono',monospace;margin-top:2px}
.task-del{background:none;border:none;color:var(--text-3);cursor:pointer;padding:2px 5px;font-size:13px;line-height:1;transition:color 140ms;align-self:center}
.task-del:hover{color:var(--danger)}
.task-col-input{padding:10px 14px;border-top:1px solid var(--glass-border)}
.task-col-input input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:var(--text);padding:8px 11px;border-radius:8px;font-size:12px;font-family:'Inter',sans-serif;outline:none;transition:border-color 150ms}
.task-col-input input:focus{border-color:var(--accent)}
.task-col-input input::placeholder{color:var(--text-3)}
.add-col-btn{flex:0 0 220px;display:flex;align-items:center;justify-content:center;gap:8px;border:1px dashed rgba(255,255,255,.15);border-radius:14px;color:var(--text-3);font-size:13px;cursor:pointer;transition:all 200ms var(--ease-out);background:transparent;font-family:'Inter',sans-serif;min-height:160px}
.add-col-btn:hover{border-color:rgba(255,255,255,.3);color:var(--text-2);background:rgba(255,255,255,.02)}

.badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;font-family:'IBM Plex Mono',monospace}
.badge::before{content:'';width:4px;height:4px;border-radius:50%;background:currentColor}
.badge-blue{background:rgba(110,168,255,.15);color:#A8C8FF}
.badge-green{background:rgba(74,222,128,.13);color:var(--success)}
.badge-yellow{background:rgba(251,191,36,.13);color:var(--warning)}
.badge-red{background:rgba(248,113,113,.13);color:var(--danger)}
.badge-gray{background:rgba(255,255,255,.07);color:var(--text-2)}
.badge-purple{background:rgba(192,132,252,.13);color:var(--purple)}

.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text-3);padding:0 13px 11px;border-bottom:1px solid var(--glass-border)}
.tbl td{padding:11px 13px;font-size:12px;color:var(--text-2);border-bottom:1px solid rgba(255,255,255,.05)}
.tbl tbody tr{transition:background 130ms;cursor:pointer}
.tbl tbody tr:hover td{background:rgba(255,255,255,.03)}
.tbl tbody tr:last-child td{border-bottom:none}
.td-name{font-weight:600;color:var(--text)!important}
.td-mono{font-family:'IBM Plex Mono',monospace;font-size:10px!important}

.fin-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:13px}
.fin-row:last-child{border-bottom:none}
.fin-label{color:var(--text-2);display:flex;align-items:center;gap:9px}
.fin-dot{width:6px;height:6px;border-radius:50%}
.fin-val{font-family:'IBM Plex Mono',monospace;font-weight:600;font-variant-numeric:tabular-nums}

.tabs{display:flex;gap:5px;margin-bottom:18px;flex-wrap:wrap}
.tab{padding:7px 13px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;color:var(--text-2);border:1px solid transparent;background:rgba(255,255,255,.03);transition:all 160ms var(--ease-out);min-height:34px;display:inline-flex;align-items:center;gap:5px;font-family:'Inter',sans-serif}
.tab:hover{color:var(--text);background:rgba(255,255,255,.07)}
.tab.active{color:var(--text);background:rgba(110,168,255,.15);border-color:rgba(110,168,255,.25)}
.tab-ct{font-family:'IBM Plex Mono',monospace;opacity:.55}

input,select{background:rgba(255,255,255,.05);border:1px solid var(--glass-border);color:var(--text);padding:9px 12px;border-radius:9px;font-size:12px;font-family:'Inter',sans-serif;outline:none;transition:border-color 160ms;min-height:38px}
input:focus,select:focus{border-color:var(--accent)}
input::placeholder{color:var(--text-3)}
select option{background:#14161E}
.status-sel{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--text-2);padding:4px 7px;border-radius:7px;font-size:10px;font-family:'IBM Plex Mono',monospace;cursor:pointer;outline:none}
.btn{padding:9px 16px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all 160ms var(--ease-out);min-height:38px;display:inline-flex;align-items:center;gap:5px}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,#6EA8FF,#5A93FF);color:#06070A;box-shadow:0 3px 12px rgba(110,168,255,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(110,168,255,.4)}
.btn-ghost{background:rgba(255,255,255,.05);color:var(--text-2);border:1px solid var(--glass-border)}
.btn-ghost:hover{background:rgba(255,255,255,.09);color:var(--text)}
.input-row{display:flex;gap:8px;padding-top:16px;border-top:1px solid var(--glass-border);margin-top:14px}

/* LOADING / ERROR */
.db-banner{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:9px;margin-bottom:18px;font-size:12px;font-family:'IBM Plex Mono',monospace}
.db-loading{background:rgba(110,168,255,.1);border:1px solid rgba(110,168,255,.2);color:#A8C8FF}
.db-error{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);color:var(--danger)}
.db-ok{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.18);color:var(--success)}
.spinner{width:12px;height:12px;border:2px solid rgba(110,168,255,.3);border-top-color:#A8C8FF;border-radius:50%;animation:spin 600ms linear infinite}

/* TERMINAL */
.term-wrap{display:flex;flex-direction:column;height:calc(100vh - 180px);min-height:400px}
.term-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--glass-border)}
.term-dots{display:flex;gap:6px}
.term-dot{width:11px;height:11px;border-radius:50%}
.term-title{font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--text-2);margin-left:6px}
.term-status{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:11px;font-family:'IBM Plex Mono',monospace}
.term-status-dot{width:7px;height:7px;border-radius:50%}
.term-body{flex:1;overflow-y:auto;padding:16px;font-family:'IBM Plex Mono',monospace;font-size:13px;line-height:1.6}
.term-line{white-space:pre-wrap;word-break:break-word}
.term-prompt-line{display:flex;gap:8px;color:var(--success)}
.term-cmd{color:var(--text)}
.term-out{color:var(--text-2);margin:2px 0 10px}
.term-err{color:var(--danger);margin:2px 0 10px}
.term-input-line{display:flex;align-items:center;gap:8px;padding:12px 16px;border-top:1px solid var(--glass-border)}
.term-ps1{color:var(--success);font-family:'IBM Plex Mono',monospace;font-size:13px;flex-shrink:0}
.term-input{flex:1;background:transparent!important;border:none!important;color:var(--text)!important;font-family:'IBM Plex Mono',monospace!important;font-size:13px!important;padding:0!important;min-height:auto!important;outline:none}
.term-input:focus{border:none!important}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
.page{animation:fadeUp 450ms var(--ease-out) both}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>

// ── LEADS ────────────────────────────────────────────────────
function Leads({leads,setLeads,dbStatus}) {
  const [filter,setFilter]=useState("alle");
  const [nl,setNl]=useState({name:"",city:"",type:"Psychotherapie"});
  const filtered=filter==="alle"?leads:leads.filter(l=>l.status===filter);

  const add=async()=>{
    if(!nl.name.trim())return;
    const row={...nl,status:"offen",notes:""};
    if(dbStatus==="ok"){
      try{ const [r]=await sb.post("leads",row); setLeads(ls=>[...ls,r]); }
      catch{ setLeads(ls=>[...ls,{...row,id:Date.now().toString()}]); }
    } else { setLeads(ls=>[...ls,{...row,id:Date.now().toString()}]); }
    setNl({name:"",city:"",type:"Psychotherapie"});
  };

  const updateStatus=async(id,status)=>{
    setLeads(ls=>ls.map(l=>l.id===id?{...l,status}:l));
    if(dbStatus==="ok") try{ await sb.patch("leads",id,{status}); }catch{}
  };

  return (
    <div className="page">
      <div className="page-head"><div><h1 className="page-title">Le<em>ads</em></h1><p className="page-sub">{leads.length} Praxen · Norddeutschland</p></div></div>
      <DbBanner status={dbStatus}/>
      <div className="tabs">
        {["alle","offen","angerufen","einwilligung","mail_gesendet","abgeschlossen","abgelehnt"].map(f=>(
          <button key={f} className={`tab ${filter===f?"active":""}`} onClick={()=>setFilter(f)}>
            {f==="alle"?"Alle":STATUS[f]?.label||f}
            <span className="tab-ct">{f==="alle"?leads.length:leads.filter(l=>l.status===f).length}</span>
          </button>
        ))}
      </div>
      <div className="glass card">
        <div style={{padding:"6px 6px 0"}}>
          <table className="tbl">
            <thead><tr><th>Praxis</th><th>Ort</th><th>Typ</th><th>Status</th><th>Notiz</th><th>Aktion</th></tr></thead>
            <tbody>
              {filtered.map(l=>(
                <tr key={l.id}>
                  <td className="td-name">{l.name}</td>
                  <td>{l.city}</td>
                  <td className="td-mono">{l.type}</td>
                  <td><span className={`badge ${STATUS[l.status]?.cls||"badge-gray"}`}>{STATUS[l.status]?.label||l.status}</span></td>
                  <td style={{maxWidth:150,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.notes||<span style={{color:"var(--text-3)"}}>—</span>}</td>
                  <td><select className="status-sel" value={l.status} onChange={e=>updateStatus(l.id,e.target.value)}>
                    {Object.entries(STATUS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                  </select></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{padding:"0 20px 18px"}}>
          <div className="input-row">
            <input placeholder="Praxisname" value={nl.name} onChange={e=>setNl({...nl,name:e.target.value})} onKeyDown={e=>e.key==="Enter"&&add()} style={{flex:2}}/>
            <input placeholder="Ort" value={nl.city} onChange={e=>setNl({...nl,city:e.target.value})} style={{flex:1}}/>
            <select value={nl.type} onChange={e=>setNl({...nl,type:e.target.value})}><option>Psychotherapie</option><option>Privatpraxis</option><option>Gruppenpraxis</option></select>
            <button className="btn btn-primary" onClick={add}>+ Lead</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── TASKS (MULTI-PERSON LISTS) ───────────────────────────────
function Tasks({tasks,setTasks,persons,setPersons,dbStatus}) {
  const [addingPerson,setAddingPerson]=useState(false);
  const [newPersonName,setNewPersonName]=useState("");

  const toggle=async(id)=>{
    const t=tasks.find(x=>x.id===id);
    setTasks(ts=>ts.map(x=>x.id===id?{...x,done:!x.done}:x));
    if(dbStatus==="ok") try{ await sb.patch("tasks",id,{done:!t.done}); }catch{}
  };

  const del=async(id)=>{
    setTasks(ts=>ts.filter(x=>x.id!==id));
    if(dbStatus==="ok") try{ await sb.del("tasks",id); }catch{}
  };

  const addTask=async(text,assignee_id)=>{
    if(!text.trim())return;
    const row={text:text.trim(),meta:"",assignee_id,done:false,priority:"medium"};
    if(dbStatus==="ok"){
      try{ const [r]=await sb.post("tasks",row); setTasks(ts=>[...ts,r]); return; }catch{}
    }
    setTasks(ts=>[...ts,{...row,id:Date.now().toString()}]);
  };

  const addPerson=async()=>{
    if(!newPersonName.trim())return;
    const row={name:newPersonName.trim(),color:"blue"};
    if(dbStatus==="ok"){
      try{ const [r]=await sb.post("persons",row); setPersons(ps=>[...ps,r]); setNewPersonName(""); setAddingPerson(false); return; }catch{}
    }
    setPersons(ps=>[...ps,{...row,id:Date.now().toString()}]);
    setNewPersonName(""); setAddingPerson(false);
  };

  return (
    <div className="page">
      <div className="page-head">
        <div><h1 className="page-title">Ta<em>sks</em></h1><p className="page-sub">{tasks.filter(t=>!t.done).length} offen · {tasks.filter(t=>t.done).length} erledigt</p></div>
        {addingPerson?(
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <input autoFocus placeholder="Name…" value={newPersonName} onChange={e=>setNewPersonName(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addPerson();if(e.key==="Escape")setAddingPerson(false);}} style={{width:130}}/>
            <button className="btn btn-primary" onClick={addPerson}>OK</button>
            <button className="btn btn-ghost" onClick={()=>setAddingPerson(false)}>✕</button>
          </div>
        ):(
          <button className="btn btn-ghost" onClick={()=>setAddingPerson(true)}><Icon d={ic.plus} size={14}/> Person</button>
        )}
      </div>
      <DbBanner status={dbStatus}/>
      <div className="tasks-board">
        {persons.map((p,pi)=>(
          <div className="glass task-col" key={p.id}>
            <div className="task-col-head">
              <div className="task-col-name">
                <div className="avatar">{p.name[0]}</div>
                <span className="task-col-title">{p.name}</span>
              </div>
              <span className={`badge ${COL_COLORS[pi%COL_COLORS.length]}`}>
                {tasks.filter(t=>t.assignee_id===p.id&&!t.done).length}
              </span>
            </div>
            <div className="task-col-body">
              {tasks.filter(t=>t.assignee_id===p.id).length===0
                ? <div className="task-col-empty">Keine Tasks</div>
                : tasks.filter(t=>t.assignee_id===p.id).map((t,i)=>(
                    <div className="task-row" key={t.id} style={{animationDelay:`${i*35}ms`}}>
                      <button className={`task-check ${t.done?"done":""}`} onClick={()=>toggle(t.id)}>
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#06070A" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><path d={ic.check}/></svg>
                      </button>
                      <div className="task-body">
                        <div className={`task-text ${t.done?"done":""}`}>{t.text}</div>
                        {t.meta&&<div className="task-meta">{t.meta}</div>}
                      </div>
                      <button className="task-del" onClick={()=>del(t.id)}>✕</button>
                    </div>
                  ))
              }
            </div>
            <div className="task-col-input">
              <input placeholder="+ Aufgabe hinzufügen…"
                onKeyDown={e=>{if(e.key==="Enter"&&e.target.value.trim()){addTask(e.target.value,p.id);e.target.value="";}}}/>
            </div>
          </div>
        ))}
        <button className="add-col-btn" onClick={()=>setAddingPerson(true)}>
          <Icon d={ic.plus} size={18}/> Person hinzufügen
        </button>
      </div>
    </div>
  );
}

// ── TERMINAL (CODE TAB) — ttyd iframe ────────────────────────
function Terminal() {
  const [online,setOnline]=useState(null);
  const [blocked,setBlocked]=useState(false);
  const [reloadKey,setReloadKey]=useState(0);

  React.useEffect(()=>{
    let cancelled=false;
    (async()=>{
      try{
        // no-cors ping: bei erreichbarem Server kommt kein Netzwerkfehler
        await fetch(TTYD_URL,{mode:"no-cors",signal:AbortSignal.timeout(6000)});
        if(!cancelled) setOnline(true);
      }catch{ if(!cancelled) setOnline(false); }
    })();
    return ()=>{cancelled=true;};
  },[reloadKey]);

  // Wenn iframe nach kurzer Zeit nicht lädt → vermutlich X-Frame-Options block
  React.useEffect(()=>{
    setBlocked(false);
    const t=setTimeout(()=>{
      const f=document.getElementById("ttyd-frame");
      try{
        // Zugriff auf contentDocument wirft bei cross-origin block nicht, aber leeres Frame bleibt
        if(f && f.contentWindow && f.contentWindow.length===0){ /* heuristik */ }
      }catch{}
    },4000);
    return ()=>clearTimeout(t);
  },[reloadKey]);

  return (
    <div className="page">
      <div className="page-head">
        <div><h1 className="page-title">Co<em>de</em></h1><p className="page-sub">Web-Terminal · {TTYD_URL.replace("https://","")}</p></div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span className="term-status" style={{padding:"7px 14px",borderRadius:30,background:"rgba(255,255,255,.05)",border:"1px solid var(--glass-border)"}}>
            <span className="term-status-dot" style={{background:online===null?"#FBBf24":online?"#4ADE80":"#F87171",boxShadow:`0 0 7px ${online===null?"#FBBf24":online?"#4ADE80":"#F87171"}`}}></span>
            {online===null?"prüfe…":online?"erreichbar":"offline"}
          </span>
          <button className="btn btn-ghost" onClick={()=>setReloadKey(k=>k+1)}>↻ Neu laden</button>
          <a className="btn btn-primary" href={TTYD_URL} target="_blank" rel="noopener noreferrer" style={{textDecoration:"none"}}>Im neuen Tab öffnen ↗</a>
        </div>
      </div>
      <div className="glass term-wrap" style={{padding:0,overflow:"hidden"}}>
        <div className="term-bar">
          <div className="term-dots">
            <div className="term-dot" style={{background:"#F87171"}}></div>
            <div className="term-dot" style={{background:"#FBBf24"}}></div>
            <div className="term-dot" style={{background:"#4ADE80"}}></div>
          </div>
          <span className="term-title">bash — practio-server (ttyd)</span>
        </div>
        {online===false ? (
          <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,padding:40,textAlign:"center"}}>
            <div style={{fontSize:15,fontWeight:600}}>Terminal-Server nicht erreichbar</div>
            <div style={{fontSize:13,color:"var(--text-2)",maxWidth:440,lineHeight:1.6,fontFamily:"'IBM Plex Mono',monospace"}}>
              Starte auf deinem Server:<br/><br/>
              ttyd -W -c admin:PASSWORT bash<br/>
              cloudflared tunnel --url http://localhost:7681<br/><br/>
              Dann die URL oben in <strong>TTYD_URL</strong> eintragen.
            </div>
            <button className="btn btn-ghost" onClick={()=>setReloadKey(k=>k+1)}>Erneut prüfen</button>
          </div>
        ) : (
          <iframe
            id="ttyd-frame"
            key={reloadKey}
            src={TTYD_URL}
            title="Web-Terminal"
            style={{flex:1,width:"100%",border:"none",background:"#000",minHeight:0}}
            allow="clipboard-read; clipboard-write"
          />
        )}
      </div>
      <div style={{marginTop:12,fontSize:11,color:"var(--text-3)",fontFamily:"'IBM Plex Mono',monospace",lineHeight:1.6}}>
        Falls das eingebettete Terminal leer bleibt, blockt Cloudflare das iframe — nutze dann „Im neuen Tab öffnen".
      </div>
    </div>
  );
}

  const [costs]                = useState(FALLBACK.finance_costs);
  const [scenarios]            = useState(FALLBACK.finance_scenarios);

  useEffect(()=>{
    (async()=>{
      try {
        const [p,l,t] = await Promise.all([
          sb.get("persons","order=created_at.asc"),
          sb.get("leads","order=created_at.asc"),
          sb.get("tasks","order=created_at.asc"),
        ]);
        setPersons(p.length ? p : FALLBACK.persons);
        setLeads(l.length ? l : FALLBACK.leads);
        setTasks(t.length ? t : FALLBACK.tasks);
        setDbStatus("ok");
      } catch {
        setDbStatus("error");
      }
    })();
  },[]);

  const open=tasks.filter(t=>!t.done).length;

  return (
    <>
      {Object.entries(BG).map(([key,url])=>(
        <div key={key} className={`bg-layer ${page===key?"active":"inactive"}`} style={{backgroundImage:`url('${url}')`}}/>
      ))}
      <div className="bg-overlay"/>
      <div className="app">
        <nav className="sidebar" role="navigation" aria-label="Hauptnavigation">
          <div className="logo-row">
            <div className="logo-mark">P</div>
            <div><div className="logo-name">Practio</div><div className="logo-meta">intern · v0.1</div></div>
          </div>
          <div className="nav-label">Navigation</div>
          {NAV.map(item=>(
            <button key={item.id} className={`nav-item ${page===item.id?"active":""}`} onClick={()=>setPage(item.id)} aria-current={page===item.id?"page":undefined}>
              <span className="nav-icon"><Icon d={item.icon}/></span>
              {item.label}
              {item.id==="tasks"&&open>0&&<span className="nav-badge">{open}</span>}
              {item.id==="leads"&&<span className="nav-badge">{leads.length}</span>}
            </button>
          ))}
          <div className="sidebar-foot">„Schweigepflicht beginnt bei der Software"</div>
        </nav>
        <main className="main" role="main">
          {page==="overview"   && <Overview    leads={leads} tasks={tasks} persons={persons} dbStatus={dbStatus}/>}
          {page==="leads"      && <Leads       leads={leads} setLeads={setLeads} dbStatus={dbStatus}/>}
          {page==="tasks"      && <Tasks       tasks={tasks} setTasks={setTasks} persons={persons} setPersons={setPersons} dbStatus={dbStatus}/>}
          {page==="milestones" && <Milestones  milestones={milestones} dbStatus={dbStatus}/>}
          {page==="finance"    && <Finance     costs={costs} scenarios={scenarios} dbStatus={dbStatus}/>}
          {page==="code"       && <Terminal/>}
        </main>
      </div>
    </>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
